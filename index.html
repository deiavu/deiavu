 en:{q:"Pet insurance in California primarily covers:",o:["Liability if a pet injures someone (this is covered under homeowners)","Grooming, boarding, and routine preventive care exclusively","Veterinary costs when a pet is sick or injured — with various plan types (accident-only, accident and illness, wellness)","Only dogs and cats registered with the state"],e:"Pet Insurance covers VETERINARY EXPENSES when an insured pet is sick or injured. Plans range from: Accident-Only (lowest premium), Accident & Illness (most common), to Wellness plans (preventive care). Coverage varies by policy — pre-existing conditions are typically excluded. Pet liability is covered under homeowners Section II, not pet insurance."},
 es:{q:"El seguro de mascotas en California principalmente cubre:",o:["Responsabilidad si una mascota lesiona a alguien (esto está cubierto bajo propietarios)","Exclusivamente aseo, alojamiento y cuidado preventivo de rutina","Costos veterinarios cuando una mascota está enferma o lesionada — con varios tipos de planes (solo accidentes, accidentes y enfermedades, bienestar)","Solo perros y gatos registrados con el estado"],e:"El Seguro de Mascotas cubre los GASTOS VETERINARIOS cuando una mascota asegurada está enferma o lesionada. Los planes van desde: Solo Accidentes (prima más baja), Accidentes y Enfermedades (el más común), hasta planes de Bienestar (cuidado preventivo). La cobertura varía según la póliza — las condiciones preexistentes típicamente están excluidas. La responsabilidad por mascotas está cubierta bajo la Sección II de propietarios, no en el seguro de mascotas."}},

{id:'i4',t:'inland',c:3,
 en:{q:"A watercraft (boat) policy for a small motorboat typically includes all of the following EXCEPT:",o:["Physical damage to the boat (hull coverage)","Liability for boating accidents","Medical payments for injured passengers","Liability for accidents that occur on land while transporting the boat on a trailer"],e:"A standard watercraft policy covers: hull (physical damage), boat liability, and medical payments for passengers. Liability while the boat is on a TRAILER on land is typically covered under the AUTO POLICY (trailer attached to a vehicle), not the boat policy. Boat owners should confirm this coverage gap."},
 es:{q:"Una póliza de embarcación (bote) para un pequeño bote de motor típicamente incluye todo lo siguiente EXCEPTO:",o:["Daño físico al bote (cobertura del casco)","Responsabilidad por accidentes de navegación","Pagos médicos para pasajeros lesionados","Responsabilidad por accidentes que ocurren en tierra al transportar el bote en un remolque"],e:"Una póliza estándar de embarcación cubre: casco (daño físico), responsabilidad del bote y pagos médicos para pasajeros. La responsabilidad mientras el bote está en un REMOLQUE en tierra típicamente está cubierta bajo la PÓLIZA DE AUTO (remolque adjunto a un vehículo), no la póliza del bote. Los propietarios de botes deben confirmar esta brecha de cobertura."}},

{id:'i5',t:'inland',c:1,
 en:{q:"An HO-6 (Condo Unit Owners) policy typically covers the insured\'s unit on a 'walls-in' basis, meaning:",o:["It covers the exterior walls but not the interior","It covers the interior improvements, fixtures, and personal property within the unit, but NOT the building structure or common areas","It covers only one wall of the unit that faces the street","It covers everything from the walls outward including the roof"],e:"HO-6 covers the unit 'from the walls in' — interior improvements (flooring, cabinets, upgrades the owner made), personal property (Coverage C), and personal liability. The BUILDING STRUCTURE and COMMON AREAS are the condo association\'s responsibility, typically covered by a MASTER POLICY. Owners should know their association\'s master policy type (all-in vs. bare walls)."},
 es:{q:"Una póliza HO-6 (Propietarios de Unidades de Condominio) típicamente cubre la unidad asegurada en base a 'desde las paredes hacia adentro', lo que significa:",o:["Cubre las paredes exteriores pero no el interior","Cubre las mejoras interiores, accesorios y propiedad personal dentro de la unidad, pero NO la estructura del edificio ni las áreas comunes","Cubre solo una pared de la unidad que da a la calle","Cubre todo desde las paredes hacia afuera incluyendo el techo"],e:"HO-6 cubre la unidad 'desde las paredes hacia adentro' — mejoras interiores (pisos, gabinetes, mejoras que el propietario realizó), propiedad personal (Cobertura C) y responsabilidad civil personal. LA ESTRUCTURA DEL EDIFICIO y LAS ÁREAS COMUNES son responsabilidad de la asociación de condominios, típicamente cubierta por una PÓLIZA MAESTRA. Los propietarios deben conocer el tipo de póliza maestra de su asociación (todo incluido vs. paredes descubiertas)."}},

{id:'i6',t:'inland',c:0,
 en:{q:"A Personal Articles Floater (Scheduled Personal Property endorsement) differs from standard HO Coverage C because it:",o:["Provides open-peril (all-risk) coverage with no deductible for specifically listed items, with higher limits than HO sublimits","Only covers items while they are at the insured\'s residence","Has a higher deductible than standard Coverage C","Only covers items purchased within the last 12 months"],e:"A Personal Articles Floater (or Scheduled Personal Property endorsement) gives BROADER coverage than HO Coverage C: open-peril (not named-peril), typically NO DEDUCTIBLE, worldwide coverage, and insures each item for its SCHEDULED VALUE (agreed amount). Best for jewelry, fine art, cameras, and other valuables that exceed HO sublimits."},
 es:{q:"Un Flotante de Artículos Personales (endoso de Propiedad Personal Programada) difiere de la Cobertura C estándar de HO porque:",o:["Proporciona cobertura de perils abiertos (todo riesgo) sin deducible para artículos específicamente listados, con límites más altos que los sublímites de HO","Solo cubre artículos mientras están en la residencia del asegurado","Tiene un deducible más alto que la Cobertura C estándar","Solo cubre artículos comprados en los últimos 12 meses"],e:"Un Flotante de Artículos Personales (o endoso de Propiedad Personal Programada) brinda cobertura MÁS AMPLIA que la Cobertura C de HO: perils abiertos (no perils nombrados), típicamente SIN DEDUCIBLE, cobertura mundial y asegura cada artículo por su VALOR PROGRAMADO (monto acordado). Ideal para joyas, bellas artes, cámaras y otros objetos valiosos que superan los sublímites de HO."}},

{id:'i7',t:'inland',c:2,
 en:{q:"Mobile home insurance in California is typically handled through:",o:["Standard HO-3 policies with a special endorsement","The California FAIR Plan exclusively","Specialized mobile/manufactured home policies (HO-7 or equivalent) that cover mobile homes on their site or in transit","Auto insurance policies because mobile homes can be moved"],e:"Standard HO policies don\'t cover mobile/manufactured homes. Specialized MOBILE HOME POLICIES (HO-7 or equivalent) cover: the home's structure, personal property, liability, and loss of use — AND may include coverage while the home is being transported. They are designed for homes built on chassis that can be moved."},
 es:{q:"El seguro de casas móviles en California típicamente se maneja a través de:",o:["Pólizas HO-3 estándar con un endoso especial","Exclusivamente el Plan FAIR de California","Pólizas especializadas de casas móviles/prefabricadas (HO-7 o equivalente) que cubren las casas móviles en su sitio o en tránsito","Pólizas de seguro de auto porque las casas móviles se pueden mover"],e:"Las pólizas HO estándar no cubren las casas móviles/prefabricadas. Las PÓLIZAS ESPECIALIZADAS DE CASAS MÓVILES (HO-7 o equivalente) cubren: la estructura del hogar, propiedad personal, responsabilidad civil y pérdida de uso — Y pueden incluir cobertura mientras la casa está siendo transportada. Están diseñadas para hogares construidos sobre chasis que se pueden mover."}},

{id:'i8',t:'inland',c:3,
 en:{q:"Which of the following is NOT typically covered under an HO-3 homeowners policy?",o:["A fire that destroys the insured\'s kitchen","A thief stealing the insured\'s laptop from inside the home","Wind damage to the insured\'s roof","A business client injured while meeting with the insured in the insured\'s home office"],e:"BUSINESS LIABILITY is excluded from HO policies. If a client is injured on the premises for business purposes, the homeowners Section II liability does NOT cover business-related claims. The insured needs a separate Home Business policy or Business Owner Policy (BOP) for business activities conducted from home."},
 es:{q:"¿Cuál de los siguientes NO está típicamente cubierto bajo una póliza de propietarios HO-3?",o:["Un incendio que destruye la cocina del asegurado","Un ladrón que roba la laptop del asegurado desde el interior del hogar","Daños por viento al techo del asegurado","Un cliente de negocios lesionado mientras se reúne con el asegurado en la oficina en casa del asegurado"],e:"LA RESPONSABILIDAD COMERCIAL está excluida de las pólizas HO. Si un cliente se lesiona en las instalaciones con fines comerciales, la responsabilidad civil de la Sección II de propietarios NO cubre las reclamaciones relacionadas con negocios. El asegurado necesita una póliza separada de Negocio en Casa o una Póliza de Propietario de Negocio (BOP) para las actividades comerciales realizadas desde el hogar."}},

{id:'i9',t:'inland',c:1,
 en:{q:"A 'Difference in Conditions' (DIC) policy is most commonly used alongside:",o:["A standard HO-3 to add earthquake coverage only","A California FAIR Plan policy to provide comprehensive coverage for perils the FAIR Plan excludes (like liability, theft, and water damage)","An auto policy to fill gaps in collision coverage","A life insurance policy to add long-term care coverage"],e:"A DIC (Difference in Conditions) policy fills coverage GAPS between what the base policy covers and what the insured needs. Most commonly, it\'s combined with the California FAIR Plan: the FAIR Plan provides basic fire coverage, and the DIC policy covers everything else (liability, theft, water damage, additional living expenses) that the FAIR Plan excludes."},
 es:{q:"Una póliza de 'Diferencia en Condiciones' (DIC) se usa más comúnmente junto a:",o:["Una HO-3 estándar para agregar solo cobertura de terremotos","Una póliza del Plan FAIR de California para proporcionar cobertura integral de los perils que el Plan FAIR excluye (como responsabilidad civil, robo y daños por agua)","Una póliza de auto para llenar brechas en la cobertura de colisión","Una póliza de seguro de vida para agregar cobertura de cuidado a largo plazo"],e:"Una póliza DIC (Diferencia en Condiciones) llena las BRECHAS de cobertura entre lo que cubre la póliza base y lo que el asegurado necesita. Más comúnmente, se combina con el Plan FAIR de California: el Plan FAIR proporciona cobertura básica contra incendios, y la póliza DIC cubre todo lo demás (responsabilidad civil, robo, daños por agua, gastos de vida adicionales) que el Plan FAIR excluye."}},

{id:'i10',t:'inland',c:0,
 en:{q:"Pet Insurance (a newer line of insurance in California) typically EXCLUDES:",o:["Pre-existing conditions — illnesses or injuries the pet had before the policy was purchased","Accidents such as broken bones or lacerations","Emergency surgery required after an accident","Hospitalization costs after being hit by a vehicle"],e:"PRE-EXISTING CONDITIONS are the most common exclusion in pet insurance. An illness or injury the pet had before coverage began is typically not covered. Other common exclusions include: cosmetic procedures, breeding-related costs, and sometimes hereditary/breed-specific conditions. Always check the specific policy definitions."},
 es:{q:"El Seguro de Mascotas (una línea de seguros más nueva en California) típicamente EXCLUYE:",o:["Condiciones preexistentes — enfermedades o lesiones que la mascota tenía antes de que se comprara la póliza","Accidentes como huesos rotos o laceraciones","Cirugía de emergencia requerida después de un accidente","Costos de hospitalización después de ser atropellado por un vehículo"],e:"LAS CONDICIONES PREEXISTENTES son la exclusión más común en el seguro de mascotas. Una enfermedad o lesión que la mascota tenía antes de que comenzara la cobertura típicamente no está cubierta. Otras exclusiones comunes incluyen: procedimientos cosméticos, costos relacionados con la cría y a veces condiciones hereditarias/específicas de raza. Siempre revisa las definiciones específicas de la póliza."}},

// ===================== UMBRELLA (10) =====================
{id:'u1',t:'umb',c:0,
 en:{q:"A Personal Umbrella policy provides:",o:["Excess liability coverage ABOVE the limits of underlying auto and homeowners policies, typically $1M–$5M in additional protection","A replacement for both the auto and homeowners policies","Coverage for the insured\'s own property damage worldwide","Health and disability income for the entire household"],e:"A Personal Umbrella adds an EXTRA LAYER of broad liability protection ON TOP of existing underlying policies. When auto or homeowners liability limits are exhausted, the umbrella kicks in — typically providing $1M to $5M more. It is one of the most cost-effective forms of coverage relative to the protection provided."},
 es:{q:"Una póliza de Paraguas Personal proporciona:",o:["Cobertura de responsabilidad civil en EXCESO sobre los límites de las pólizas subyacentes de auto y propietarios, típicamente $1M–$5M en protección adicional","Un reemplazo de tanto las pólizas de auto como de propietarios","Cobertura para los daños a la propiedad propia del asegurado en todo el mundo","Salud e ingresos por discapacidad para todo el hogar"],e:"Un Paraguas Personal agrega una CAPA ADICIONAL de protección de responsabilidad civil amplia SOBRE las pólizas subyacentes existentes. Cuando se agotan los límites de responsabilidad civil de auto o propietarios, el paraguas entra en juego — típicamente proporcionando $1M a $5M más. Es una de las formas de cobertura más rentables en relación con la protección que brinda."}},

{id:'u2',t:'umb',c:1,
 en:{q:"Before a Personal Umbrella pays on a claim, the insured must:",o:["Pay a large deductible equal to 10% of the umbrella limit","Exhaust the limits of the underlying policies (auto, homeowners), which the umbrella requires the insured to maintain at minimum specified levels","Win the underlying lawsuit first","Prove the at-fault party has no insurance"],e:"Umbrella policies require the insured to MAINTAIN MINIMUM UNDERLYING LIMITS (e.g., 100/300/100 on auto, $300K on homeowners). The underlying policy pays first; the umbrella responds AFTER underlying limits are exhausted. If the insured lets underlying coverage lapse, they may be personally liable for the 'gap' amount."},
 es:{q:"Antes de que un Paraguas Personal pague una reclamación, el asegurado debe:",o:["Pagar un deducible grande igual al 10% del límite del paraguas","Agotar los límites de las pólizas subyacentes (auto, propietarios), que el paraguas requiere que el asegurado mantenga en niveles mínimos especificados","Ganar la demanda subyacente primero","Demostrar que la parte culpable no tiene seguro"],e:"Las pólizas paraguas requieren que el asegurado MANTENGA LÍMITES SUBYACENTES MÍNIMOS (ej: 100/300/100 en auto, $300K en propietarios). La póliza subyacente paga primero; el paraguas responde DESPUÉS de que se agotan los límites subyacentes. Si el asegurado deja vencer la cobertura subyacente, puede ser personalmente responsable por el monto de la 'brecha'."}},

{id:'u3',t:'umb',c:2,
 en:{q:"Which of the following losses is typically NOT covered under a Personal Umbrella policy?",o:["A lawsuit after a serious auto accident that exceeds auto liability limits","An injury to a neighbor caused by the insured\'s negligent landscaping","Liability for business activities or professional errors committed by the insured","A claim against the insured for libel or slander"],e:"BUSINESS AND PROFESSIONAL LIABILITY are excluded from personal umbrella policies. Business-related claims require Commercial General Liability (CGL) or Errors & Omissions (E&O) insurance. Personal umbrellas are for PERSONAL — not commercial — liability. Libel, slander, and personal injury claims ARE generally covered."},
 es:{q:"¿Cuál de las siguientes pérdidas típicamente NO está cubierta bajo una póliza de Paraguas Personal?",o:["Una demanda después de un accidente de auto grave que supera los límites de responsabilidad civil del auto","Una lesión a un vecino causada por la jardinería negligente del asegurado","Responsabilidad por actividades comerciales o errores profesionales cometidos por el asegurado","Una reclamación contra el asegurado por difamación o calumnia"],e:"LA RESPONSABILIDAD COMERCIAL Y PROFESIONAL está excluida de las pólizas de paraguas personal. Las reclamaciones relacionadas con negocios requieren un seguro de Responsabilidad Civil Comercial General (CGL) o Errores y Omisiones (E&O). Los paraguas personales son para responsabilidad PERSONAL — no comercial. Las reclamaciones de difamación, calumnia y daño personal generalmente SÍ están cubiertas."}},

{id:'u4',t:'umb',c:3,
 en:{q:"The Self-Insured Retention (SIR) in an umbrella policy applies when:",o:["The insured\'s auto liability limit is exceeded","The homeowners liability limit is exhausted","The umbrella limit itself is reached","The umbrella covers a loss that NO underlying policy covers — the SIR is the insured\'s out-of-pocket amount for that coverage gap"],e:"The SIR (similar to a deductible) applies when the UMBRELLA 'DROPS DOWN' to cover a loss not covered by any underlying policy (a coverage gap). The insured pays the SIR before the umbrella responds. When an underlying policy applies and is exhausted, there is NO SIR — the umbrella pays directly after the underlying limits."},
 es:{q:"La Retención Auto-Asegurada (SIR) en una póliza paraguas aplica cuando:",o:["Se supera el límite de responsabilidad civil del auto del asegurado","Se agota el límite de responsabilidad civil de los propietarios","Se alcanza el propio límite del paraguas","El paraguas cubre una pérdida que NINGUNA póliza subyacente cubre — el SIR es el monto de bolsillo del asegurado para esa brecha de cobertura"],e:"El SIR (similar a un deducible) aplica cuando el PARAGUAS 'BAJA' para cubrir una pérdida no cubierta por ninguna póliza subyacente (una brecha de cobertura). El asegurado paga el SIR antes de que el paraguas responda. Cuando una póliza subyacente aplica y se agota, NO hay SIR — el paraguas paga directamente después de los límites subyacentes."}},

{id:'u5',t:'umb',c:0,
 en:{q:"An umbrella policy has $1M in coverage. The insured\'s auto policy has $300K liability. A court awards $1.1M against the insured. What is the total financial result?",o:["Auto pays $300K; umbrella pays $700K; insured owes $100K out-of-pocket","Auto pays $300K; umbrella pays $800K; insured owes nothing","Auto pays nothing; umbrella pays $1M; insured owes $100K","Umbrella pays the full $1.1M; auto pays nothing"],e:"Auto pays its $300K limit. Umbrella pays up to its $1M limit — that\'s $700K (from $300K to $1M). The remaining $100K ($1.1M - $1.3M would be wrong... let\'s recalculate: $1.1M - $300K auto = $800K left. Umbrella has $1M limit, so pays $800K). Actually: Auto $300K + Umbrella $800K = $1.1M — fully covered. But WAIT — the umbrella only has $1M limit. $1.1M - $300K = $800K owed. $800K < $1M umbrella limit. So: Auto pays $300K, umbrella pays $800K, total $1.1M. Insured owes nothing."},
 es:{q:"Una póliza paraguas tiene $1M en cobertura. La póliza de auto del asegurado tiene $300K de responsabilidad civil. Un tribunal otorga $1.1M contra el asegurado. ¿Cuál es el resultado financiero total?",o:["El auto paga $300K; el paraguas paga $800K; el asegurado no debe nada","El auto paga $300K; el paraguas paga $700K; el asegurado debe $100K de su bolsillo","El auto no paga nada; el paraguas paga $1M; el asegurado debe $100K","El paraguas paga los $1.1M completos; el auto no paga nada"],e:"El auto paga su límite de $300K. El paraguas cubre el resto: $1.1M - $300K = $800K. El paraguas tiene límite de $1M, entonces $800K está DENTRO del límite. Resultado: Auto paga $300K + Paraguas paga $800K = $1.1M sentencia totalmente cubierta. El asegurado NO debe nada."}},

{id:'u6',t:'umb',c:1,
 en:{q:"Which statement about Personal Umbrella policies is TRUE?",o:["Umbrella policies replace underlying auto and homeowners policies","Umbrella policies typically cover personal injury (libel, slander, wrongful eviction) — which is often NOT covered by standard homeowners or auto policies","All umbrella policies are identical in California — coverage terms cannot vary","Umbrellas never cover incidents that occur outside of the United States"],e:"One major advantage of umbrella policies: they typically include PERSONAL INJURY coverage — libel, slander, defamation, wrongful eviction, false arrest — which standard HO and auto policies often exclude. This is broad protection for reputation and civil liberty claims. Coverage territory is usually worldwide."},
 es:{q:"¿Cuál afirmación sobre las pólizas de Paraguas Personal es VERDADERA?",o:["Las pólizas paraguas reemplazan las pólizas subyacentes de auto y propietarios","Las pólizas paraguas típicamente cubren daño personal (difamación, calumnia, desalojo ilegal) — que a menudo NO está cubierto por las pólizas estándar de propietarios o auto","Todas las pólizas paraguas son idénticas en California — los términos de cobertura no pueden variar","Los paraguas nunca cubren incidentes que ocurren fuera de los Estados Unidos"],e:"Una ventaja importante de las pólizas paraguas: típicamente incluyen cobertura de DAÑO PERSONAL — difamación, calumnia, desalojo ilegal, arresto falso — que las pólizas HO y auto estándar a menudo excluyen. Esta es una protección amplia para reclamaciones de reputación y libertad civil. El territorio de cobertura usualmente es mundial."}},

{id:'u7',t:'umb',c:2,
 en:{q:"A Personal Umbrella policy differs from Excess Liability insurance in that:",o:["They are identical products — just different names","Excess Liability is always broader than umbrella coverage","An umbrella often BROADENS coverage beyond what the underlying policies cover (such as personal injury); Excess Liability only provides additional limits on the SAME coverages as the underlying policy","Umbrellas are available only to homeowners; Excess Liability is available to renters too"],e:"UMBRELLA = Adds extra limits AND may BROADEN coverage (adding personal injury and other perils not in underlying policies). EXCESS LIABILITY = Only adds extra limits on the EXACT SAME coverage as the underlying policy — no additional coverage breadth. Umbrellas typically offer more comprehensive protection."},
 es:{q:"Una póliza de Paraguas Personal difiere del seguro de Responsabilidad Civil en Exceso en que:",o:["Son productos idénticos — solo nombres diferentes","La Responsabilidad en Exceso es siempre más amplia que la cobertura del paraguas","Un paraguas a menudo AMPLÍA la cobertura más allá de lo que cubren las pólizas subyacentes (como daño personal); la Responsabilidad en Exceso solo proporciona límites adicionales en las MISMAS coberturas que la póliza subyacente","Los paraguas solo están disponibles para propietarios; la Responsabilidad en Exceso también está disponible para inquilinos"],e:"PARAGUAS = Agrega límites adicionales Y puede AMPLIAR la cobertura (añadiendo daño personal y otros perils no incluidos en las pólizas subyacentes). RESPONSABILIDAD EN EXCESO = Solo agrega límites adicionales en EXACTAMENTE LAS MISMAS coberturas que la póliza subyacente — sin amplitud de cobertura adicional. Los paraguas típicamente ofrecen protección más integral."}},

{id:'u8',t:'umb',c:3,
 en:{q:"Intentional acts by the insured are:",o:["Covered under the umbrella if the insured can prove it was an accident","Covered if the claim is above $1 million","Covered only if the insured apologizes and settles","Excluded from both homeowners and personal umbrella policies — insurance cannot cover intentional harm"],e:"INTENTIONAL ACTS are excluded from both HO and umbrella liability policies. Insurance is designed to cover ACCIDENTAL losses — intentional harm is uninsurable as a matter of public policy (you cannot profit from or be indemnified for deliberately injuring someone). This is a fundamental exclusion in all liability policies."},
 es:{q:"Los actos intencionales del asegurado están:",o:["Cubiertos bajo el paraguas si el asegurado puede demostrar que fue un accidente","Cubiertos si la reclamación supera $1 millón","Cubiertos solo si el asegurado se disculpa y llega a un acuerdo","Excluidos de las pólizas de propietarios y de paraguas personal — el seguro no puede cubrir daños intencionales"],e:"LOS ACTOS INTENCIONALES están excluidos de las pólizas de responsabilidad civil de HO y paraguas. El seguro está diseñado para cubrir pérdidas ACCIDENTALES — el daño intencional no es asegurable como cuestión de orden público (no puedes beneficiarte de o ser indemnizado por lesionar deliberadamente a alguien). Esta es una exclusión fundamental en todas las pólizas de responsabilidad civil."}},

{id:'u9',t:'umb',c:0,
 en:{q:"A homeowner has a $500K homeowners liability limit and a $1M umbrella. A slip-and-fall on their property results in a $400K judgment. How is this paid?",o:["Homeowners pays $400K entirely — the umbrella is not triggered because the judgment is within the HO limits","Umbrella pays $400K — homeowners is not involved","Homeowners pays $200K; umbrella pays $200K","Insured pays $400K out of pocket; insurance only pays excess"],e:"The homeowners liability pays $400K — within its $500K limit. The umbrella is NOT triggered because the loss ($400K) did not EXCEED the underlying homeowners limit ($500K). The umbrella only kicks in AFTER the underlying limit is exhausted. No umbrella payment needed here."},
 es:{q:"Un propietario tiene un límite de responsabilidad de propietarios de $500K y un paraguas de $1M. Una caída en su propiedad resulta en una sentencia de $400K. ¿Cómo se paga?",o:["Los propietarios pagan $400K completamente — el paraguas no se activa porque la sentencia está dentro de los límites de HO","El paraguas paga $400K — los propietarios no están involucrados","Los propietarios pagan $200K; el paraguas paga $200K","El asegurado paga $400K de su bolsillo; el seguro solo paga el exceso"],e:"La responsabilidad de propietarios paga $400K — dentro de su límite de $500K. El paraguas NO se activa porque la pérdida ($400K) no SUPERÓ el límite subyacente de propietarios ($500K). El paraguas solo entra en juego DESPUÉS de que se agota el límite subyacente. No se necesita pago del paraguas aquí."}},

{id:'u10',t:'umb',c:1,
 en:{q:"Which of the following IS typically covered by a Personal Umbrella policy?",o:["A professional error made by the insured in their capacity as a licensed nurse","A libel lawsuit against the insured for a negative review they posted online","Damage to the insured\'s own home caused by a fire","Workers' compensation claim from a household employee injured on the job"],e:"Libel (written defamation) IS covered under personal injury protection in most umbrella policies. Professional liability (nurses, doctors, lawyers) is NOT covered — needs E&O/malpractice. Own property damage is covered by homeowners (Coverage A), not umbrella. Workers' comp requires a separate policy."},
 es:{q:"¿Cuál de los siguientes SÍ está típicamente cubierto por una póliza de Paraguas Personal?",o:["Un error profesional cometido por el asegurado en su capacidad como enfermero/a licenciado/a","Una demanda de difamación contra el asegurado por una reseña negativa que publicó en línea","Daños a la propia casa del asegurado causados por un incendio","Reclamación de compensación de trabajadores de un empleado doméstico lesionado en el trabajo"],e:"La difamación escrita (libelo) SÍ está cubierta bajo la protección de daño personal en la mayoría de las pólizas paraguas. La responsabilidad profesional (enfermeros, médicos, abogados) NO está cubierta — necesita E&O/negligencia profesional. Los daños a la propia propiedad están cubiertos por propietarios (Cobertura A), no el paraguas. La compensación de trabajadores requiere una póliza separada."}},

// STATE
let L='es', TAB=0, V='dash', AT=null;
let SQ=[], SI=0, SS=null, SA=false, SC=0, ST=0, stats={};
let EQ=[], EI=0, ES=null, EA=[];
let ETval=EXAM_MIN*60, ETref=null;
let FI=0, FF=false;
let chatMsgs=[], GQ='', gopenIdx=-1, calYear=new Date().getFullYear(), calMonth=new Date().getMonth();

// LOCALSTORAGE
function lsGet(k){try{return JSON.parse(localStorage.getItem('deiavu_'+k));}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem('deiavu_'+k,JSON.stringify(v));}catch(e){}}

function loadState(){
  const s=lsGet('stats');if(s)stats=s;
  const sd=lsGet('studied');if(sd)studiedDays=new Set(sd);else studiedDays=new Set();
}
function saveStats(){lsSet('stats',stats);}
function saveStudied(){lsSet('studied',[...studiedDays]);}

let studiedDays=new Set();

// HELPERS
function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function gst(id){return stats[id]||{c:0,t:0,w:[]};}
function pct(id){const s=gst(id);return s.t===0?null:Math.round(s.c/s.t*100);}
function pcls(p){if(p===null)return'pn';if(p>=70)return'ph';if(p>=50)return'pm';return'pl';}
function tfmt(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function toggleLang(){L=L==='es'?'en':'es';document.getElementById('langBtn').textContent=L==='es'?'English':'Español';updateBnav();render();}
function totalStudied(){return[...studiedDays].filter(d=>d.startsWith(new Date().getFullYear()+'-'+(new Date().getMonth()+1))).length;}
function getStreak(){
  let streak=0,d=new Date();
  while(true){
    const key=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    if(studiedDays.has(key)){streak++;d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}
function markToday(){
  const d=new Date();
  const key=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
  studiedDays.add(key);saveStudied();
}

const NAV_ES=['Estudiar','Examen','Glosario','Tutor IA','Calendario','Progreso'];
const NAV_EN=['Study','Exam','Glossary','AI Tutor','Calendar','Progress'];

function updateBnav(){
  const labels=L==='es'?NAV_ES:NAV_EN;
  labels.forEach((l,i)=>{const el=document.getElementById('bl'+i);if(el)el.textContent=l;});
  for(let i=0;i<6;i++){const b=document.getElementById('bn'+i);if(b){b.className='bnt'+(TAB===i?' on':'');}}
}

function goTab(t){TAB=t;V='dash';updateBnav();render();}
function goTo(v){V=v;render();}

function render(){
  document.getElementById('app').innerHTML='';
  let el;
  if(TAB===0){if(V==='dash')el=rDash();else if(V==='study')el=rStudy();else if(V==='vocab')el=rVocab();else el=rDash();}
  else if(TAB===1){if(V==='exam')el=rExam();else if(V==='results')el=rRes();else el=rExamHome();}
  else if(TAB===2)el=rGloss();
  else if(TAB===3)el=rTutor();
  else if(TAB===4)el=rCal();
  else if(TAB===5)el=rDash2();
  else el=rDash();
  el.classList.add('fade');
  document.getElementById('app').appendChild(el);
  if(TAB===0&&V==='vocab')attachFC();
  if(TAB===3)setTimeout(()=>{const c=document.getElementById('chatMsgs');if(c)c.scrollTop=c.scrollHeight;},50);
}

// ── DASH (Study Home) ──
function rDash(){
  const totT=Object.values(stats).reduce((a,v)=>a+v.t,0);
  const totC=Object.values(stats).reduce((a,v)=>a+v.c,0);
  const ov=totT>0?Math.round(totC/totT*100):0;
  const wk=TOPICS.filter(tp=>{const p=pct(tp.id);return p!==null&&p<70;});
  const streak=getStreak();
  const d=document.createElement('div');
  d.innerHTML=`
  ${streak>0?`<div class="streak"><div class="streak-ico">🔥</div><div><div class="streak-v">${streak} ${L==='es'?'días':'days'}</div><div class="streak-l">${L==='es'?'racha de estudio':'study streak'}</div></div></div>`:''}
  <div class="hero">
    <div class="hero-tag">California Personal Lines · deIAvu</div>
    <div class="hero-title">${L==='es'?'tu entrenador de licencias con IA':'AI-Powered Prep. Pass this time.'}</div>
    <div class="hero-sub">${totT>0?totT+(L==='es'?' preguntas respondidas':' questions answered'):(L==='es'?'Selecciona un tema para comenzar':'Select a topic to start')}</div>
    ${totT>0?`<div class="prog-w"><div class="prog-f" style="width:${ov}%"></div></div><div class="prog-l"><span>${L==='es'?'Progreso general':'Overall progress'}</span><span>${ov}%</span></div>`:`<div class="hstats">${TOPICS.map(tp=>`<div class="hstat"><div class="hstat-v">${QS.filter(q=>q.t===tp.id).length}</div><div class="hstat-l">${tp[L].n}</div></div>`).join('')}</div>`}
  </div>
  <div class="info">📋 <strong>${L==='es'?'Examen CDI Oficial:':'Official CDI Exam:'}</strong> ${EXAM_Q} ${L==='es'?'preguntas':'questions'} · ${EXAM_MIN} ${L==='es'?'minutos':'minutes'} · ${PASS}% ${L==='es'?'para aprobar':'to pass'}</div>
  ${wk.length?`<div class="wk"><div>⚡</div><div><div style="font-size:.76rem;font-weight:600;color:#D97706;margin-bottom:4px">${L==='es'?'Áreas a Reforzar':'Areas to Strengthen'}</div><div class="wkchips">${wk.map(tp=>`<button class="wkchip" onclick="startS('${tp.id}')">${tp[L].n} ${pct(tp.id)}%</button>`).join('')}</div></div></div>`:''}
  <div class="sec">${L==='es'?'Temas de Estudio':'Study Topics'} — ${QS.length} ${L==='es'?'preguntas totales':'total questions'}</div>
  <div class="tgrid">${TOPICS.map(tp=>{
    const p=pct(tp.id);const s=gst(tp.id);const cnt=QS.filter(q=>q.t===tp.id).length;
    return`<div class="tcard" onclick="startS('${tp.id}')">
      <div class="acc" style="background:${tp.color}"></div>
      <div class="tico">${tp.icon}</div>
      <div class="tn">${tp[L].n}</div>
      <div class="td">${tp[L].d}</div>
      ${s.t>0?`<div class="tmini"><div class="tmf" style="width:${p}%;background:${tp.color}"></div></div>`:''}
      <div class="tf">
        <span class="tpct ${pcls(p)}">${p!==null?p+'%':cnt+' Q'}</span>
        <button class="tbtn" style="background:${tp.color}" onclick="event.stopPropagation();startS('${tp.id}')">${L==='es'?'Estudiar':'Study'}</button>
      </div>
    </div>`;}).join('')}</div>
  <div class="sec" style="margin-top:20px">${L==='es'?'Tarjetas de Vocabulario':'Vocabulary Flashcards'}</div>
  <div class="ecard" onclick="goTo('vocab')" style="cursor:pointer">
    <div class="ehead"><div class="eico">🃏</div><div><div class="et">${L==='es'?'Tarjetas de Vocabulario':'Vocabulary Flashcards'}</div><div class="ed">${L==='es'?'20 términos clave con definiciones bilingües — toca para voltear':'20 key terms with bilingual definitions — tap to flip'}</div></div></div>
    <button class="btn-p">${L==='es'?'Abrir Tarjetas':'Open Flashcards'}</button>
  </div>`;
  return d;
}

// ── STUDY ──
function startS(id){
  markToday();
  const qs=QS.filter(q=>q.t===id);
  const s=gst(id);
  AT=id;SQ=[...sh(qs.filter(q=>s.w&&s.w.includes(q.id))),...sh(qs.filter(q=>!s.w||!s.w.includes(q.id)))];
  SI=0;SS=null;SA=false;SC=0;ST=0;V='study';render();
}
function rStudy(){
  const q=SQ[SI];if(!q){V='dash';return rDash();}
  const qd=q[L];const tp=TOPICS.find(x=>x.id===q.t);const ok=SS===q.c;
  const d=document.createElement('div');
  d.innerHTML=`
  <div class="shdr">
    <button class="btn-back" onclick="goTo('dash')">← ${L==='es'?'Inicio':'Home'}</button>
    <div style="text-align:center;font-size:.72rem;color:#64748B">${tp[L].n}<br><span class="sctr">${SI+1}/${SQ.length}</span></div>
    <div style="font-size:.76rem;color:#64748B">${SC}/${ST}</div>
  </div>
  <div class="sprog"><div class="spf" style="width:${Math.round(SI/SQ.length*100)}%;background:${tp.color}"></div></div>
  <div class="qcard">
    <span class="qtag" style="background:${tp.color}20;color:${tp.color}">${tp.icon} ${tp[L].n}</span>
    <div class="qtext">${qd.q}</div>
  </div>
  <div class="opts">${qd.o.map((o,i)=>{
    let cls='';
    if(SA){if(i===q.c)cls='ok';else if(i===SS&&i!==q.c)cls='ng';}
    else if(SS===i)cls='sel';
    return`<button class="opt ${cls}" onclick="ansS(${i})" ${SA?'disabled':''}><span class="oltr">${String.fromCharCode(65+i)}</span><span>${o}</span></button>`;
  }).join('')}</div>
  ${SA?`<div class="expbox ${ok?'expok':'expng'}">
    <div class="exph"><span>${ok?'✅':'❌'}</span><span class="explbl">${ok?(L==='es'?'¡Correcto!':'Correct!'):(L==='es'?'Incorrecto':'Incorrect')}</span></div>
    ${!ok?`<div class="expans">${L==='es'?'Respuesta correcta:':'Correct answer:'} <strong>${String.fromCharCode(65+q.c)}. ${qd.o[q.c]}</strong></div>`:''}
    <div class="exptxt"><strong>${L==='es'?'Explicación:':'Explanation:'}</strong> ${qd.e}</div>
  </div>
  <button class="btn-p" onclick="nextS()">${SI+1>=SQ.length?(L==='es'?'← Inicio':'← Home'):(L==='es'?'Siguiente →':'Next →')}</button>`
  :`<button class="btn-p" style="opacity:.35;cursor:not-allowed">${L==='es'?'Selecciona una respuesta':'Select an answer'}</button>`}`;
  return d;
}
function ansS(i){
  if(SA)return;SS=i;SA=true;
  const q=SQ[SI];const ok=i===q.c;ST++;if(ok)SC++;
  const s=gst(q.t);
  const w=ok?(s.w||[]).filter(x=>x!==q.id):[...new Set([...(s.w||[]),q.id])];
  stats[q.t]={c:(s.c||0)+(ok?1:0),t:(s.t||0)+1,w};saveStats();render();
}
function nextS(){if(SI+1>=SQ.length){V='dash';render();return;}SI++;SS=null;SA=false;render();}

  }

  }

    return L==='es'?`Los mínimos de responsabilidad de auto en California son <strong>15/30/5</strong>:<br>• $15,000 por persona (lesiones corporales)<br>• $30,000 total por accidente (lesiones corporales)<br>• $5,000 daños a la propiedad<br><br>Estos son los mínimos LEGALES — siempre deberías recomendar límites más altos a los clientes.`:`California auto liability minimums are <strong>15/30/5</strong>:<br>• $15,000 per person (bodily injury)<br>• $30,000 total per accident (bodily injury)<br>• $5,000 property damage<br><br>These are LEGAL minimums — you should always recommend higher limits to clients.`;
  }
  if(m.includes('pap')||m.includes('póliza de auto personal')||m.includes('personal auto policy')){
    return L==='es'?`La <strong>PAP (Personal Auto Policy)</strong> es la póliza de auto estándar para uso personal. Tiene estas coberturas principales:<br>• <strong>Responsabilidad Civil</strong> (BI/PD) — daños a terceros<br>• <strong>Colisión</strong> — daños a tu propio auto por impacto<br>• <strong>Cobertura Integral</strong> — robo, granizo, fuego, animales<br>• <strong>MedPay</strong> — gastos médicos sin importar culpa<br>• <strong>UM/UIM</strong> — protección vs. conductores sin seguro<br><br>Recuerda: la PAP NO cubre uso comercial (Uber, entregas de pizza).`:`The <strong>PAP (Personal Auto Policy)</strong> is the standard personal use auto policy. Main coverages:<br>• <strong>Liability</strong> (BI/PD) — damages to others<br>• <strong>Collision</strong> — damage to your own car from impact<br>• <strong>Comprehensive</strong> — theft, hail, fire, animals<br>• <strong>MedPay</strong> — medical expenses regardless of fault<br>• <strong>UM/UIM</strong> — protection vs. uninsured drivers<br><br>Remember: PAP does NOT cover commercial use (Uber, pizza delivery).`;
  }
  if(m.includes('ho-3')||m.includes('homeowners')||m.includes('propietarios')){
    return L==='es'?`La <strong>HO-3 (Forma Especial)</strong> es la póliza de propietarios más vendida. Funciona así:<br>• <strong>Vivienda (A) y Otras Estructuras (B)</strong>: Perils ABIERTOS — cubierta para TODO excepto lo excluido<br>• <strong>Propiedad Personal (C)</strong>: Perils NOMBRADOS — solo cubierta para los perils listados<br><br>Las 6 coberturas son: A=Vivienda, B=Otras Estructuras (10% de A), C=Propiedad Personal, D=Pérdida de Uso, E=Responsabilidad Civil, F=Pagos Médicos a Otros.`:`The <strong>HO-3 (Special Form)</strong> is the most common homeowners policy. It works like this:<br>• <strong>Dwelling (A) and Other Structures (B)</strong>: OPEN perils — covered for EVERYTHING except what\'s excluded<br>• <strong>Personal Property (C)</strong>: NAMED perils — only covered for specifically listed perils<br><br>The 6 coverages are: A=Dwelling, B=Other Structures (10% of A), C=Personal Property, D=Loss of Use, E=Personal Liability, F=Medical Payments to Others.`;
  }
  if(m.includes('fair plan')||m.includes('plan fair')){
    return L==='es'?`El <strong>Plan FAIR de California</strong> (Fair Access to Insurance Requirements) es el asegurador de <strong>ÚLTIMO RECURSO</strong>. Proporciona cobertura básica contra incendios a propietarios que han sido rechazados en el mercado estándar.<br><br>Puntos clave:<br>• Cobertura limitada comparada con HO-3 estándar<br>• Muy común en zonas de alto riesgo de incendios en CA<br>• Se combina frecuentemente con una póliza DIC (Diferencia en Condiciones) para cobertura más amplia<br>• La póliza DIC cubre lo que el Plan FAIR NO cubre (responsabilidad, robo, agua)`:`The <strong>California FAIR Plan</strong> (Fair Access to Insurance Requirements) is the insurer of <strong>LAST RESORT</strong>. Provides basic fire coverage to property owners denied in the standard market.<br><br>Key points:<br>• Limited coverage compared to standard HO-3<br>• Very common in CA high wildfire risk areas<br>• Often combined with a DIC (Difference in Conditions) policy for broader coverage<br>• The DIC policy covers what the FAIR Plan does NOT (liability, theft, water damage)`;
  }
  if(m.includes('prop 103')||m.includes('proposición 103')||m.includes('proposition 103')){
    return L==='es'?`La <strong>Proposición 103</strong> (aprobada en 1988) es una ley clave de California que:<br>• Requiere <strong>aprobación previa del CDI</strong> antes de que las aseguradoras suban las tarifas de auto<br>• Establece los <strong>3 factores principales de calificación</strong> en este orden:<br>&nbsp;&nbsp;1. Historial de manejo seguro<br>&nbsp;&nbsp;2. Millas anuales manejadas<br>&nbsp;&nbsp;3. Años de experiencia como conductor<br>• El código postal y el crédito <strong>NO pueden ser factores principales</strong>`:`<strong>Proposition 103</strong> (passed in 1988) is a key California law that:<br>• Requires <strong>CDI prior approval</strong> before insurers raise auto rates<br>• Establishes the <strong>3 primary rating factors</strong> in this order:<br>&nbsp;&nbsp;1. Driving safety record<br>&nbsp;&nbsp;2. Annual miles driven<br>&nbsp;&nbsp;3. Years of driving experience<br>• ZIP code and credit score <strong>CANNOT be primary factors</strong>`;
  }
  if(m.includes('cea')||m.includes('terremoto')||m.includes('earthquake')){
    return L==='es'?`La <strong>CEA (California Earthquake Authority)</strong> proporciona seguro residencial de terremotos porque los terremotos están <strong>EXCLUIDOS</strong> de todas las pólizas HO estándar en California.<br><br>Puntos clave:<br>• Creada después del terremoto de Northridge (1994)<br>• Disponible a través de aseguradoras privadas participantes<br>• Deducibles altos: típicamente 10-25% de la cobertura<br>• Es un seguro SEPARADO de tu póliza HO estándar`:`The <strong>CEA (California Earthquake Authority)</strong> provides residential earthquake insurance because earthquakes are <strong>EXCLUDED</strong> from all standard HO policies in California.<br><br>Key points:<br>• Created after the Northridge earthquake (1994)<br>• Available through participating private insurers<br>• High deductibles: typically 10-25% of coverage<br>• It's SEPARATE from your standard HO policy`;
  }
  if(m.includes('umbrella')||m.includes('paraguas')){
    return L==='es'?`El <strong>Paraguas Personal</strong> proporciona responsabilidad civil en EXCESO sobre los límites de tus pólizas de auto y propietarios, típicamente $1M–$5M adicional.<br><br>Puntos importantes:<br>• Requiere mantener límites mínimos en las pólizas subyacentes<br>• La póliza subyacente paga primero; el paraguas responde cuando se agotan esos límites<br>• También cubre daño personal (difamación, calumnia) que las pólizas estándar excluyen<br>• <strong>EXCLUYE</strong> responsabilidad comercial y actos intencionales<br>• El SIR aplica cuando el paraguas cubre algo que ninguna póliza subyacente cubre`:`The <strong>Personal Umbrella</strong> provides excess liability ABOVE your auto and homeowners policy limits, typically $1M–$5M additional.<br><br>Key points:<br>• Requires maintaining minimum underlying policy limits<br>• Underlying policy pays first; umbrella responds when those limits are exhausted<br>• Also covers personal injury (libel, slander) that standard policies exclude<br>• <strong>EXCLUDES</strong> business liability and intentional acts<br>• SIR applies when the umbrella covers something no underlying policy covers`;
  }
  // Find best topic match
  let bestTopic=null;let bestScore=0;

    const score=TUTOR_KB[topic].filter(kw=>m.includes(kw.toLowerCase())).length;
    if(score>bestScore){bestScore=score;bestTopic=topic;}
  });
  if(bestTopic&&bestScore>0){
    const tp=TOPICS.find(t=>t.id===bestTopic);

function rCal(){

  const totalDays=[...studiedDays].length;
  const monthMotiv=L==='es'?MOTIV_ES:MOTIV_EN;
  const motivIdx=today.getDate()%monthMotiv.length;
  const motiv=monthMotiv[motivIdx];
  // Calendar
  const year=calYear,month=calMonth;
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthNames_es=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const monthNames_en=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames_es=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const dayNames_en=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dayNames=L==='es'?dayNames_es:dayNames_en;

  let calDays='';
  for(let i=0;i<firstDay;i++)calDays+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){

  const d=document.createElement('div');

    <div class="streak-card"><div class="streak-v">🔥 ${streak}</div><div class="streak-l">${L==='es'?'días de racha':'day streak'}</div></div>

  </div>
  <div class="cal-header">
    <button class="cal-nav" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}render()">←</button>
    <div class="cal-month">${monthName} ${year}</div>
    <button class="cal-nav" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}render()">→</button>
  </div>
  <div class="cal-grid">
    ${dayNames.map(n=>`<div class="cal-day-name">${n}</div>`).join('')}
    ${calDays}
  </div>
  <div style="display:flex;gap:10px;font-size:.72rem;color:#64748B;margin-bottom:16px">
    <span>🟩 ${L==='es'?'Estudiado':'Studied'}</span>

let fsLevel = 0, hcOn = false;
function cycleFontSize(){
  const root = document.documentElement;
  const btn = document.getElementById('fsBtn');
  root.classList.remove('fs-lg','fs-xl');
  fsLevel = (fsLevel + 1) % 3;
  if(fsLevel===1){root.classList.add('fs-lg');if(btn)btn.textContent='A++';}
  else if(fsLevel===2){root.classList.add('fs-xl');if(btn)btn.textContent='A-';}
  else{if(btn)btn.textContent='A+';}
  lsSet('fontsize', fsLevel);
}
function toggleHC(){
  hcOn=!hcOn;
  document.body.classList.toggle('hc', hcOn);
  document.documentElement.classList.toggle('hc', hcOn);
  const btn=document.getElementById('hcBtn');
  if(btn){btn.classList.toggle('on',hcOn);}
  lsSet('hc', hcOn);
}
function loadA11y(){
  const fs=lsGet('fontsize')||0;
  const hc=lsGet('hc')||false;
  if(fs>0){fsLevel=fs-1;cycleFontSize();}
  if(hc){toggleHC();}
}

    en: { name: '🏆 Quarterly Plan', period: 'for 3 months', badge: 'BEST VALUE', badgeColor: '' },
    price: 29.99,
    priceLabel: '$29.99',
    days: 90,
    examLimit: 999,
    features: {
      es: ['Acceso completo 90 días', 'Exámenes ilimitados', 'Todos los temas de estudio', 'Glosario bilingüe', 'Tutor IA completo', 'Calendario motivacional', 'Seguimiento de racha', 'Soporte prioritario por WhatsApp', 'Solo $10/mes — ahorras $30'],
      en: ['Full access 90 days', 'Unlimited exams', 'All study topics', 'Bilingual glossary', 'Full AI Tutor', 'Motivational calendar', 'Streak tracking', 'Priority WhatsApp support', 'Only $10/month — save $30'],
    },
    noFeatures: { es: [], en: [] }
  },
];

// Subscription state (stored in localStorage)
function getSubState() {
  const s = lsGet('sub');
  if (!s) return null;
  // Check if expired
  if (s.expiresAt && new Date(s.expiresAt) < new Date()) {
    lsSet('sub', null);
    return null;
  }
  return s;
}

function activatePlan(planId) {
  const plan = PLANS.find(p => p.id === planId);
  if (!plan) return;
  const expiresAt = new Date();
  expiresAt.setDate(expiresAt.getDate() + plan.days);
  const sub = {
    planId,
    planName: plan.es.name,
    activatedAt: new Date().toISOString(),
    expiresAt: expiresAt.toISOString(),
    examLimit: plan.examLimit,
    examsTaken: 0,
  };
  lsSet('sub', sub);
  updateSubNav();
  hidePlans();
  // Show confirmation
  const msg = L === 'es'
    ? '¡Plan activado! Tienes acceso completo hasta ' + expiresAt.toLocaleDateString('es-MX', {day:'numeric',month:'long',year:'numeric'}) + '.'
    : 'Plan activated! You have full access until ' + expiresAt.toLocaleDateString('en-US', {day:'numeric',month:'long',year:'numeric'}) + '.';
  alert(msg);
  render();
}

function getDaysLeft() {
  const s = getSubState();
  if (!s) return 0;
  const diff = new Date(s.expiresAt) - new Date();
  return Math.ceil(diff / (1000*60*60*24));
}

function canTakeExam() {
  const s = getSubState();
  if (!s) return false;
  if (s.examLimit >= 999) return true;
  return (s.examsTaken || 0) < s.examLimit;
}

function recordExamTaken() {
  const s = getSubState();
  if (!s) return;
  s.examsTaken = (s.examsTaken || 0) + 1;
  lsSet('sub', s);
}

function updateSubNav() {
  const btn = document.getElementById('subNavBtn');
  if (!btn) return;
  const s = getSubState();
  if (s) {
    const days = getDaysLeft();
    btn.textContent = L === 'es' ? '✅ ' + days + ' días' : '✅ ' + days + ' days';
    btn.style.background = 'rgba(5,150,105,.3)';
    btn.style.borderColor = 'rgba(5,150,105,.5)';
  } else {
    btn.textContent = L === 'es' ? '🔓 Prueba Gratis' : '🔓 Free Trial';
    btn.style.background = '';
    btn.style.borderColor = '';
  }
}

function showPlans() {
  const overlay = document.getElementById('plansOverlay');
  const content = document.getElementById('plansContent');
  if (!overlay || !content) return;
  const s = getSubState();
  const daysLeft = getDaysLeft();

  let html = '';

  // Current status
  if (s) {
    const plan = PLANS.find(p => p.id === s.planId);
    const exp = new Date(s.expiresAt).toLocaleDateString(L==='es'?'es-MX':'en-US',{day:'numeric',month:'long',year:'numeric'});
    html += `<div class="sub-status active-sub">
      <div class="sub-status-ico">✅</div>
      <div>
        <div class="sub-status-label">${L==='es'?'Plan activo':'Active plan'}</div>
        <div class="sub-status-val">${plan?plan[L].name:s.planId}</div>
        <div class="sub-status-label">${L==='es'?'Vence':'Expires'}: ${exp} (${daysLeft} ${L==='es'?'días restantes':'days left'})</div>
        ${s.examLimit<999?`<div class="sub-status-label">${L==='es'?'Exámenes usados':'Exams used'}: ${s.examsTaken||0} / ${s.examLimit}</div>`:''}
      </div>
    </div>`;
  }

  // Trial banner (if no subscription)
  if (!s) {
    html += `<div class="trial-banner">
      <div class="trial-ico">🎁</div>
      <div>
        <div class="trial-title">${L==='es'?'¡Empieza gratis hoy!':'Start free today!'}</div>
        <div class="trial-desc">${L==='es'?'7 días de acceso completo. Sin tarjeta de crédito requerida.':'7 days full access. No credit card required.'}</div>
      </div>
    </div>`;
  }

  html += `<div class="plans-title">${L==='es'?'Elige tu plan':'Choose your plan'}</div>
  <div class="plans-sub">${L==='es'?'Todos los planes incluyen acceso a las 96 preguntas oficiales, glosario bilingüe y tutor IA.':'All plans include access to 96 official questions, bilingual glossary, and AI tutor.'}</div>`;

  // Plan cards
  PLANS.forEach(plan => {
    const isActive = s && s.planId === plan.id;
    const rec = plan.recommended;
    html += `<div class="plan-card ${rec?'recommended':''} ${isActive?'active-plan':''}" onclick="selectPlan('${plan.id}')">
      ${plan[L].badge ? `<div class="plan-badge ${plan[L].badgeColor}">${plan[L].badge}</div>` : ''}
      ${isActive ? '<div class="plan-badge green">✓ ACTIVO</div>' : ''}
      <div class="plan-header">
        <div class="plan-name">${plan[L].name}</div>
        <div class="plan-price">
          <div class="plan-amount">${plan.priceLabel}</div>
          <span class="plan-period">${plan[L].period}</span>
        </div>
      </div>
      <div class="plan-features">
        ${plan.features[L].map(f=>`<div class="plan-feat">${f}</div>`).join('')}
        ${plan.noFeatures[L].map(f=>`<div class="plan-feat no">${f}</div>`).join('')}
      </div>
      <button class="btn-p" style="margin-top:12px;font-size:.82rem;padding:10px" onclick="event.stopPropagation();selectPlan('${plan.id}')">
        ${isActive?(L==='es'?'Plan activo':'Active plan'):(plan.price===0?(L==='es'?'Activar prueba gratuita':'Start free trial'):(L==='es'?'Seleccionar plan':'Select plan'))}
      </button>
    </div>`;
  });

  html += `<p style="font-size:.7rem;color:#94A3B8;text-align:center;margin-top:8px">
    ${L==='es'?'💳 Los pagos se procesan de forma segura a través de Stripe o Gumroad. Cancela cuando quieras.':'💳 Payments processed securely via Stripe or Gumroad. Cancel anytime.'}
  </p>
  <button class="btn-s" onclick="hidePlans()" style="width:100%;margin-top:8px">${L==='es'?'Cerrar':'Close'}</button>`;

  content.innerHTML = html;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function selectPlan(planId) {
  const plan = PLANS.find(p => p.id === planId);
  if (!plan) return;
  const s = getSubState();
  if (s && s.planId === planId) return; // already active

  if (plan.price === 0) {
    // Free trial - activate directly
    if (confirm(L==='es'?'¿Activar la prueba gratuita de 7 días?':'Activate the 7-day free trial?')) {
      activatePlan(planId);
    }
  } else {
    // Stripe payment links
    const stripeLinks = {
      biweekly: 'https://buy.stripe.com/test_7sY9AMe1EcBUeIQfWQf7i00',
      monthly:  'https://buy.stripe.com/test_00w4gs6zc8lE58g7qkf7i01',
      quarterly:'https://buy.stripe.com/test_4gMcMY3n059sasA6mgf7i02',
    };
    const link = stripeLinks[planId];
    if (link) {
      window.open(link, '_blank');
    }
  }
}

function hidePlans() {
  const overlay = document.getElementById('plansOverlay');
  if (overlay) overlay.classList.remove('open');
  document.body.style.overflow = '';
}

// Override startExam to check subscription
const _origStartExam = startExam;
startExam = function() {
  const s = getSubState();
  if (!s) {
    if (confirm(L==='es'?'Necesitas un plan activo para tomar el simulador. ¿Ver planes?':'You need an active plan to take the simulator. View plans?')) {
      showPlans();
    }
    return;
  }
  if (!canTakeExam()) {
    const msg = L==='es'
      ? `Alcanzaste el límite de ${s.examLimit} exámenes de tu plan de prueba. ¡Suscríbete para exámenes ilimitados!`
      : `You reached the ${s.examLimit} exam limit of your trial plan. Subscribe for unlimited exams!`;
    if (confirm(msg + (L==='es'?' ¿Ver planes?':' View plans?'))) showPlans();
    return;
  }
  recordExamTaken();
  _origStartExam();
};

// Close plans on overlay click
document.addEventListener('click', function(e){
  if(e.target && e.target.id==='plansOverlay') hidePlans();
});

// Init subscription nav
try{updateSubNav();}catch(e){}


</script>

  <div class="plans-panel" id="plansPanel">
    <div class="plans-handle"></div>
    <div id="plansContent"></div>
  </div>

  <span class="float-badge" id="floatBadge"></span>
</button>

  <div class="float-header">
    <div class="float-title">🧠 <span id="ftTitle">Tutor IA</span></div>
    <button class="float-close" onclick="toggleFloat()" aria-label="Cerrar tutor">✕</button>

  <div class="float-msgs" id="floatMsgs"></div>

    <input class="float-input" id="floatIn" placeholder="Escribe tu pregunta..." onkeydown="if(event.key==='Enter')sendFloat()" aria-label="Pregunta al tutor"/>
    <button class="float-send" onclick="sendFloat()" aria-label="Enviar">➤</button>

    <div class="tips-handle"></div>

  </div>
