<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>deIAvu — Prep Examen CA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F1F5F9;color:#0F172A;min-height:100vh;font-size:15px;padding-bottom:80px}
nav{background:#fff;border-bottom:2px solid #E2E8F0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.logo{color:#fff;font-weight:800;font-size:1.25rem;letter-spacing:-.03em;display:flex;align-items:center;gap:6px}
.logo .ia{color:#008bff;font-weight:800;font-size:1.25rem;letter-spacing:-.03em}
.lang-btn{background:#F1F5F9;border:1.5px solid #E2E8F0;color:#1B3A6B;font-size:.75rem;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer}
.main{max-width:720px;margin:0 auto;padding:16px 14px 20px}
/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E2E8F0;display:flex;z-index:98;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.bnt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:transparent;font-family:inherit;font-size:.6rem;font-weight:500;color:#94A3B8;cursor:pointer;gap:2px;transition:all .2s;min-height:56px}
.bnt.on{color:#1B3A6B}
.bnt .bico{font-size:1.2rem}
/* HERO */
.hero{background:linear-gradient(135deg,#1B3A6B,#312E81);border-radius:16px;padding:20px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-30px;right:-30px;width:150px;height:150px;background:rgba(255,255,255,.05);border-radius:50%}
.hero-tag{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:3px}
.hero-title{font-size:1.2rem;font-weight:700;margin-bottom:3px}
.hero-sub{font-size:.78rem;color:rgba(255,255,255,.7);margin-bottom:14px}
.hstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.hstat{background:rgba(255,255,255,.12);border-radius:10px;padding:10px;text-align:center}
.hstat-v{font-size:1.35rem;font-weight:700}
.hstat-l{font-size:.6rem;color:rgba(255,255,255,.6);margin-top:1px}
.prog-w{background:rgba(255,255,255,.2);border-radius:4px;height:5px;margin:10px 0 3px;overflow:hidden}
.prog-f{height:100%;border-radius:4px;background:#fff;transition:width .4s}
.prog-l{font-size:.67rem;color:rgba(255,255,255,.65);display:flex;justify-content:space-between}
/* STREAK BANNER */
.streak{background:linear-gradient(135deg,#EA580C,#D97706);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;color:#fff}
.streak-ico{font-size:1.8rem}
.streak-v{font-size:1.5rem;font-weight:800}
.streak-l{font-size:.75rem;color:rgba(255,255,255,.85)}
/* SECTION TITLES */
.sec{font-size:.67rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748B;margin:18px 0 10px}
/* TOPIC GRID */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.tgrid{grid-template-columns:1fr}}
.tcard{background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.tcard:active{transform:scale(.98)}
.tcard .acc{position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.tico{font-size:1.3rem;margin-bottom:5px}
.tn{font-size:.86rem;font-weight:600;margin-bottom:2px}
.td{font-size:.68rem;color:#64748B;margin-bottom:8px;line-height:1.4}
.tf{display:flex;align-items:center;justify-content:space-between}
.tpct{font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:20px}
.pn{color:#64748B;background:#F1F5F9}.pl{color:#DC2626;background:#FEF2F2}.pm{color:#D97706;background:#FFFBEB}.ph{color:#059669;background:#ECFDF5}
.tbtn{font-size:.7rem;font-weight:600;border:none;padding:5px 11px;border-radius:20px;cursor:pointer;color:#fff}
.tmini{height:3px;background:#E2E8F0;border-radius:3px;margin-top:6px;overflow:hidden}
.tmf{height:100%;border-radius:3px}
/* EXAM CARD */
.ecard{background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;padding:16px;margin-top:10px}
.ehead{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.eico{width:38px;height:38px;background:#EEF2FF;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.et{font-size:.88rem;font-weight:600}
.ed{font-size:.73rem;color:#64748B}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{font-size:.68rem;font-weight:500;padding:3px 9px;border-radius:20px;color:#1B3A6B;background:#EEF2FF}
.pill.w{color:#D97706;background:#FFFBEB}
/* BUTTONS */
.btn-p{width:100%;padding:12px;background:linear-gradient(135deg,#1B3A6B,#312E81);color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-p:active{transform:scale(.98)}
.btn-s{padding:10px 16px;background:#fff;color:#0F172A;border:1.5px solid #E2E8F0;border-radius:10px;font-size:.86rem;font-weight:500;cursor:pointer}
.btn-back{display:flex;align-items:center;gap:5px;font-size:.76rem;font-weight:500;color:#64748B;background:#fff;border:1.5px solid #E2E8F0;border-radius:20px;padding:6px 12px;cursor:pointer}
/* STUDY */
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sctr{font-size:.78rem;color:#64748B;font-family:monospace}
.sprog{height:4px;background:#E2E8F0;border-radius:4px;margin-bottom:14px;overflow:hidden}
.spf{height:100%;border-radius:4px;transition:width .3s}
.qcard{background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;padding:16px;margin-bottom:10px}
.qtag{display:inline-flex;align-items:center;gap:4px;font-size:.66rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px;margin-bottom:8px}
.qtext{font-size:.93rem;font-weight:500;line-height:1.6}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.opt{width:100%;text-align:left;padding:11px 13px;border-radius:10px;border:1.5px solid #E2E8F0;background:#fff;font-size:.84rem;color:#0F172A;cursor:pointer;transition:all .18s;display:flex;align-items:flex-start;gap:9px;line-height:1.5}
.opt:active:not(:disabled){transform:scale(.99)}
.opt.sel{border-color:#1B3A6B;background:#EEF2FF}
.opt.ok{border-color:#059669;background:#ECFDF5;color:#059669}
.opt.ng{border-color:#DC2626;background:#FEF2F2;color:#DC2626}
.opt:disabled{cursor:default}
.oltr{width:22px;height:22px;border-radius:5px;background:#F1F5F9;border:1.5px solid #E2E8F0;display:flex;align-items:center;justify-content:center;font-size:.67rem;font-weight:700;flex-shrink:0;font-family:monospace;transition:all .18s}
.opt.ok .oltr{background:#059669;border-color:#059669;color:#fff}
.opt.ng .oltr{background:#DC2626;border-color:#DC2626;color:#fff}
.opt.sel .oltr{background:#1B3A6B;border-color:#1B3A6B;color:#fff}
.expbox{border-radius:12px;padding:13px 15px;margin-bottom:10px;animation:up .22s ease}
@keyframes up{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.expok{background:#ECFDF5;border:1.5px solid #6EE7B7}
.expng{background:#FEF2F2;border:1.5px solid #FCA5A5}
.exph{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.explbl{font-size:.8rem;font-weight:700}
.expok .explbl{color:#059669}
.expng .explbl{color:#DC2626}
.expans{font-size:.76rem;color:#64748B;margin-bottom:5px}
.exptxt{font-size:.8rem;line-height:1.65;color:#1E293B}
/* TIMER */
.tbar{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1.5px solid #E2E8F0;border-radius:10px;padding:8px 13px;margin-bottom:10px}
.tval{font-family:monospace;font-size:.88rem;font-weight:500}
.tval.urg{color:#DC2626}
.btnrow{display:flex;gap:8px}.btnrow .btn-p{flex:1}
/* RESULTS */
.rhero{background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;padding:22px;text-align:center;margin-bottom:14px}
.scircle{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;margin:0 auto 11px;border:5px solid}
.scircle.pass{border-color:#059669;background:#ECFDF5}
.scircle.fail{border-color:#DC2626;background:#FEF2F2}
.snum{font-size:1.85rem;font-weight:700;line-height:1}
.scircle.pass .snum{color:#059669}
.scircle.fail .snum{color:#DC2626}
.sverd{font-size:1.05rem;font-weight:700;margin-bottom:3px}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.rstat{background:#F8FAFC;border-radius:10px;padding:9px;text-align:center}
.rsv{font-size:1.1rem;font-weight:700}
.rsl{font-size:.67rem;color:#64748B}
.rvitem{background:#fff;border:1.5px solid #E2E8F0;border-radius:10px;padding:11px;margin-bottom:7px}
.rvw{border-color:#FCA5A5}.rvr{border-color:#6EE7B7}
.rvtag{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.rvw .rvtag{color:#DC2626}.rvr .rvtag{color:#059669}
.rvq{font-size:.83rem;line-height:1.5;margin-bottom:4px}
.rvans{font-size:.74rem;color:#64748B}
/* FLASHCARDS */
.fcwrap{perspective:1000px;height:210px;cursor:pointer;margin-bottom:12px}
.fcin{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s}
.fcin.flip{transform:rotateY(180deg)}
.fcface{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:22px;text-align:center}
.fcfront{background:#fff;border:1.5px solid #E2E8F0}
.fcback{background:linear-gradient(135deg,#1B3A6B,#312E81);color:#fff;transform:rotateY(180deg)}
.fchint{font-size:.63rem;color:#94A3B8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.fcterm{font-size:1.15rem;font-weight:700;line-height:1.3;color:#0F172A}
.fcbk-h{font-size:.63rem;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.fcdef{font-size:.87rem;line-height:1.6}
.fcnav{display:flex;align-items:center;justify-content:center;gap:12px}
.fcbtn{width:36px;height:36px;border-radius:50%;border:1.5px solid #E2E8F0;background:#fff;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.fcctr{font-family:monospace;font-size:.78rem;color:#64748B}
/* GLOSSARY */
.gsearch{width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-family:inherit;font-size:.88rem;margin-bottom:14px;background:#fff;color:#0F172A}
.gsearch:focus{outline:none;border-color:#1B3A6B}
.gitem{background:#fff;border:1.5px solid #E2E8F0;border-radius:12px;padding:13px 15px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.gitem:active{transform:scale(.99)}
.gitem.open{border-color:#1B3A6B;background:#F8FAFF}
.gterm{font-size:.88rem;font-weight:600;color:#0F172A;display:flex;align-items:center;justify-content:space-between}
.gtopic{font-size:.65rem;font-weight:600;padding:2px 8px;border-radius:20px;color:#1B3A6B;background:#EEF2FF}
.gdef{font-size:.8rem;line-height:1.65;color:#1E293B;margin-top:8px;display:none}
.gdef.show{display:block;animation:up .2s ease}
.gen{font-size:.78rem;color:#64748B;margin-top:5px;font-style:italic}
/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month{font-size:1rem;font-weight:700;color:#0F172A}
.cal-nav{width:32px;height:32px;border-radius:50%;border:1.5px solid #E2E8F0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
.cal-day-name{text-align:center;font-size:.62rem;font-weight:600;color:#94A3B8;text-transform:uppercase;padding:4px 0}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .2s;border:1.5px solid transparent;background:#fff;border-color:#E2E8F0;position:relative}
.cal-day.today{border-color:#1B3A6B;color:#1B3A6B;font-weight:700}
.cal-day.studied{background:linear-gradient(135deg,#059669,#047857);color:#fff;border-color:transparent}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default}
.cal-day.future{color:#CBD5E1;border-color:#F1F5F9}
.motiv-card{background:linear-gradient(135deg,#312E81,#1B3A6B);border-radius:14px;padding:18px;margin-bottom:14px;color:#fff;text-align:center}
.motiv-quote{font-size:.95rem;font-style:italic;line-height:1.6;margin-bottom:8px}
.motiv-author{font-size:.7rem;color:rgba(255,255,255,.6)}
.streak-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.streak-card{background:#fff;border:1.5px solid #E2E8F0;border-radius:12px;padding:12px;text-align:center}
.streak-v{font-size:1.4rem;font-weight:700;color:#1B3A6B}
.streak-l{font-size:.68rem;color:#64748B;margin-top:2px}
/* TUTOR */
.chat-wrap{background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;overflow:hidden;margin-bottom:12px}
.chat-msgs{height:320px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:88%;padding:10px 13px;border-radius:12px;font-size:.83rem;line-height:1.6;animation:up .2s ease}
.msg.bot{background:#EEF2FF;color:#0F172A;border-radius:12px 12px 12px 4px;align-self:flex-start}
.msg.user{background:linear-gradient(135deg,#1B3A6B,#312E81);color:#fff;border-radius:12px 12px 4px 12px;align-self:flex-end}
.msg.typing{background:#F1F5F9;color:#94A3B8}
.chat-input-wrap{display:flex;gap:8px;padding:12px;border-top:1px solid #E2E8F0;background:#F8FAFC}
.chat-input{flex:1;padding:10px 13px;border:1.5px solid #E2E8F0;border-radius:10px;font-family:inherit;font-size:.84rem;background:#fff}
.chat-input:focus{outline:none;border-color:#1B3A6B}
.chat-send{width:40px;height:40px;background:linear-gradient(135deg,#1B3A6B,#312E81);border:none;border-radius:10px;color:#fff;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tutor-tips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tip-btn{font-size:.72rem;font-weight:500;padding:5px 11px;border-radius:20px;border:1.5px solid #E0E7FF;background:#EEF2FF;color:#1B3A6B;cursor:pointer}
/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.dash-card{background:#fff;border:1.5px solid #E2E8F0;border-radius:12px;padding:13px}
.dash-v{font-size:1.5rem;font-weight:700;color:#1B3A6B}
.dash-l{font-size:.7rem;color:#64748B;margin-top:2px}
.dash-bar-wrap{margin-top:10px}
.dash-topic{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.dash-tn{font-size:.76rem;color:#0F172A;width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-bar{flex:1;height:7px;background:#E2E8F0;border-radius:4px;overflow:hidden}
.dash-barf{height:100%;border-radius:4px;transition:width .5s}
.dash-pct{font-size:.7rem;font-weight:600;width:32px;text-align:right}
/* INFO */
.info{background:#EEF2FF;border:1.5px solid #E0E7FF;border-radius:10px;padding:10px 13px;font-size:.74rem;color:#1B3A6B;margin-bottom:14px;line-height:1.5}
.wk{background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:12px;padding:11px 13px;margin-bottom:14px;display:flex;gap:9px}
.wkchips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.wkchip{font-size:.67rem;font-weight:500;padding:3px 9px;border-radius:20px;background:#fff;border:1px solid #FDE68A;color:#D97706;cursor:pointer}
.fade{animation:fadein .25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* FLOATING TUTOR */
.float-btn{position:fixed;bottom:72px;right:16px;z-index:200;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1B3A6B,#312E81);border:none;color:#fff;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 20px rgba(27,58,107,.4);display:flex;align-items:center;justify-content:center;transition:all .2s}
.float-btn:active{transform:scale(.95)}
.float-badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:#DC2626;border:2px solid #fff;display:none}
.float-badge.show{display:block}
.float-panel{position:fixed;bottom:136px;right:16px;width:min(340px, calc(100vw - 32px));background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.18);z-index:199;display:none;flex-direction:column;overflow:hidden;border:1.5px solid #E2E8F0}
.float-panel.open{display:flex;animation:slideup .25s ease}
@keyframes slideup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.float-header{background:linear-gradient(135deg,#1B3A6B,#312E81);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.float-title{color:#fff;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:6px}
.float-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}
.float-msgs{height:240px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:#F8FAFC}
.float-msg{max-width:90%;padding:8px 11px;border-radius:10px;font-size:.8rem;line-height:1.55;animation:up .2s ease}
.float-msg.bot{background:#EEF2FF;color:#0F172A;align-self:flex-start;border-radius:10px 10px 10px 3px}
.float-msg.user{background:linear-gradient(135deg,#1B3A6B,#312E81);color:#fff;align-self:flex-end;border-radius:10px 10px 3px 10px}
.float-input-area{display:flex;gap:6px;padding:10px;border-top:1px solid #E2E8F0;background:#fff}
.float-input{flex:1;padding:8px 11px;border:1.5px solid #E2E8F0;border-radius:8px;font-family:inherit;font-size:.82rem}
.float-input:focus{outline:none;border-color:#1B3A6B}
.float-send{width:36px;height:36px;background:linear-gradient(135deg,#1B3A6B,#312E81);border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:.9rem;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.float-quick{display:flex;gap:5px;padding:8px 10px 0;flex-wrap:wrap}
.float-q-btn{font-size:.66rem;padding:3px 8px;border:1.5px solid #E0E7FF;background:#EEF2FF;color:#1B3A6B;border-radius:20px;cursor:pointer;white-space:nowrap}

/* ACCESSIBILITY */
.a11y-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;background:#fff;border-bottom:1px solid #E2E8F0;justify-content:flex-end}
.a11y-btn{border:1.5px solid #E2E8F0;background:#fff;border-radius:6px;padding:4px 9px;font-family:inherit;font-size:.72rem;font-weight:600;cursor:pointer;color:#0F172A;transition:all .2s}
.a11y-btn.on{background:#1B3A6B;color:#fff;border-color:#1B3A6B}
.a11y-btn:focus{outline:2px solid #1B3A6B;outline-offset:2px}
body.hc{background:#000!important;color:#fff!important}
body.hc .tcard,body.hc .qcard,body.hc .ecard,body.hc .gitem,body.hc .chat-wrap,body.hc .float-panel,body.hc .rhero,body.hc .rvitem,body.hc .dash-card,body.hc .streak-card,body.hc .motiv-card{background:#111!important;border-color:#555!important;color:#fff!important}
body.hc .bnav,body.hc .a11y-bar{background:#111!important;border-color:#555!important}
body.hc .bnt{color:#aaa!important}
body.hc .bnt.on{color:#fff!important}
body.hc .opt{background:#111!important;border-color:#555!important;color:#fff!important}
body.hc .gsearch{background:#111!important;border-color:#555!important;color:#fff!important}
body.hc .gitem{background:#111!important}
body.hc .float-msgs{background:#1a1a1a!important}
body.hc .float-msg.bot{background:#222!important;color:#fff!important}
body.hc .tn,.hc .td,.hc .dash-l,.hc .rsl,.hc .sctr,.hc .sec{color:#ddd!important}
html.fs-lg{font-size:17px}
html.fs-xl{font-size:20px}
html.fs-lg body, html.fs-xl body,
html.fs-lg .opt, html.fs-xl .opt,
html.fs-lg .qtext, html.fs-xl .qtext,
html.fs-lg .tn, html.fs-xl .tn,
html.fs-lg .td, html.fs-xl .td,
html.fs-lg .exptxt, html.fs-xl .exptxt,
html.fs-lg .gdef, html.fs-xl .gdef,
html.fs-lg .gterm, html.fs-xl .gterm,
html.fs-lg .float-msg, html.fs-xl .float-msg,
html.fs-lg .tip-desc, html.fs-xl .tip-desc,
html.fs-lg .fcdef, html.fs-xl .fcdef,
html.fs-lg .fcterm, html.fs-xl .fcterm,
html.fs-lg .msg, html.fs-xl .msg,
html.fs-lg .rsv, html.fs-xl .rsv,
html.fs-lg .dash-v, html.fs-xl .dash-v{font-size:inherit!important}

/* LOGO ICON (deiavu isotipo) */
.logo-icon{width:26px;height:26px;flex-shrink:0;color:rgba(255,255,255,.92)}


/* NAV LOGO */
.nav-brand{display:flex;align-items:center}
.nav-logo-row{display:flex;align-items:center;gap:8px}
.nav-isotipo{width:46px;height:46px;flex-shrink:0;display:block}
.nav-wordmark{height:52px;width:auto;display:block}

/* LOGO TAGLINE */
.nav-brand{display:flex;flex-direction:column;line-height:1}
.nav-tagline{font-size:.52rem;color:rgba(255,255,255,.65);letter-spacing:.04em;font-weight:400;margin-top:2px}

/* TIPS MODAL */
.tips-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;padding:0}
.tips-panel{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:720px;max-height:85vh;overflow-y:auto;padding:20px 18px 40px}
.tips-handle{width:36px;height:4px;background:#E2E8F0;border-radius:2px;margin:0 auto 16px}
.tip-item{display:flex;gap:12px;padding:13px;background:#F8FAFC;border-radius:12px;margin-bottom:10px;border-left:3px solid #1B3A6B}
.tip-ico{font-size:1.3rem;flex-shrink:0}
.tip-title{font-size:.86rem;font-weight:600;color:#0F172A;margin-bottom:3px}
.tip-desc{font-size:.78rem;color:#64748B;line-height:1.55}

/* SKIP LINK (accessibility) */
.skip-link{position:absolute;top:-100%;left:0;background:#1B3A6B;color:#fff;padding:8px 16px;z-index:999;font-size:.85rem;border-radius:0 0 8px 0}
.skip-link:focus{top:0}

/* FOCUS VISIBLE */
button:focus-visible,input:focus-visible,a:focus-visible{outline:3px solid #F59E0B!important;outline-offset:2px!important}


/* SUBSCRIPTION / PLANS */
.plans-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;display:none;align-items:flex-end;justify-content:center}
.plans-overlay.open{display:flex;animation:fadein .2s ease}
.plans-panel{background:#F8FAFC;border-radius:22px 22px 0 0;width:100%;max-width:720px;max-height:92vh;overflow-y:auto;padding:20px 16px 50px}
.plans-handle{width:36px;height:4px;background:#CBD5E1;border-radius:2px;margin:0 auto 18px}
.plans-title{font-size:1.1rem;font-weight:700;color:#0F172A;margin-bottom:3px}
.plans-sub{font-size:.78rem;color:#64748B;margin-bottom:20px}
.plan-card{background:#fff;border:2px solid #E2E8F0;border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all .2s;position:relative}
.plan-card:active{transform:scale(.99)}
.plan-card.recommended{border-color:#1B3A6B;box-shadow:0 4px 20px rgba(27,58,107,.15)}
.plan-card.active-plan{border-color:#059669;background:#F0FDF4}
.plan-badge{position:absolute;top:-1px;right:14px;background:#1B3A6B;color:#fff;font-size:.62rem;font-weight:700;padding:3px 10px;border-radius:0 0 8px 8px;letter-spacing:.05em;text-transform:uppercase}
.plan-badge.green{background:#059669}
.plan-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.plan-name{font-size:.95rem;font-weight:700;color:#0F172A}
.plan-price{text-align:right}
.plan-amount{font-size:1.25rem;font-weight:800;color:#1B3A6B}
.plan-period{font-size:.68rem;color:#94A3B8;display:block}
.plan-features{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.plan-feat{font-size:.76rem;color:#475569;display:flex;align-items:center;gap:6px}
.plan-feat::before{content:"✓";color:#059669;font-weight:700;flex-shrink:0}
.plan-feat.no::before{content:"✗";color:#94A3B8}
.plan-feat.no{color:#94A3B8}
.trial-banner{background:linear-gradient(135deg,#059669,#047857);border-radius:14px;padding:16px;margin-bottom:16px;color:#fff;display:flex;gap:12px;align-items:center}
.trial-ico{font-size:1.8rem}
.trial-title{font-size:.9rem;font-weight:700;margin-bottom:2px}
.trial-desc{font-size:.76rem;color:rgba(255,255,255,.8)}
.sub-status{background:#fff;border:1.5px solid #E2E8F0;border-radius:12px;padding:13px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.sub-status-ico{font-size:1.4rem}
.sub-status-label{font-size:.72rem;color:#64748B}
.sub-status-val{font-size:.88rem;font-weight:600;color:#0F172A}
.sub-status.active-sub{border-color:#059669;background:#F0FDF4}
.lock-overlay{position:absolute;inset:0;background:rgba(255,255,255,.85);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;z-index:10}
.lock-ico{font-size:2rem}
.lock-msg{font-size:.8rem;font-weight:600;color:#64748B;text-align:center;padding:0 20px}
.lock-btn{font-size:.75rem;font-weight:600;background:#1B3A6B;color:#fff;border:none;padding:7px 16px;border-radius:20px;cursor:pointer;margin-top:4px}
.nav-sub-btn{background:#1B3A6B;border:1px solid #1B3A6B;color:#fff;font-size:.68rem;font-weight:600;padding:4px 10px;border-radius:20px;cursor:pointer;white-space:nowrap}
.trial-counter{background:rgba(255,255,255,.2);border-radius:8px;padding:4px 10px;font-size:.72rem;font-weight:700;color:#fff;text-align:center;margin-top:6px}

</style>
</head>

  {id:'umb',    icon:'☂️',color:'#374151',es:{n:'Paraguas Personal',         d:'Exceso de responsabilidad, SIR, exclusiones'},en:{n:'Personal Umbrella',        d:'Excess liability, SIR, exclusions'}},

// GLOSSARY (60 terms)
const GLOSS=[
  {t:`PAP — Personal Auto Policy`,tp:`auto`,es:`Póliza de Auto Personal. Seguro estándar para vehículos de uso personal. Cubre: Responsabilidad Civil (BI/PD), Colisión, Cobertura Integral, MedPay, UM/UIM. NO cubre uso comercial como Uber o entregas.`,en:`Personal Auto Policy — standard insurance for personal vehicles. Covers: Liability (BI/PD), Collision, Comprehensive, MedPay, UM/UIM. Does NOT cover commercial use like Uber or deliveries.`},
  {t:`BI — Bodily Injury`,tp:`auto`,es:`Lesiones Corporales. Parte de la responsabilidad civil de auto que paga por lesiones físicas causadas a OTROS en un accidente donde el asegurado tiene la culpa. Cubre gastos médicos y demandas.`,en:`Bodily Injury — part of auto liability that pays for physical injuries caused to OTHERS in an accident where the insured is at fault. Covers medical expenses and lawsuits.`},
  {t:`PD — Property Damage`,tp:`auto`,es:`Daños a la Propiedad. Parte de la responsabilidad civil que paga por daños causados a la PROPIEDAD de otros (su carro, una barda, un poste). Mínimo en CA: $5,000.`,en:`Property Damage — part of liability that pays for damage to OTHERS' property (their car, a fence, a pole). California minimum: $5,000.`},
  {t:`UM/UIM — Uninsured/Underinsured Motorist`,tp:`auto`,es:`Motorista No Asegurado / Insuficientemente Asegurado. Protege al asegurado cuando el conductor culpable no tiene seguro (UM) o no tiene suficiente (UIM). En CA las aseguradoras deben ofrecerla; el asegurado puede rechazarla por escrito.`,en:`Protects the insured when the at-fault driver has no insurance (UM) or insufficient insurance (UIM). In CA insurers must offer it; the insured may reject it in writing.`},
  {t:`MedPay — Medical Payments`,tp:`auto`,es:`Pagos Médicos. Cobertura sin culpa que paga gastos médicos y funerarios para el asegurado nominado y TODOS los pasajeros, sin importar quién causó el accidente.`,en:`No-fault coverage that pays medical and funeral expenses for the named insured and ALL passengers, regardless of who caused the accident.`},
  {t:`Colisión`,tp:`auto`,es:`Cubre daños al vehículo PROPIO del asegurado cuando impacta contra otro vehículo u objeto fijo, sin importar la culpa. Es OPCIONAL en California.`,en:`Collision — covers damage to the insured\'s OWN vehicle when it impacts another vehicle or fixed object, regardless of fault. OPTIONAL in California.`},
  {t:`Cobertura Integral (OTC)`,tp:`auto`,es:`Other Than Collision. Cubre pérdidas al vehículo propio que NO son por colisión: incendio, robo, vandalismo, granizo, animales, inundación. También OPCIONAL.`,en:`Other Than Collision (Comprehensive) — covers losses to the insured\'s own vehicle NOT caused by collision: fire, theft, vandalism, hail, animals, flood. Also OPTIONAL.`},
  {t:`Límites 15/30/5 California`,tp:`auto`,es:`Mínimos de responsabilidad civil de auto en CA: $15,000 por persona (BI), $30,000 total por accidente (BI), $5,000 daños a la propiedad (PD). Son el mínimo LEGAL — siempre recomendar más.`,en:`California auto liability minimums: $15,000/person (BI), $30,000/accident (BI), $5,000 property damage (PD). These are LEGAL minimums — always recommend higher limits.`},
  {t:`Proposición 103`,tp:`regs`,es:`Ley de California (1988) que requiere aprobación previa del CDI para aumentos de tarifas de auto. Los 3 factores principales: (1) Historial de manejo seguro, (2) Millas anuales, (3) Años de experiencia. El código postal y el crédito NO pueden ser factores principales.`,en:`California law (1988) requiring CDI prior approval for auto rate increases. 3 primary factors: (1) Driving safety record, (2) Annual miles driven, (3) Years of experience. ZIP code and credit CANNOT be primary factors.`},
  {t:`HO-3 — Forma Especial`,tp:`home`,es:`La póliza de propietarios más vendida. Perils ABIERTOS en la VIVIENDA (Coberturas A y B) + Perils NOMBRADOS en PROPIEDAD PERSONAL (Cobertura C). La vivienda cubierta para TODAS las pérdidas excepto las excluidas.`,en:`Most common homeowners policy. OPEN perils on DWELLING (Coverages A & B) + NAMED perils on PERSONAL PROPERTY (Coverage C). Dwelling covered for ALL losses EXCEPT those excluded.`},
  {t:`Coberturas HO: A, B, C, D, E, F`,tp:`home`,es:`A=Vivienda (estructura principal) · B=Otras Estructuras (10% de A, garaje separado, cerca) · C=Propiedad Personal (contenido) · D=Pérdida de Uso (gastos adicionales de vida) · E=Responsabilidad Civil Personal · F=Pagos Médicos a Otros`,en:`A=Dwelling (main structure) · B=Other Structures (10% of A, detached garage, fence) · C=Personal Property (contents) · D=Loss of Use (extra living expenses) · E=Personal Liability · F=Medical Payments to Others`},
  {t:`HO-4 — Seguro de Inquilinos`,tp:`home`,es:`Renters Insurance. Cubre la propiedad personal del INQUILINO y su responsabilidad civil personal. NO cubre el edificio — eso es responsabilidad del propietario.`,en:`Renters Insurance. Covers the TENANT's personal property and personal liability. Does NOT cover the building — that\'s the landlord\'s responsibility.`},
  {t:`HO-6 — Seguro de Condominio`,tp:`home`,es:`Para propietarios de unidades de condominio. Cubre el interior "desde las paredes hacia adentro" (mejoras, pisos, gabinetes), propiedad personal y responsabilidad civil. El edificio y áreas comunes son responsabilidad de la asociación.`,en:`For condo unit owners. Covers interior "walls-in" (improvements, floors, cabinets), personal property, and liability. Building and common areas are the association\'s responsibility.`},
  {t:`HO-8 — Forma Modificada`,tp:`home`,es:`Para casas antiguas donde el costo de reconstrucción supera significativamente el valor de mercado. Paga el menor entre el costo de reparación o el valor de mercado, en lugar del costo de reposición completo.`,en:`For older homes where reconstruction cost significantly exceeds market value. Pays the lesser of repair cost or market value, rather than full replacement cost.`},
  {t:`Exclusión de Inundación`,tp:`home`,es:`Las INUNDACIONES están excluidas de TODAS las pólizas HO estándar (HO-1 hasta HO-8). Se requiere seguro separado a través del NFIP (National Flood Insurance Program) o una aseguradora privada.`,en:`FLOOD is excluded from ALL standard HO policies (HO-1 through HO-8). Separate insurance required through NFIP (National Flood Insurance Program) or private insurer.`},
  {t:`Exclusión de Terremoto`,tp:`home`,es:`Los TERREMOTOS están excluidos de todas las pólizas HO estándar en California. Debe comprarse por separado a través de la CEA (California Earthquake Authority) o una aseguradora privada.`,en:`EARTHQUAKES are excluded from all standard HO policies in California. Must be purchased separately through CEA (California Earthquake Authority) or private insurer.`},
  {t:`Exclusión de Materia Microbiana`,tp:`home`,es:`El moho, hongos, putrefacción seca y materia microbiana son EXCLUSIONES ESTÁNDAR en las pólizas HO de California. Incluso si resulta de una fuga cubierta, la remediación del moho típicamente está excluida.`,en:`Mold, fungus, dry rot, and microbial matter are STANDARD EXCLUSIONS in California HO policies. Even if resulting from a covered water leak, mold remediation is typically excluded.`},
  {t:`Exclusión de Ordenanza o Ley`,tp:`home`,es:`Los costos ADICIONALES para actualizar el hogar a los códigos de construcción actuales después de una pérdida cubierta NO están cubiertos, a menos que se añada el endoso de Ordenanza o Ley. Especialmente importante para casas antiguas en CA.`,en:`EXTRA costs to update the home to current building codes after a covered loss are NOT covered, unless the Ordinance or Law endorsement is added. Especially important for older CA homes.`},
  {t:`ACV — Valor en Efectivo Real`,tp:`conc`,es:`Actual Cash Value = Costo de Reposición MENOS Depreciación. La depreciación refleja la edad, el desgaste y la obsolescencia del artículo. ACV paga MENOS que el costo de reposición.`,en:`Actual Cash Value = Replacement Cost Value MINUS Depreciation. Depreciation reflects age, wear, and obsolescence. ACV pays LESS than replacement cost.`},
  {t:`RCV — Costo de Reposición`,tp:`conc`,es:`Replacement Cost Value. Paga para reparar/reemplazar con materiales nuevos SIN deducción de depreciación. Las pólizas RCV cuestan más en prima pero pagan significativamente más al momento de una pérdida.`,en:`Replacement Cost Value — pays to repair/replace with new materials WITHOUT depreciation deduction. RCV policies cost more in premium but pay significantly more at claim time.`},
  {t:`Indemnización`,tp:`conc`,es:`Principio fundamental del seguro P&C. El seguro debe restaurar al asegurado a la misma posición financiera que antes de la pérdida — ni mejor ni peor. Previene que las personas se beneficien de las pérdidas.`,en:`Fundamental P&C insurance principle. Insurance should restore the insured to the same financial position as before the loss — no better, no worse. Prevents people from profiting from losses.`},
  {t:`Subrogación`,tp:`conc`,es:`Después de pagar una reclamación, la aseguradora se pone en el lugar del asegurado y puede demandar al tercero responsable para recuperar lo pagado. Previene la doble compensación del asegurado.`,en:`After paying a claim, the insurer steps into the insured\'s shoes and can sue the responsible third party. Prevents the insured from collecting twice (from both the insurer and the at-fault party).`},
  {t:`Interés Asegurable`,tp:`conc`,es:`Para el seguro de PROPIEDAD: debe existir tanto al inicio de la póliza como en el momento de la pérdida. Sin interés asegurable, la póliza es nula. Tienen interés asegurable: propietarios, prestamistas hipotecarios, inquilinos.`,en:`For PROPERTY insurance: must exist at policy inception AND at time of loss. Without insurable interest, the policy is void. Those with insurable interest: owners, mortgagees, lessees.`},
  {t:`Peril vs. Peligro (Hazard) vs. Riesgo`,tp:`conc`,es:`PERIL = la CAUSA de la pérdida (incendio, robo, tormenta). PELIGRO (Hazard) = condición que AUMENTA la probabilidad de un peril (gasolina cerca de una caldera = peligro físico). RIESGO = la incertidumbre de que ocurra una pérdida.`,en:`PERIL = the CAUSE of loss (fire, theft, windstorm). HAZARD = condition that INCREASES peril likelihood (gas near furnace = physical hazard). RISK = the uncertainty of loss occurring.`},
  {t:`Riesgo Moral vs. Riesgo de Morale`,tp:`conc`,es:`MORAL = deshonestidad INTENCIONAL para beneficiarse del seguro (fraude, incendio provocado). MORALE = indiferencia DESCUIDADA porque "de todos modos tengo seguro" (no cerrar puertas). Ambos aumentan el riesgo.`,en:`MORAL hazard = INTENTIONAL dishonesty to profit from insurance (fraud, arson). MORALE hazard = CARELESS indifference because "I have insurance anyway" (not locking doors). Both increase risk.`},
  {t:`Negligencia — 4 Elementos`,tp:`conc`,es:`Para probar negligencia y activar cobertura de responsabilidad: (1) DEBER de cuidado existía, (2) INCUMPLIMIENTO del deber, (3) CAUSA PRÓXIMA vincula el incumplimiento al daño, (4) DAÑOS REALES resultaron. Falta un elemento = no hay negligencia.`,en:`To prove negligence and trigger liability coverage: (1) DUTY of care existed, (2) BREACH of duty, (3) PROXIMATE CAUSE links breach to harm, (4) ACTUAL DAMAGES resulted. Miss one = no negligence.`},
  {t:`Coaseguro (Coinsurance)`,tp:`conc`,es:`El asegurado debe llevar al menos el 80% del valor de la propiedad o se convierte en "coasegurador" del déficit. Fórmula: (Cobertura Llevada ÷ Cobertura Requerida) × Pérdida = Pago. Incentiva asegurar a valor adecuado.`,en:`Insured must carry at least 80% of property value or becomes "co-insurer" of the shortfall. Formula: (Coverage Carried ÷ Coverage Required) × Loss = Payment. Incentivizes adequate coverage.`},
  {t:`Causa Próxima`,tp:`conc`,es:`La causa EFICIENTE y DOMINANTE que pone en movimiento una cadena ininterrumpida de eventos que lleva a una pérdida. Las aseguradoras usan la causa próxima para determinar si una pérdida está cubierta.`,en:`The EFFICIENT and DOMINANT cause that sets in motion an unbroken chain of events leading to a loss. Insurers use proximate cause to determine if a loss is covered under the policy.`},
  {t:`Ley de los Grandes Números`,tp:`conc`,es:`A medida que aumenta el número de unidades de exposición similares (personas, casas, autos), la experiencia de pérdidas reales se vuelve más PREDECIBLE y cercana a las pérdidas esperadas. Permite a las aseguradoras fijar primas precisas.`,en:`As the number of similar exposure units increases, actual loss experience becomes more PREDICTABLE and closer to expected losses. Enables insurers to set accurate premiums and remain financially stable.`},
  {t:`Aseguradora Admitida vs. No Admitida`,tp:`conc`,es:`ADMITIDA: con licencia del CDI, tarifas/formas aprobadas, cubierta por CIGA si es insolvente. NO ADMITIDA (Líneas Excedentes): sin licencia en CA, para riesgos difíciles de asegurar, NO cubierta por CIGA, debe colocarse a través de un corredor de líneas excedentes.`,en:`ADMITTED: licensed by CDI, rates/forms approved, covered by CIGA if insolvent. NON-ADMITTED (Surplus Lines): not licensed in CA, for hard-to-place risks, NOT covered by CIGA, must be placed through surplus lines broker.`},
  {t:`CDI — Departamento de Seguros de CA`,tp:`regs`,es:`California Department of Insurance. Encabezado por el Comisionado de Seguros, que es un funcionario ELECTO de forma independiente (no nombrado). Regula tarifas, otorga licencias, investiga fraudes y defiende a los consumidores.`,en:`California Department of Insurance. Led by the Insurance Commissioner, an independently ELECTED official (not appointed). Regulates rates, licenses producers, investigates fraud, advocates for consumers.`},
  {t:`Regulaciones de Prácticas de Reclamaciones`,tp:`regs`,es:`California requiere que las aseguradoras: confirmen la recepción de una reclamación en 15 DÍAS CALENDARIO; realicen investigaciones razonables; no retrasen pagos injustificadamente; no tergiversen las disposiciones de la póliza.`,en:`California requires insurers to: acknowledge receipt of a claim within 15 CALENDAR DAYS; conduct reasonable investigations; not delay payments unjustifiably; not misrepresent policy provisions.`},
  {t:`Renovación de Licencia de Productor CA`,tp:`regs`,es:`Cada 2 AÑOS. Requiere 24 horas de Educación Continua (CE) por ciclo, incluyendo 3 horas OBLIGATORIAS de ética. La CE debe completarse ANTES de que venza la licencia.`,en:`Every 2 YEARS. Requires 24 hours of Continuing Education (CE) per renewal cycle, including 3 MANDATORY hours of ethics. CE must be completed BEFORE the license expires.`},
  {t:`Rebating — Prohibido en CA`,tp:`regs`,es:`Dar parte de la comisión, regalos, mercancía o cualquier cosa de valor para inducir la compra de seguros está PROHIBIDO en California bajo la Sección 750 del CIC. Viola la ley de prácticas desleales. Puede resultar en suspensión o revocación de la licencia.`,en:`Giving part of a commission, gifts, merchandise, or anything of value to induce an insurance purchase is PROHIBITED in California under CIC Section 750. Violates unfair trade practices law. Can result in license suspension or revocation.`},
  {t:`Aviso de No Renovación CA`,tp:`regs`,es:`Estándar: 45 días de aviso escrito antes de la no renovación. En Zonas de Alta Severidad de Peligro de Incendio (HFHSZ): MÍNIMO 75 DÍAS. Cancelación por impago: 10 días. Cancelación a mitad de vigencia: 20 días.`,en:`Standard: 45 days written notice before non-renewal. In High Fire Hazard Severity Zones (HFHSZ): MINIMUM 75 DAYS. Cancellation for non-payment: 10 days. Mid-term cancellation: 20 days.`},
  {t:`AB 451 — Exámenes en Múltiples Idiomas`,tp:`regs`,es:`Assembly Bill 451 (efectivo 1 enero 2024). Requiere que el CDI ofrezca exámenes de licencia en español, coreano, chino simplificado, vietnamita. Tagalo añadido el 1 julio 2024.`,en:`Assembly Bill 451 (effective January 1, 2024). Requires CDI to offer license exams in Spanish, Korean, Simplified Chinese, Vietnamese. Tagalog added July 1, 2024.`},
  {t:`Plan FAIR de California`,tp:`fire`,es:`Fair Access to Insurance Requirements. Asegurador de ÚLTIMO RECURSO — proporciona cobertura básica contra incendios a propietarios rechazados en el mercado estándar. Cobertura limitada comparada con HO-3 estándar. Se combina con póliza DIC para cobertura más amplia.`,en:`Fair Access to Insurance Requirements. Insurer of LAST RESORT — provides basic fire coverage to property owners denied in the standard market. Limited coverage compared to standard HO-3. Often combined with DIC policy for broader protection.`},
  {t:`CEA — Autoridad de Terremotos de CA`,tp:`fire`,es:`California Earthquake Authority. Proporciona seguro residencial de terremotos a través de aseguradoras privadas participantes. Creada tras el terremoto de Northridge de 1994. Deducibles altos (10-25%). Separada de la póliza HO estándar.`,en:`California Earthquake Authority. Provides residential earthquake insurance through participating private insurers. Created after the 1994 Northridge earthquake. High deductibles (10-25%). Separate from standard HO policy.`},
  {t:`Espacio Defensivo California`,tp:`fire`,es:`La ley de California (PRC §4291) requiere 100 PIES de espacio defensivo alrededor de estructuras en áreas de riesgo de incendio. Zona 1 (0-30 pies): limpio/despejado/verde. Zona 2 (30-100 pies): reducir combustible.`,en:`California law (PRC §4291) requires 100 FEET of defensible space around structures in fire risk areas. Zone 1 (0-30 ft): lean/clean/green. Zone 2 (30-100 ft): reduce fuel load.`},
  {t:`Moratoria de No Renovación — Incendios`,tp:`fire`,es:`Cuando el Gobernador declara Estado de Emergencia por incendio forestal, se activa automáticamente una MORATORIA DE NO RENOVACIÓN para hogares en áreas afectadas. Las aseguradoras NO pueden no renovar pólizas durante ese período. Dura 1 año.`,en:`When the Governor declares a wildfire State of Emergency, a NON-RENEWAL MORATORIUM automatically activates for homes in affected areas. Insurers CANNOT non-renew policies during that period. Lasts 1 year.`},
  {t:`NFIP — Seguro Nacional de Inundaciones`,tp:`fire`,es:`National Flood Insurance Program. Programa federal (FEMA) que proporciona seguro de inundaciones porque las aseguradoras privadas excluyen las inundaciones. Disponible a través de compañías WYO (Write-Your-Own) y directamente de FEMA.`,en:`National Flood Insurance Program. Federal program (FEMA) providing flood insurance because private insurers exclude floods. Available through WYO (Write-Your-Own) companies and directly from FEMA.`},
  {t:`Estrategia de Seguro Sostenible 2023`,tp:`fire`,es:`Reformas del Comisionado Lara (2023). Permite a aseguradoras usar modelos catastrófico prospectivos para fijar tarifas, incluir costos de reaseguro en cálculos de tarifas, y requiere que aseguradoras que escriben en áreas de bajo riesgo también escriban en áreas de alto riesgo.`,en:`Commissioner Lara's reforms (2023). Allows insurers to use forward-looking catastrophe models for rate setting, include reinsurance costs in rate calculations, and requires insurers writing in lower-risk areas to also write in high-risk areas.`},
  {t:`Póliza DP-1, DP-2, DP-3`,tp:`dwelling`,es:`DP-1 (Básico): solo incendio, rayo, explosión interna. DP-2 (Amplio): lista más extensa de perils nombrados. DP-3 (Especial): perils ABIERTOS para la vivienda — el más amplio. DIFERENCIA CLAVE vs. HO: la responsabilidad civil NO está incluida — debe añadirse por endoso.`,en:`DP-1 (Basic): only fire, lightning, internal explosion. DP-2 (Broad): wider named perils. DP-3 (Special): OPEN perils on dwelling — the broadest. KEY DIFFERENCE from HO: liability is NOT included — must add by endorsement.`},
  {t:`Valor de Renta Justo (Fair Rental Value)`,tp:`dwelling`,es:`Cobertura D en pólizas DP. Reembolsa al PROPIETARIO el ingreso de renta que habría recibido si la propiedad no hubiera sido dañada por una pérdida cubierta. Equivalente a Pérdida de Uso en pólizas HO.`,en:`Coverage D in DP policies. Reimburses the LANDLORD for the rental income they would have received if the property had not been damaged by a covered loss. Equivalent to Loss of Use in HO policies.`},
  {t:`Cláusula de Vacancia`,tp:`dwelling`,es:`En pólizas DP, si la propiedad ha estado VACÍA por más de 60 DÍAS CONSECUTIVOS, ciertas coberturas se restringen o eliminan (como vandalismo, daños por agua). El propietario debe notificar a la aseguradora cuando una propiedad queda vacía.`,en:`In DP policies, if the property has been VACANT for more than 60 CONSECUTIVE DAYS, certain coverages are restricted or eliminated (like vandalism, water damage). Landlords should notify their insurer when properties become vacant.`},
  {t:`Propiedad Personal Programada (SPP)`,tp:`inland`,es:`Scheduled Personal Property. Endoso a póliza HO que proporciona cobertura de perils ABIERTOS (sin deducible) para artículos específicos y valiosos con su propio límite programado. Ideal para joyas, bellas artes, cámaras, instrumentos musicales.`,en:`Scheduled Personal Property. HO endorsement providing OPEN-peril coverage (no deductible) for specific valuable items with their own scheduled limit. Ideal for jewelry, fine art, cameras, musical instruments.`},
  {t:`Sublímites HO — Propiedad Personal`,tp:`inland`,es:`La póliza HO estándar tiene sublímites para artículos de alto valor: Joyas/relojes/pieles = $1,500 · Efectivo/monedas = $200 · Armas de fuego = $2,500 · Platería = $2,500 · Valores/escrituras = $1,500. Para cobertura completa: añadir endoso SPP.`,en:`Standard HO has sublimits for high-value items: Jewelry/watches/furs = $1,500 · Cash/coins = $200 · Firearms = $2,500 · Silverware = $2,500 · Securities/deeds = $1,500. For full coverage: add SPP endorsement.`},
  {t:`Póliza DIC — Diferencia en Condiciones`,tp:`inland`,es:`Difference in Conditions. Llena las BRECHAS de cobertura entre la póliza base y lo que el asegurado necesita. Más comúnmente se combina con el Plan FAIR de CA: el Plan FAIR provee cobertura básica contra incendios y la DIC cubre responsabilidad civil, robo, daños por agua.`,en:`Difference in Conditions — fills coverage GAPS between the base policy and what the insured needs. Most commonly combined with CA FAIR Plan: FAIR Plan provides basic fire coverage and DIC covers liability, theft, water damage.`},
  {t:`HO-6 — "Desde las Paredes Hacia Adentro"`,tp:`inland`,es:`La póliza HO-6 para condominios cubre el interior de la unidad (mejoras que el propietario realizó, pisos, gabinetes), propiedad personal y responsabilidad civil. El edificio exterior y áreas comunes son responsabilidad de la asociación de condominios.`,en:`HO-6 condo policy covers the interior of the unit (improvements the owner made, floors, cabinets), personal property, and liability. The building exterior and common areas are the condo association\'s responsibility.`},
  {t:`Seguro de Mascotas`,tp:`inland`,es:`Cubre gastos VETERINARIOS cuando una mascota asegurada está enferma o lesionada. EXCLUYE condiciones preexistentes. Planes: Solo Accidentes (más barato), Accidentes y Enfermedades (más común), Bienestar (preventivo). La responsabilidad por mascotas es cubierta por la Sección II del HO.`,en:`Covers VETERINARY expenses when an insured pet is sick or injured. EXCLUDES pre-existing conditions. Plans: Accident Only (cheapest), Accident & Illness (most common), Wellness (preventive). Pet liability is covered under HO Section II.`},
  {t:`Paraguas Personal`,tp:`umb`,es:`Proporciona responsabilidad civil en EXCESO sobre los límites de las pólizas subyacentes de auto y propietarios, típicamente $1M–$5M adicional. Requiere mantener límites mínimos en las pólizas subyacentes. También cubre daño personal (difamación, calumnia). EXCLUYE responsabilidad comercial.`,en:`Provides excess liability ABOVE underlying auto and homeowners policy limits, typically $1M–$5M additional. Requires maintaining minimum underlying limits. Also covers personal injury (libel, slander). EXCLUDES business liability.`},
  {t:`SIR — Retención Auto-Asegurada`,tp:`umb`,es:`Self-Insured Retention. Aplica cuando el paraguas cubre una pérdida que NINGUNA póliza subyacente cubre (brecha de cobertura). El asegurado paga el SIR de su bolsillo antes de que el paraguas responda. Similar a un deducible.`,en:`Self-Insured Retention. Applies when the umbrella covers a loss that NO underlying policy covers (coverage gap). The insured pays the SIR out-of-pocket before the umbrella responds. Similar to a deductible.`},
  {t:`Paraguas vs. Exceso de Responsabilidad`,tp:`umb`,es:`PARAGUAS: agrega límites adicionales Y puede AMPLIAR la cobertura (añadiendo daño personal y otros perils no en las pólizas subyacentes). EXCESO DE RESPONSABILIDAD: solo agrega límites adicionales sobre las MISMAS coberturas de la póliza subyacente.`,en:`UMBRELLA: adds extra limits AND may BROADEN coverage (adding personal injury and other perils not in underlying policies). EXCESS LIABILITY: only adds extra limits on the EXACT SAME coverages as the underlying policy.`},
  {t:`Deber Fiduciario del Agente`,tp:`regs`,es:`Los agentes tienen deber fiduciario hacia los clientes: actuar en su mejor interés, mantener las primas como fondos de fideicomiso (sin mezclarlos con cuentas personales), proporcionar divulgación completa y evitar conflictos de interés.`,en:`Agents owe a fiduciary duty to clients: act in their best interest, maintain premiums as trust funds (not commingling with personal accounts), provide full disclosure, and avoid conflicts of interest.`},
  {t:`Aseguradora Mutual vs. Acciones (Stock)`,tp:`conc`,es:`MUTUAL: propiedad de los ASEGURADOS, puede emitir dividendos a asegurados, no cotiza en bolsa. ACCIONES (STOCK): propiedad de ACCIONISTAS, operada con fines de lucro, los asegurados son clientes. RECÍPROCA: suscriptores que intercambian riesgo a través de un apoderado.`,en:`MUTUAL: owned by POLICYHOLDERS, can issue dividends to policyholders, not publicly traded. STOCK: owned by SHAREHOLDERS, operated for profit, policyholders are customers. RECIPROCAL: subscribers exchanging risk through an attorney-in-fact.`},
  {t:`Cobertura E vs. Cobertura F`,tp:`home`,es:`COBERTURA E (Responsabilidad Civil Personal): paga cuando el asegurado es legalmente responsable de lesionar a alguien o dañar su propiedad. Requiere determinación de culpa. COBERTURA F (Pagos Médicos a Otros): paga gastos médicos de invitados lesionados en las instalaciones SIN necesidad de culpa — cobertura de buena voluntad.`,en:`COVERAGE E (Personal Liability): pays when insured is legally responsible for injuring someone or damaging property. Requires fault. COVERAGE F (Medical Payments to Others): pays medical expenses for guests injured on premises WITHOUT needing fault — goodwill coverage.`},
  {t:`Examen Personal Lines CDI 2025`,tp:`regs`,es:`90 preguntas · 135 minutos · 60% para aprobar · Administrado por PSI Services para el CDI · Contenido nacional de seguros (70%) + Leyes específicas de California (30%) · 5-10 preguntas experimentales adicionales sin calificación.`,en:`90 questions · 135 minutes · 60% to pass · Administered by PSI Services for CDI · National insurance content (70%) + California-specific laws (30%) · 5-10 additional unscored experimental questions.`},
];

const QS=[


// ===================== AUTO (14) =====================
{id:'a1',t:'auto',c:0,
 en:{q:"California's minimum auto liability limits under the Financial Responsibility Law are:",o:["15/30/5 — $15K/person, $30K/accident, $5K property damage","30/60/25 — $30K/person, $60K/accident, $25K property damage","25/50/15 — $25K/person, $50K/accident, $15K property damage","10/20/10 — $10K/person, $20K/accident, $10K property damage"],e:"California requires 15/30/5 minimums: $15,000 bodily injury per person, $30,000 total bodily injury per accident, and $5,000 property damage. These low limits are the LEGAL minimum — agents should recommend much higher coverage. Memorize 15/30/5."},
 es:{q:"Los límites mínimos de responsabilidad de auto en California bajo la Ley de Responsabilidad Financiera son:",o:["15/30/5 — $15K/persona, $30K/accidente, $5K daños a la propiedad","30/60/25 — $30K/persona, $60K/accidente, $25K daños a la propiedad","25/50/15 — $25K/persona, $50K/accidente, $15K daños a la propiedad","10/20/10 — $10K/persona, $20K/accidente, $10K daños a la propiedad"],e:"California requiere los mínimos 15/30/5: $15,000 de lesiones corporales por persona, $30,000 total de lesiones corporales por accidente y $5,000 de daños a la propiedad. Estos límites bajos son el MÍNIMO LEGAL — los agentes deben recomendar cobertura mucho mayor. Memoriza 15/30/5."}},

{id:'a2',t:'auto',c:1,
 en:{q:"Which coverage pays for damage to YOUR OWN vehicle when you crash into another car or a fixed object?",o:["Comprehensive (OTC)","Collision","Medical Payments","Uninsured Motorist Property Damage"],e:"Collision covers damage to the insured\'s own vehicle from impact with another vehicle or object — regardless of fault. Comprehensive (Other Than Collision) covers non-collision losses: fire, theft, vandalism, hail, hitting an animal, floods."},
 es:{q:"¿Qué cobertura paga los daños de TU PROPIO vehículo cuando chocas contra otro auto o un objeto fijo?",o:["Integral (Distinto de Colisión)","Colisión","Pagos Médicos","Motorista No Asegurado — Daños a la Propiedad"],e:"Colisión cubre daños al vehículo propio del asegurado por impacto contra otro vehículo u objeto, sin importar quién tiene la culpa. La cobertura Integral (Distinto de Colisión) cubre pérdidas sin colisión: incendio, robo, vandalismo, granizo, choque con animales, inundaciones."}},

{id:'a3',t:'auto',c:2,
 en:{q:"Comprehensive (Other Than Collision) coverage applies to which of the following losses?",o:["Skidding off the road and hitting a guardrail","Rear-ending a truck at a red light","A falling tree crushing the insured\'s parked car","Sideswiping another vehicle in a parking lot"],e:"A falling tree is a 'Other Than Collision' peril — covered by Comprehensive. Guardrail, rear-end, and sideswipe are all collision events covered by Collision coverage, not Comprehensive."},
 es:{q:"La cobertura Integral (Distinto de Colisión) aplica a cuál de las siguientes pérdidas?",o:["Derrapar fuera de la carretera y golpear un barandal","Chocar por detrás a un camión en un semáforo en rojo","Un árbol que cae aplasta el auto estacionado del asegurado","Rozar otro vehículo en un estacionamiento"],e:"Un árbol que cae es un peril 'Distinto de Colisión' — cubierto por la cobertura Integral. El barandal, el choque por detrás y el roce lateral son todos eventos de colisión cubiertos por la cobertura de Colisión, no por la cobertura Integral."}},

{id:'a4',t:'auto',c:3,
 en:{q:"Uninsured/Underinsured Motorist (UM/UIM) coverage protects the insured when:",o:["The insured drives without a license","The insured\'s vehicle is stolen","The insured is entirely at fault in an accident","The at-fault driver has no insurance or insufficient insurance to cover the insured\'s losses"],e:"UM pays when the at-fault driver has NO insurance. UIM pays when the at-fault driver has SOME insurance but not enough to cover all of the insured\'s losses. In California, insurers must offer UM coverage; the insured may reject it in writing."},
 es:{q:"La cobertura de Motorista No Asegurado/Insuficientemente Asegurado (UM/UIM) protege al asegurado cuando:",o:["El asegurado maneja sin licencia","El vehículo del asegurado es robado","El asegurado tiene toda la culpa en un accidente","El conductor culpable no tiene seguro o no tiene seguro suficiente para cubrir las pérdidas del asegurado"],e:"UM paga cuando el conductor culpable NO tiene seguro. UIM paga cuando el conductor culpable tiene ALGO de seguro pero no suficiente para cubrir todas las pérdidas del asegurado. En California, las aseguradoras deben ofrecer cobertura UM; el asegurado puede rechazarla por escrito."}},

{id:'a5',t:'auto',c:0,
 en:{q:"Medical Payments (MedPay) under a Personal Auto Policy covers:",o:["Reasonable medical/funeral expenses for the named insured and all passengers, regardless of fault","Only the insured\'s medical bills when the insured is NOT at fault","Property damage the insured causes to others","Long-term disability if the insured cannot work after an accident"],e:"MedPay is a no-fault coverage — it pays medical and funeral expenses for the named insured AND all passengers injured in the covered vehicle, regardless of who caused the accident. It supplements health insurance and applies immediately after a crash."},
 es:{q:"Los Pagos Médicos (MedPay) bajo una Póliza de Auto Personal cubren:",o:["Gastos médicos/funerarios razonables para el asegurado nominado y todos los pasajeros, sin importar quién tiene la culpa","Solo las facturas médicas del asegurado cuando NO tiene la culpa","Daños a la propiedad que el asegurado causa a otros","Incapacidad a largo plazo si el asegurado no puede trabajar tras un accidente"],e:"MedPay es una cobertura sin culpa — paga gastos médicos y funerarios para el asegurado nominado Y todos los pasajeros lesionados en el vehículo cubierto, independientemente de quién causó el accidente. Complementa el seguro médico y aplica inmediatamente después de un choque."}},

{id:'a6',t:'auto',c:1,
 en:{q:"The LIABILITY section of a Personal Auto Policy (BI/PD) pays for:",o:["Damage to the insured\'s own vehicle","Bodily injury and property damage the insured legally causes to OTHERS","The insured\'s own medical bills after an accident","Theft of the insured\'s vehicle"],e:"Liability (BI = Bodily Injury, PD = Property Damage) pays for losses the insured is LEGALLY RESPONSIBLE for causing to other people. It also covers legal defense costs. It does NOT cover the insured\'s own vehicle damage, injuries, or property."},
 es:{q:"La sección de RESPONSABILIDAD CIVIL de una Póliza de Auto Personal (BI/PD) paga por:",o:["Daños al vehículo propio del asegurado","Lesiones corporales y daños a la propiedad que el asegurado causa legalmente a OTROS","Las facturas médicas propias del asegurado después de un accidente","Robo del vehículo del asegurado"],e:"La responsabilidad civil (BI = Lesiones Corporales, PD = Daños a la Propiedad) paga por las pérdidas de las que el asegurado es LEGALMENTE RESPONSABLE de haber causado a otras personas. También cubre los costos de defensa legal. NO cubre los daños al vehículo propio, lesiones o propiedad del asegurado."}},

{id:'a7',t:'auto',c:2,
 en:{q:"A split-limit auto policy of 25/50/25 means the insurer will pay a maximum of:",o:["$100,000 total for any one accident","$25,000 per accident for all bodily injury and $50,000 for property damage","$25,000 per injured person, $50,000 total per accident for BI, and $25,000 for property damage","$50,000 shared equally between bodily injury and property damage"],e:"Split limits set THREE separate caps: (1) $25K max per person injured (BI), (2) $50K max per accident for ALL bodily injury combined, and (3) $25K max for all property damage per accident. These three limits are always listed in order: per person / per accident / property damage."},
 es:{q:"Una póliza de auto con límites divididos de 25/50/25 significa que la aseguradora pagará un máximo de:",o:["$100,000 total para cualquier accidente","$25,000 por accidente para todas las lesiones corporales y $50,000 para daños a la propiedad","$25,000 por persona lesionada, $50,000 total por accidente para BI, y $25,000 para daños a la propiedad","$50,000 dividido equitativamente entre lesiones corporales y daños a la propiedad"],e:"Los límites divididos establecen TRES límites separados: (1) $25K máx. por persona lesionada (BI), (2) $50K máx. por accidente para TODAS las lesiones corporales combinadas, y (3) $25K máx. para todos los daños a la propiedad por accidente. Estos tres límites siempre se listan en orden: por persona / por accidente / daños a la propiedad."}},

{id:'a8',t:'auto',c:3,
 en:{q:"Proposition 103 (1988) requires California auto insurers to primarily rate policies using which THREE factors (in order of importance)?",o:["Age, gender, and marital status","ZIP code, vehicle type, and credit score","Miles driven, years licensed, and education level","Driving safety record, annual miles driven, and years of driving experience"],e:"Prop 103 mandates these three PRIMARY factors in order of weight: (1) Driving safety record, (2) Annual miles driven, (3) Years of driving experience. Other factors may be used but CANNOT outweigh these three. ZIP code and credit score cannot be the primary factors."},
 es:{q:"La Proposición 103 (1988) requiere que las aseguradoras de auto de California califiquen principalmente las pólizas usando cuáles TRES factores (en orden de importancia)?",o:["Edad, género y estado civil","Código postal, tipo de vehículo y puntaje de crédito","Millas manejadas, años con licencia y nivel de educación","Historial de manejo seguro, millas manejadas por año y años de experiencia como conductor"],e:"La Prop 103 ordena estos tres factores PRINCIPALES en orden de peso: (1) Historial de manejo seguro, (2) Millas manejadas por año, (3) Años de experiencia como conductor. Se pueden usar otros factores pero NO pueden superar en peso a estos tres. El código postal y el puntaje de crédito no pueden ser los factores principales."}},

{id:'a9',t:'auto',c:0,
 en:{q:"Under a Personal Auto Policy (PAP), which of the following is typically EXCLUDED from coverage?",o:["Using the vehicle for a delivery or rideshare business purpose","Driving a borrowed car with the owner\'s permission","A family member driving the insured\'s vehicle","An accident that occurs in a private parking lot"],e:"PAP excludes business use — using the vehicle for delivery (pizza, packages), rideshare (Uber/Lyft), or other business purposes is NOT covered under a standard personal auto policy. Separate commercial or rideshare coverage is required."},
 es:{q:"Bajo una Póliza de Auto Personal (PAP), cuál de los siguientes está típicamente EXCLUIDO de la cobertura?",o:["Usar el vehículo para entrega o negocio de transporte por aplicación (rideshare)","Manejar un auto prestado con permiso del propietario","Un familiar manejando el vehículo del asegurado","Un accidente que ocurre en un estacionamiento privado"],e:"La PAP excluye el uso comercial — usar el vehículo para entregas (pizza, paquetes), transporte por aplicación (Uber/Lyft) u otros fines comerciales NO está cubierto bajo una póliza de auto personal estándar. Se requiere cobertura comercial o de rideshare por separado."}},

{id:'a10',t:'auto',c:1,
 en:{q:"In the PAP, a 'resident relative' is important because:",o:["They must be listed on the policy or no coverage applies","They are automatically covered as an insured under the named insured\'s policy when using covered vehicles","They must pay a separate premium to be covered","They are excluded from MedPay coverage"],e:"Under a PAP, resident relatives (family members living in the same household) are automatically considered 'insureds.' They are covered when using a covered auto, giving broad coverage to the household without needing to list every family member individually."},
 es:{q:"En la PAP, un 'pariente residente' es importante porque:",o:["Deben estar listados en la póliza o no aplica ninguna cobertura","Están automáticamente cubiertos como asegurados bajo la póliza del asegurado nominado cuando usan vehículos cubiertos","Deben pagar una prima separada para estar cubiertos","Están excluidos de la cobertura de MedPay"],e:"Bajo una PAP, los parientes residentes (miembros de la familia que viven en el mismo hogar) se consideran automáticamente 'asegurados'. Están cubiertos cuando usan un auto cubierto, brindando cobertura amplia al hogar sin necesidad de listar a cada miembro de la familia individualmente."}},

{id:'a11',t:'auto',c:2,
 en:{q:"Rental reimbursement coverage under a PAP pays for:",o:["A rental car the insured uses on vacation","The cost of renting a vehicle to another person","A rental car while the insured\'s vehicle is being repaired after a covered loss","Transportation to and from work after any accident"],e:"Rental Reimbursement (Transportation Expenses) is an optional coverage that pays for a rental car (up to a daily limit and maximum) while the insured\'s own vehicle is being repaired following a covered loss — such as after a collision or comprehensive claim."},
 es:{q:"La cobertura de reembolso de alquiler bajo una PAP paga por:",o:["Un auto de alquiler que el asegurado usa en vacaciones","El costo de alquilar un vehículo a otra persona","Un auto de alquiler mientras el vehículo del asegurado está en reparación después de una pérdida cubierta","Transporte hacia y desde el trabajo después de cualquier accidente"],e:"El Reembolso de Alquiler (Gastos de Transporte) es una cobertura opcional que paga por un auto de alquiler (hasta un límite diario y máximo) mientras el vehículo propio del asegurado está siendo reparado después de una pérdida cubierta, como después de una reclamación de colisión o cobertura integral."}},

{id:'a12',t:'auto',c:3,
 en:{q:"'Towing and Labor' coverage under a PAP covers:",o:["Any towing cost regardless of what happened","Damage to the vehicle caused by a tow truck","Roadside assistance for any vehicle in the household","The cost of towing a disabled vehicle and on-site labor, such as a jump-start or flat tire change"],e:"Towing and Labor (Roadside Assistance) is optional coverage that pays for towing to a repair shop and on-site labor costs — like battery jump-starts, flat tire changes, lockout service, and fuel delivery — when the vehicle becomes disabled."},
 es:{q:"La cobertura de 'Remolque y Mano de Obra' bajo una PAP cubre:",o:["Cualquier costo de remolque sin importar qué ocurrió","Daños al vehículo causados por un camión de remolque","Asistencia en carretera para cualquier vehículo del hogar","El costo de remolcar un vehículo averiado y mano de obra en el lugar, como arranque de batería o cambio de llanta ponchada"],e:"Remolque y Mano de Obra (Asistencia en Carretera) es una cobertura opcional que paga por el remolque a un taller y costos de mano de obra en el lugar: arranque de batería, cambios de llanta ponchada, servicio de apertura de auto, entrega de combustible, cuando el vehículo queda varado."}},

{id:'a13',t:'auto',c:1,
 en:{q:"A 'non-owner' auto policy is appropriate for someone who:",o:["Owns a vehicle but does not want collision coverage","Does not own a vehicle but drives regularly (e.g., borrows or rents cars frequently)","Wants to cover their teenage child's driving","Drives a company vehicle for personal use"],e:"A Non-Owner Auto Policy provides liability coverage (and sometimes MedPay/UM) for someone who regularly borrows or rents vehicles but does not own one. It is primary when the insured is driving a non-owned vehicle and the owner has no insurance or insufficient coverage."},
 es:{q:"Una póliza de auto 'sin propietario' (non-owner) es apropiada para alguien que:",o:["Posee un vehículo pero no quiere cobertura de colisión","No posee un vehículo pero maneja regularmente (ej: frecuentemente presta o alquila autos)","Quiere cubrir el manejo de su hijo adolescente","Maneja un vehículo de la empresa para uso personal"],e:"Una Póliza de Auto Sin Propietario proporciona cobertura de responsabilidad civil (y a veces MedPay/UM) para alguien que regularmente presta o alquila vehículos pero no posee uno. Es primaria cuando el asegurado conduce un vehículo que no le pertenece y el propietario no tiene seguro o tiene cobertura insuficiente."}},

{id:'a14',t:'auto',c:0,
 en:{q:"Under a PAP, which statement about 'physical damage' coverage is correct?",o:["Collision and Comprehensive together make up 'Physical Damage' coverage for the insured\'s own vehicle","Physical damage coverage is mandatory in California","Physical damage always pays on a replacement cost basis without depreciation","Physical damage covers both the insured\'s vehicle AND damage to others' property"],e:"Physical Damage coverage = Collision + Comprehensive. Both are optional (not mandatory) in California. They cover the insured\'s OWN vehicle only, not damage to others (that\'s liability). Physical damage on vehicles typically pays Actual Cash Value (ACV), not full replacement cost."},
 es:{q:"Bajo una PAP, ¿cuál afirmación sobre la cobertura de 'daños físicos' es correcta?",o:["Colisión y Cobertura Integral juntas forman la cobertura de 'Daños Físicos' para el vehículo propio del asegurado","La cobertura de daños físicos es obligatoria en California","Los daños físicos siempre pagan en base al costo de reposición sin depreciación","Los daños físicos cubren tanto el vehículo del asegurado COMO los daños a la propiedad de otros"],e:"Cobertura de Daños Físicos = Colisión + Cobertura Integral. Ambas son opcionales (no obligatorias) en California. Cubren SOLO el vehículo propio del asegurado, no los daños a otros (eso es responsabilidad civil). Los daños físicos en vehículos típicamente pagan el Valor en Efectivo Real (ACV), no el costo de reposición completo."}},

// ===================== HOMEOWNERS (16) =====================
{id:'h1',t:'home',c:2,
 en:{q:"The HO-3 Special Form is the most commonly sold homeowners policy because it provides:",o:["Named-peril coverage for the dwelling and named-peril for personal property","Named-peril coverage for the dwelling and open-peril for personal property","Open-peril coverage for the dwelling and named-peril coverage for personal property","Open-peril coverage for BOTH the dwelling and personal property"],e:"HO-3 (Special Form) = Open-peril on the DWELLING (Coverage A & B) + Named-peril on PERSONAL PROPERTY (Coverage C). This means the dwelling is covered for all losses EXCEPT what\'s excluded, while personal property is only covered for the perils specifically listed."},
 es:{q:"La HO-3 Forma Especial es la póliza de propietarios más vendida porque proporciona:",o:["Cobertura de perils nombrados para la vivienda y perils nombrados para la propiedad personal","Cobertura de perils nombrados para la vivienda y perils abiertos para la propiedad personal","Cobertura de perils abiertos para la vivienda y cobertura de perils nombrados para la propiedad personal","Cobertura de perils abiertos TANTO para la vivienda como para la propiedad personal"],e:"HO-3 (Forma Especial) = Perils abiertos en la VIVIENDA (Cobertura A y B) + Perils nombrados en la PROPIEDAD PERSONAL (Cobertura C). Esto significa que la vivienda está cubierta para todas las pérdidas EXCEPTO las excluidas, mientras que la propiedad personal solo está cubierta para los perils específicamente listados."}},

{id:'h2',t:'home',c:0,
 en:{q:"Coverage A (Dwelling) in an HO-3 policy protects:",o:["The main dwelling structure and attached structures like an attached garage","Other structures NOT connected to the main dwelling, like a detached garage","Personal property (contents) anywhere in the world","Additional living expenses after a covered loss"],e:"Coverage A covers the dwelling structure itself PLUS attached structures (an attached garage is part of the dwelling). Coverage B covers detached structures. A good memory trick: A = Abode (the main house + attached)."},
 es:{q:"La Cobertura A (Vivienda) en una póliza HO-3 protege:",o:["La estructura principal de la vivienda y estructuras adjuntas como un garaje adjunto","Otras estructuras NO conectadas a la vivienda principal, como un garaje separado","Propiedad personal (contenido) en cualquier parte del mundo","Gastos de vida adicionales después de una pérdida cubierta"],e:"La Cobertura A cubre la estructura de la vivienda en sí MÁS las estructuras adjuntas (un garaje adjunto es parte de la vivienda). La Cobertura B cubre las estructuras separadas. Un buen truco mnemónico: A = Abode (la casa principal + adjuntas)."}},

{id:'h3',t:'home',c:2,
 en:{q:"Coverage C (Personal Property) in a standard HO-3 protects:",o:["The main dwelling and all attached structures","Any structure on the property that is not attached to the main dwelling","The insured\'s personal belongings anywhere in the world, subject to policy limits","Additional living expenses if the home is uninhabitable"],e:"Coverage C protects the insured\'s personal belongings anywhere in the world (furniture, clothing, electronics, etc.), subject to limits and exclusions. Under HO-3, Coverage C is on a NAMED-PERIL basis. Special limits apply to jewelry ($1,500), cash ($200), and firearms ($2,500)."},
 es:{q:"La Cobertura C (Propiedad Personal) en una HO-3 estándar protege:",o:["La vivienda principal y todas las estructuras adjuntas","Cualquier estructura en la propiedad que no está adjunta a la vivienda principal","Los bienes personales del asegurado en cualquier parte del mundo, sujeto a los límites de la póliza","Gastos de vida adicionales si el hogar es inhabitable"],e:"La Cobertura C protege los bienes personales del asegurado en cualquier parte del mundo (muebles, ropa, electrónicos, etc.), sujeto a límites y exclusiones. Bajo la HO-3, la Cobertura C es en base a PERILS NOMBRADOS. Se aplican límites especiales a joyas ($1,500), efectivo ($200) y armas de fuego ($2,500)."}},

{id:'h4',t:'home',c:3,
 en:{q:"Coverage D (Loss of Use / Additional Living Expenses) in an HO policy pays:",o:["For any increase in living costs during a vacation","When the insured chooses to renovate and temporarily moves out","The total cost of living at a hotel after any disaster","Only the EXTRA living costs above normal expenses when a covered loss makes the home uninhabitable"],e:"Coverage D pays for the ADDITIONAL or EXTRA costs — not the total cost — of living elsewhere while the home is repaired after a covered loss. If the insured normally spends $3,000/month on housing and now spends $4,500/month at a hotel, Coverage D pays the extra $1,500/month."},
 es:{q:"La Cobertura D (Pérdida de Uso / Gastos de Vida Adicionales) en una póliza HO paga:",o:["Cualquier aumento en los costos de vida durante unas vacaciones","Cuando el asegurado decide renovar y se muda temporalmente","El costo total de vivir en un hotel después de cualquier desastre","Solo los costos de vida ADICIONALES por encima de los gastos normales cuando una pérdida cubierta hace inhabitable el hogar"],e:"La Cobertura D paga por los costos ADICIONALES o EXTRA — no el costo total — de vivir en otro lugar mientras el hogar es reparado después de una pérdida cubierta. Si el asegurado normalmente gasta $3,000/mes en vivienda y ahora gasta $4,500/mes en un hotel, la Cobertura D paga los $1,500/mes extra."}},

{id:'h5',t:'home',c:1,
 en:{q:"Coverage E (Personal Liability) in Section II of an HO policy covers:",o:["Damage to the insured\'s own property caused by negligence","Bodily injury or property damage the insured is legally responsible for causing to others","Medical bills for the insured and family members","Intentional acts by the insured that injure someone"],e:"Coverage E is the homeowners personal liability coverage. It pays when the insured is legally responsible for injuring someone or damaging their property. It also covers legal defense costs. Intentional acts and business activities are excluded."},
 es:{q:"La Cobertura E (Responsabilidad Civil Personal) en la Sección II de una póliza HO cubre:",o:["Daños a la propiedad propia del asegurado causados por negligencia","Lesiones corporales o daños a la propiedad de los que el asegurado es legalmente responsable de haber causado a otros","Facturas médicas para el asegurado y miembros de la familia","Actos intencionales del asegurado que lesionan a alguien"],e:"La Cobertura E es la cobertura de responsabilidad civil personal de propietarios. Paga cuando el asegurado es legalmente responsable de lesionar a alguien o dañar su propiedad. También cubre los costos de defensa legal. Los actos intencionales y las actividades comerciales están excluidos."}},

{id:'h6',t:'home',c:0,
 en:{q:"Coverage F (Medical Payments to Others) in an HO policy is different from liability because it:",o:["Pays medical bills for guests injured on the insured\'s premises regardless of fault — no lawsuit required","Only pays when the insured is legally liable","Covers the insured\'s own medical bills after an injury at home","Requires a minimum injury amount before it applies"],e:"Coverage F is a GOODWILL coverage — it pays medical expenses for guests injured on the premises (or away from home by an insured\'s actions) WITHOUT requiring a finding of legal liability. It prevents small claims from becoming lawsuits. It does NOT cover the insured or household members."},
 es:{q:"La Cobertura F (Pagos Médicos a Otros) en una póliza HO es diferente de la responsabilidad civil porque:",o:["Paga facturas médicas para invitados lesionados en las instalaciones del asegurado independientemente de la culpa — no se requiere demanda","Solo paga cuando el asegurado es legalmente responsable","Cubre las facturas médicas propias del asegurado después de una lesión en el hogar","Requiere un monto mínimo de lesión antes de aplicar"],e:"La Cobertura F es una cobertura de BUENA VOLUNTAD — paga gastos médicos para invitados lesionados en las instalaciones (o fuera del hogar por acciones de un asegurado) SIN requerir una determinación de responsabilidad legal. Evita que pequeñas reclamaciones se conviertan en demandas. NO cubre al asegurado ni a los miembros del hogar."}},

{id:'h7',t:'home',c:1,
 en:{q:"Flood damage to a home is:",o:["Covered under all HO forms as a standard peril","Excluded from ALL standard homeowners policies — separate NFIP or private flood coverage is required","Covered under HO-3 but excluded from HO-1 and HO-2","Covered automatically up to $50,000 under Coverage C"],e:"FLOOD IS EXCLUDED from every standard homeowners policy — HO-1 through HO-8. Separate flood insurance must be purchased through the National Flood Insurance Program (NFIP) or a private insurer. This is one of the most commonly tested facts on the California exam."},
