 es:{q:"Los daños por inundación a una vivienda:",o:["Están cubiertos bajo todas las formas HO como un peril estándar","Están excluidos de TODAS las pólizas estándar de propietarios — se requiere cobertura NFIP o seguro de inundaciones privado por separado","Están cubiertos bajo HO-3 pero excluidos de HO-1 y HO-2","Están cubiertos automáticamente hasta $50,000 bajo la Cobertura C"],e:"LAS INUNDACIONES ESTÁN EXCLUIDAS de todas las pólizas estándar de propietarios — HO-1 hasta HO-8. El seguro de inundaciones debe comprarse por separado a través del Programa Nacional de Seguro contra Inundaciones (NFIP) o una aseguradora privada. Este es uno de los hechos más evaluados en el examen de California."}},

{id:'h8',t:'home',c:3,
 en:{q:"In California, earthquake damage to a homeowner\'s property is:",o:["Covered under all HO policies as a required California peril","Covered under HO-3 but not HO-2 or HO-1","Automatically included in policies sold in designated seismic zones","Excluded from standard HO policies — separate earthquake insurance through the CEA or private market is required"],e:"Like flood, EARTHQUAKE is excluded from all standard HO policies in California. Homeowners must buy separate earthquake coverage through the California Earthquake Authority (CEA) or a private insurer. This is California-specific knowledge — critical for the exam."},
 es:{q:"En California, los daños por terremoto a la propiedad de un propietario:",o:["Están cubiertos bajo todas las pólizas HO como un peril requerido en California","Están cubiertos bajo HO-3 pero no HO-2 ni HO-1","Están incluidos automáticamente en pólizas vendidas en zonas sísmicas designadas","Están excluidos de las pólizas HO estándar — se requiere seguro de terremotos por separado a través de la CEA o el mercado privado"],e:"Al igual que las inundaciones, LOS TERREMOTOS están excluidos de todas las pólizas HO estándar en California. Los propietarios deben comprar cobertura de terremotos por separado a través de la Autoridad de Terremotos de California (CEA) o una aseguradora privada. Este es conocimiento específico de California — crítico para el examen."}},

{id:'h9',t:'home',c:2,
 en:{q:"The 'Ordinance or Law' exclusion in a homeowners policy means:",o:["The policy covers any cost required by building codes to restore the home","The insurer will always pay to bring the rebuilt home up to current code","Additional costs required by building codes to repair or rebuild after a covered loss are NOT covered — unless added by endorsement","Government laws about insurance are excluded from the policy"],e:"The Ordinance or Law exclusion means if a covered loss triggers a requirement to update the home to current building codes (e.g., electrical wiring, ADA access), those EXTRA costs are excluded. An Ordinance or Law endorsement can be added to cover this gap — especially important for older California homes."},
 es:{q:"La exclusión de 'Ordenanza o Ley' en una póliza de propietarios significa:",o:["La póliza cubre cualquier costo requerido por los códigos de construcción para restaurar el hogar","La aseguradora siempre pagará para llevar el hogar reconstruido al código actual","Los costos adicionales requeridos por los códigos de construcción para reparar o reconstruir después de una pérdida cubierta NO están cubiertos — a menos que se agregue por endoso","Las leyes gubernamentales sobre seguros están excluidas de la póliza"],e:"La exclusión de Ordenanza o Ley significa que si una pérdida cubierta activa el requisito de actualizar el hogar a los códigos de construcción actuales (ej: cableado eléctrico, acceso ADA), esos costos ADICIONALES están excluidos. Se puede agregar un endoso de Ordenanza o Ley para cubrir esta brecha — especialmente importante para viviendas más antiguas en California."}},

{id:'h10',t:'home',c:0,
 en:{q:"Microbial matter (mold, fungus, dry rot) under a standard HO policy is:",o:["Excluded — mold/microbial matter is a standard exclusion in California homeowners policies","Covered as long as it results from a covered water loss","Covered up to $10,000 as a standard built-in limit","Covered under Coverage C for personal property affected by mold"],e:"Microbial Matter Exclusions (mold, fungus, mildew, dry rot) are STANDARD EXCLUSIONS in California HO policies. Even if mold results from a covered water leak, the mold remediation itself is typically excluded. Limited mold coverage may sometimes be added by endorsement."},
 es:{q:"La materia microbiana (moho, hongos, putrefacción seca) bajo una póliza HO estándar está:",o:["Excluida — el moho/materia microbiana es una exclusión estándar en las pólizas de propietarios de California","Cubierta siempre que resulte de una pérdida de agua cubierta","Cubierta hasta $10,000 como límite estándar incorporado","Cubierta bajo la Cobertura C para propiedad personal afectada por moho"],e:"Las Exclusiones de Materia Microbiana (moho, hongos, moho húmedo, putrefacción seca) son EXCLUSIONES ESTÁNDAR en las pólizas HO de California. Incluso si el moho resulta de una fuga de agua cubierta, la remediación del moho en sí misma típicamente está excluida. La cobertura limitada de moho a veces puede añadirse mediante endoso."}},

{id:'h11',t:'home',c:1,
 en:{q:"The HO-4 policy is designed for renters. The HO-6 policy is designed for:",o:["Tenants in apartment buildings","Condominium unit owners who need to insure interior unit improvements and personal property","Owners of older homes that cannot qualify for HO-3","Vacation/seasonal homes used less than 4 months per year"],e:"HO-6 (Condo Unit Owners) covers the unit owner\'s personal property, interior improvements ('walls-in'), and personal liability. It does NOT cover the building exterior or common areas — those are the condo association\'s responsibility (typically covered by a master policy). HO-4 = Renters, HO-6 = Condo Owners."},
 es:{q:"La póliza HO-4 está diseñada para inquilinos. La póliza HO-6 está diseñada para:",o:["Inquilinos en edificios de apartamentos","Propietarios de unidades de condominio que necesitan asegurar mejoras interiores y propiedad personal","Propietarios de hogares más antiguos que no califican para HO-3","Casas de vacaciones/estacionales usadas menos de 4 meses al año"],e:"HO-6 (Propietarios de Unidades de Condominio) cubre la propiedad personal del propietario, mejoras interiores ('desde las paredes hacia adentro') y responsabilidad civil personal. NO cubre el exterior del edificio ni las áreas comunes — esa es la responsabilidad de la asociación de condominios (típicamente cubierta por una póliza maestra). HO-4 = Inquilinos, HO-6 = Propietarios de Condominios."}},

{id:'h12',t:'home',c:3,
 en:{q:"The HO-8 form (Modified Coverage Form) is used for:",o:["New construction homes valued over $1 million","Vacation homes owned by out-of-state residents","Renters in high-crime neighborhoods","Older homes where the replacement cost significantly exceeds the market value"],e:"HO-8 (Modified Coverage Form) is designed for older homes where rebuilding to current standards would cost far more than the home's market value. HO-8 pays the lesser of repair cost or market value rather than full replacement cost, making it affordable for historic or older structures."},
 es:{q:"La forma HO-8 (Forma de Cobertura Modificada) se usa para:",o:["Casas nuevas valoradas en más de $1 millón","Casas de vacaciones propiedad de residentes fuera del estado","Inquilinos en vecindarios de alto crimen","Casas más antiguas donde el costo de reposición supera significativamente el valor de mercado"],e:"HO-8 (Forma de Cobertura Modificada) está diseñada para hogares más antiguos donde reconstruir según los estándares actuales costaría mucho más que el valor de mercado de la vivienda. HO-8 paga el menor entre el costo de reparación o el valor de mercado en lugar del costo de reposición completo, haciéndola asequible para estructuras históricas o más antiguas."}},

{id:'h13',t:'home',c:0,
 en:{q:"A Scheduled Personal Property endorsement to an HO policy is used to:",o:["Provide broader coverage and higher limits for specific valuable items like jewelry, fine art, or musical instruments","Reduce the premium by excluding certain high-value items","Replace all of Coverage C with a higher blanket limit","Cover business equipment stored at the home"],e:"A Scheduled Personal Property (SPP) endorsement — also called a 'floater' — lists individual valuable items with their own coverage limit and broader coverage (open-peril, no deductible) than the base HO policy. It's commonly used for jewelry, fine art, collectibles, musical instruments, and cameras that exceed HO sublimits."},
 es:{q:"Un endoso de Propiedad Personal Programada en una póliza HO se usa para:",o:["Proporcionar cobertura más amplia y límites más altos para artículos específicos de valor como joyas, bellas artes o instrumentos musicales","Reducir la prima excluyendo ciertos artículos de alto valor","Reemplazar toda la Cobertura C con un límite global más alto","Cubrir equipo de negocios almacenado en el hogar"],e:"Un endoso de Propiedad Personal Programada (SPP) — también llamado 'flotante' — lista artículos valiosos individuales con su propio límite de cobertura y cobertura más amplia (perils abiertos, sin deducible) que la póliza HO base. Se usa comúnmente para joyas, bellas artes, coleccionables, instrumentos musicales y cámaras que superan los sublímites de la HO."}},

{id:'h14',t:'home',c:2,
 en:{q:"Coverage B (Other Structures) in an HO policy typically covers structures at what percentage of Coverage A?",o:["5% of Coverage A","25% of Coverage A","10% of Coverage A","20% of Coverage A"],e:"Coverage B (Other Structures) is automatically set at 10% of Coverage A. Example: if Coverage A is $400,000, Coverage B is $40,000. Coverage B covers detached garages, fences, sheds, in-ground pools, and other structures on the premises NOT attached to the main dwelling."},
 es:{q:"La Cobertura B (Otras Estructuras) en una póliza HO típicamente cubre estructuras a qué porcentaje de la Cobertura A?",o:["5% de la Cobertura A","25% de la Cobertura A","10% de la Cobertura A","20% de la Cobertura A"],e:"La Cobertura B (Otras Estructuras) se establece automáticamente al 10% de la Cobertura A. Ejemplo: si la Cobertura A es $400,000, la Cobertura B es $40,000. La Cobertura B cubre garajes separados, cercas, cobertizos, piscinas enterradas y otras estructuras en las instalaciones NO adjuntas a la vivienda principal."}},

{id:'h15',t:'home',c:1,
 en:{q:"The difference between Replacement Cost Value (RCV) and Actual Cash Value (ACV) is:",o:["RCV is always lower because it accounts for market fluctuations","RCV does NOT deduct depreciation; ACV = RCV minus depreciation","ACV is always higher because it includes upgrades and improvements","RCV only applies to Coverage A; ACV only applies to Coverage C"],e:"RCV pays to repair/replace with new materials without depreciation deduction. ACV = RCV minus Depreciation (age, wear, obsolescence). A 10-year-old roof (RCV $20,000, depreciated 50%) would yield ACV payment of $10,000. RCV policies cost more but pay significantly more at claim time."},
 es:{q:"La diferencia entre el Costo de Reposición (RCV) y el Valor en Efectivo Real (ACV) es:",o:["RCV siempre es menor porque tiene en cuenta las fluctuaciones del mercado","RCV NO deduce la depreciación; ACV = RCV menos depreciación","ACV siempre es mayor porque incluye mejoras y actualizaciones","RCV solo aplica a la Cobertura A; ACV solo aplica a la Cobertura C"],e:"RCV paga para reparar/reemplazar con materiales nuevos sin deducción de depreciación. ACV = RCV menos Depreciación (edad, desgaste, obsolescencia). Un techo de 10 años (RCV $20,000, depreciado 50%) produciría un pago ACV de $10,000. Las pólizas RCV cuestan más pero pagan significativamente más al momento de la reclamación."}},

{id:'h16',t:'home',c:3,
 en:{q:"Under the HO-3 policy's Section I Conditions, after a covered loss the insured\'s duties include:",o:["Filing a police report for all losses regardless of type","Waiting for the adjuster before making any temporary repairs","Paying all contractors out-of-pocket before reimbursement","Promptly notifying the insurer, protecting property from further damage, and cooperating with the investigation"],e:"After a covered loss, the insured must: (1) notify the insurer promptly, (2) protect property from further damage (make reasonable temporary repairs), (3) cooperate with the insurer\'s investigation, (4) prepare an inventory of damaged property, and (5) submit to examination under oath if requested."},
 es:{q:"Bajo las Condiciones de la Sección I de la póliza HO-3, después de una pérdida cubierta los deberes del asegurado incluyen:",o:["Presentar un reporte policial por todas las pérdidas independientemente del tipo","Esperar al ajustador antes de hacer reparaciones temporales","Pagar a todos los contratistas de su bolsillo antes del reembolso","Notificar prontamente a la aseguradora, proteger la propiedad de más daños y cooperar con la investigación"],e:"Después de una pérdida cubierta, el asegurado debe: (1) notificar a la aseguradora prontamente, (2) proteger la propiedad de más daños (hacer reparaciones temporales razonables), (3) cooperar con la investigación de la aseguradora, (4) preparar un inventario de la propiedad dañada, y (5) someterse a examen bajo juramento si se solicita."}},

// ===================== DWELLING (10) =====================
{id:'d1',t:'dwelling',c:1,
 en:{q:"Dwelling Policy (DP) forms are primarily used for:",o:["Owner-occupied primary residences","Non-owner-occupied properties such as rental homes, vacant properties, and vacation homes"],e:"DP forms cover properties not eligible for standard HO policies: rental homes (landlord insures the structure), vacant properties, vacation homes, or homes in poor condition. The landlord/owner is the insured for the structure. Tenants need their own HO-4."},
 es:{q:"Las formas de Póliza de Vivienda (DP) se usan principalmente para:",o:["Residencias principales ocupadas por el propietario","Propiedades no ocupadas por el propietario como casas de alquiler, propiedades vacías y casas de vacaciones"],e:"Las formas DP cubren propiedades no elegibles para pólizas HO estándar: casas de alquiler (el propietario asegura la estructura), propiedades vacías, casas de vacaciones o casas en mal estado. El propietario/dueño es el asegurado de la estructura. Los inquilinos necesitan su propio HO-4."}},

{id:'d2',t:'dwelling',c:0,
 en:{q:"Which is the correct description of the three DP forms?",o:["DP-1 = Basic named-peril (fire, lightning, explosion only); DP-2 = Broad named-peril; DP-3 = Open-peril (Special Form)","DP-1 = Open-peril; DP-2 = Named-peril; DP-3 = Basic Form","DP-1 = For renters; DP-2 = For landlords; DP-3 = For vacant properties","DP-1 = Broadest; DP-3 = Most limited"],e:"DP-1 (Basic) covers only: fire, lightning, internal explosion (and sometimes windstorm/hail). DP-2 (Broad) covers a wider list of named perils. DP-3 (Special) provides open-peril coverage for the dwelling — all losses covered UNLESS specifically excluded. DP-3 is the broadest and most expensive."},
 es:{q:"¿Cuál es la descripción correcta de las tres formas DP?",o:["DP-1 = Perils nombrados básico (solo incendio, rayo, explosión); DP-2 = Perils nombrados amplio; DP-3 = Perils abiertos (Forma Especial)","DP-1 = Perils abiertos; DP-2 = Perils nombrados; DP-3 = Forma Básica","DP-1 = Para inquilinos; DP-2 = Para propietarios; DP-3 = Para propiedades vacías","DP-1 = Más amplio; DP-3 = Más limitado"],e:"DP-1 (Básico) cubre solo: incendio, rayo, explosión interna (y a veces tormenta/granizo). DP-2 (Amplio) cubre una lista más amplia de perils nombrados. DP-3 (Especial) proporciona cobertura de perils abiertos para la vivienda — todas las pérdidas cubiertas A MENOS QUE estén específicamente excluidas. DP-3 es el más amplio y costoso."}},

{id:'d3',t:'dwelling',c:3,
 en:{q:"A key difference between Dwelling Policies (DP) and Homeowners Policies (HO) is that:",o:["DP forms always provide broader coverage than HO forms","DP forms are required for all California rental properties by law","DP policies are cheaper because they include more coverage","LIABILITY must be added by endorsement to DP forms — it is NOT included automatically"],e:"In HO policies, Section II provides personal liability coverage automatically. In DP policies, LIABILITY COVERAGE IS NOT INCLUDED — the landlord must add it by endorsement if they want liability protection for their rental property. This is a key distinction the exam tests."},
 es:{q:"Una diferencia clave entre las Pólizas de Vivienda (DP) y las Pólizas de Propietarios (HO) es que:",o:["Las formas DP siempre proporcionan cobertura más amplia que las formas HO","Las formas DP son requeridas para todas las propiedades de alquiler en California por ley","Las pólizas DP son más baratas porque incluyen más cobertura","La RESPONSABILIDAD CIVIL debe añadirse por endoso a las formas DP — NO está incluida automáticamente"],e:"En las pólizas HO, la Sección II proporciona automáticamente cobertura de responsabilidad civil personal. En las pólizas DP, LA COBERTURA DE RESPONSABILIDAD CIVIL NO ESTÁ INCLUIDA — el propietario debe añadirla por endoso si quiere protección de responsabilidad civil para su propiedad de alquiler. Esta es una distinción clave que el examen evalúa."}},

{id:'d4',t:'dwelling',c:2,
 en:{q:"Under a Dwelling Policy (DP), which coverage reimburses the landlord for lost rental income when the property is uninhabitable due to a covered loss?",o:["Coverage A","Coverage B","Coverage D — Fair Rental Value","Coverage C"],e:"Coverage D under DP forms includes Fair Rental Value — reimbursing the insured landlord for the rental income they would have received if the property had not been damaged. This is the DP equivalent of Loss of Use in HO policies."},
 es:{q:"Bajo una Póliza de Vivienda (DP), ¿qué cobertura reembolsa al propietario la renta perdida cuando la propiedad es inhabitable por una pérdida cubierta?",o:["Cobertura A","Cobertura B","Cobertura D — Valor de Renta Justo","Cobertura C"],e:"La Cobertura D bajo las formas DP incluye el Valor de Renta Justo — reembolsa al propietario asegurado el ingreso de renta que habría recibido si la propiedad no hubiera sido dañada. Este es el equivalente DP a la Pérdida de Uso en las pólizas HO."}},

{id:'d5',t:'dwelling',c:1,
 en:{q:"Vandalism coverage is included in which Dwelling Policy form(s)?",o:["DP-1, DP-2, and DP-3 all include vandalism","DP-2 and DP-3, but NOT DP-1","Only DP-3","Only DP-1"],e:"Vandalism and Malicious Mischief are covered under DP-2 (Broad Form) and DP-3 (Special Form) but NOT under DP-1 (Basic Form). Additionally, even DP-2 and DP-3 typically exclude vandalism if the property has been vacant for 60+ consecutive days."},
 es:{q:"¿En qué forma(s) de Póliza de Vivienda está incluida la cobertura de vandalismo?",o:["DP-1, DP-2 y DP-3 incluyen vandalismo","DP-2 y DP-3, pero NO DP-1","Solo DP-3","Solo DP-1"],e:"El Vandalismo y Actos Maliciosos están cubiertos bajo DP-2 (Forma Amplia) y DP-3 (Forma Especial) pero NO bajo DP-1 (Forma Básica). Además, incluso DP-2 y DP-3 típicamente excluyen el vandalismo si la propiedad ha estado vacía por 60+ días consecutivos."}},

{id:'d6',t:'dwelling',c:0,
 en:{q:"A landlord\'s DP policy covers the tenant\'s personal belongings for how much?",o:["Nothing — tenants must purchase their own HO-4 renters insurance","Up to $10,000 automatically under Coverage C","50% of Coverage A for the tenant\'s contents","All tenant belongings at actual cash value"],e:"A landlord\'s Dwelling Policy covers the STRUCTURE ONLY. Zero coverage for tenants' personal belongings. Tenants must buy their own HO-4 (Renters Insurance) to protect their furniture, clothing, electronics, and personal liability."},
 es:{q:"¿Cuánto cubre la póliza DP de un propietario para los bienes personales del inquilino?",o:["Nada — los inquilinos deben comprar su propio seguro de arrendatario HO-4","Hasta $10,000 automáticamente bajo la Cobertura C","50% de la Cobertura A para el contenido del inquilino","Todos los bienes del inquilino al valor en efectivo real"],e:"La Póliza de Vivienda de un propietario cubre SOLO LA ESTRUCTURA. Cero cobertura para los bienes personales de los inquilinos. Los inquilinos deben comprar su propio HO-4 (Seguro de Arrendatario) para proteger su mobiliario, ropa, electrónicos y responsabilidad civil personal."}},

{id:'d7',t:'dwelling',c:3,
 en:{q:"Actual Cash Value (ACV) is correctly defined as:",o:["The original purchase price of the structure","The current market value of the property","The cost to rebuild the structure from scratch with today\'s materials","Replacement Cost Value minus accumulated depreciation"],e:"ACV = Replacement Cost Value (RCV) MINUS Depreciation. Depreciation reflects age, wear, and obsolescence. A 15-year-old HVAC system with RCV of $12,000 and 75% depreciation would have an ACV of only $3,000. DP-1 and DP-2 typically pay ACV; DP-3 can pay RCV if that coverage is selected."},
 es:{q:"El Valor en Efectivo Real (ACV) se define correctamente como:",o:["El precio de compra original de la estructura","El valor de mercado actual de la propiedad","El costo de reconstruir la estructura desde cero con materiales actuales","El Costo de Reposición menos la depreciación acumulada"],e:"ACV = Costo de Reposición (RCV) MENOS Depreciación. La depreciación refleja la edad, el desgaste y la obsolescencia. Un sistema HVAC de 15 años con RCV de $12,000 y 75% de depreciación tendría un ACV de solo $3,000. DP-1 y DP-2 típicamente pagan ACV; DP-3 puede pagar RCV si se selecciona esa cobertura."}},

{id:'d8',t:'dwelling',c:2,
 en:{q:"A vacancy clause in a DP policy means that coverage may be reduced or suspended if the property is:",o:["Rented to a tenant for less than 6 months","Used as a vacation home during the off-season","Left unoccupied for more than 60 consecutive days","Undergoing renovations for more than 30 days"],e:"Most DP policies include a vacancy clause that restricts or eliminates certain coverages (like vandalism, glass breakage, and water damage) if the property has been vacant for more than 60 consecutive days. Landlords should notify their insurer when properties become vacant."},
 es:{q:"Una cláusula de vacancia en una póliza DP significa que la cobertura puede reducirse o suspenderse si la propiedad está:",o:["Alquilada a un inquilino por menos de 6 meses","Usada como casa de vacaciones durante la temporada baja","Desocupada por más de 60 días consecutivos","En renovación por más de 30 días"],e:"La mayoría de las pólizas DP incluyen una cláusula de vacancia que restringe o elimina ciertas coberturas (como vandalismo, rotura de vidrios y daños por agua) si la propiedad ha estado vacía por más de 60 días consecutivos. Los propietarios deben notificar a su aseguradora cuando las propiedades quedan vacías."}},

{id:'d9',t:'dwelling',c:1,
 en:{q:"Which statement about Dwelling Policies is TRUE?",o:["DP forms require the owner to live on the premises","Coverage C (Personal Property) in a DP form typically covers the OWNER'S personal property at the dwelling, not the tenant\'s","DP-3 is the only form that covers fire and lightning","All DP forms include coverage for loss of rental income"],e:"Coverage C in DP forms is available to cover the OWNER'S personal property kept at the dwelling (like appliances or items left there). It is NOT automatically included in all DP forms and does NOT cover tenant property. Owners typically keep minimal personal property at rental properties."},
 es:{q:"¿Cuál afirmación sobre las Pólizas de Vivienda es VERDADERA?",o:["Las formas DP requieren que el propietario viva en las instalaciones","La Cobertura C (Propiedad Personal) en una forma DP típicamente cubre la propiedad personal del PROPIETARIO en la vivienda, no la del inquilino","DP-3 es la única forma que cubre incendio y rayo","Todas las formas DP incluyen cobertura para pérdida de ingresos de alquiler"],e:"La Cobertura C en las formas DP está disponible para cubrir la propiedad personal del PROPIETARIO guardada en la vivienda (como electrodomésticos o artículos dejados allí). NO está incluida automáticamente en todas las formas DP y NO cubre la propiedad del inquilino. Los propietarios típicamente guardan propiedad personal mínima en propiedades de alquiler."}},

{id:'d10',t:'dwelling',c:0,
 en:{q:"Which of the following perils is covered under ALL THREE Dwelling Policy forms (DP-1, DP-2, and DP-3)?",o:["Fire and lightning","Vandalism and malicious mischief","Collapse","Falling objects"],e:"FIRE AND LIGHTNING are the core perils covered by all DP forms — even the most basic DP-1. Vandalism is only in DP-2 and DP-3. Collapse and falling objects are in DP-2 and DP-3 but not DP-1. Remember: DP-1 = Fire, Lightning, Internal Explosion (F.L.E.)."},
 es:{q:"¿Cuál de los siguientes perils está cubierto bajo las TRES formas de Póliza de Vivienda (DP-1, DP-2 y DP-3)?",o:["Incendio y rayo","Vandalismo y actos maliciosos","Colapso","Objetos que caen"],e:"EL INCENDIO Y EL RAYO son los perils principales cubiertos por todas las formas DP — incluso la más básica DP-1. El vandalismo solo está en DP-2 y DP-3. El colapso y los objetos que caen están en DP-2 y DP-3 pero no en DP-1. Recuerda: DP-1 = Incendio, Rayo, Explosión Interna (F.R.E.)."}},

// ===================== CA REGULATIONS (14) =====================
{id:'r1',t:'regs',c:1,
 en:{q:"The California Department of Insurance (CDI) is headed by:",o:["A director appointed by the Governor","The California Insurance Commissioner — an independently elected statewide official","The State Treasurer","A board of directors appointed by the Legislature"],e:"The California Insurance Commissioner is ELECTED by California voters — not appointed. The Commissioner leads the CDI, regulates insurance rates and companies, licenses producers, investigates fraud, and advocates for consumers. The office is politically independent."},
 es:{q:"El Departamento de Seguros de California (CDI) está encabezado por:",o:["Un director nombrado por el Gobernador","El Comisionado de Seguros de California — un funcionario estatal electo de forma independiente","El Tesorero Estatal","Una junta directiva nombrada por la Legislatura"],e:"El Comisionado de Seguros de California es ELEGIDO por los votantes de California — no es nombrado. El Comisionado dirige el CDI, regula las tarifas y compañías de seguros, otorga licencias a los productores, investiga fraudes y defiende a los consumidores. La oficina es políticamente independiente."}},

{id:'r2',t:'regs',c:0,
 en:{q:"Under California's Fair Claims Settlement Practices Regulations, an insurer must acknowledge receipt of a claim within:",o:["15 calendar days of receiving notice","5 business days of receiving notice","30 calendar days","10 business days"],e:"California law (CCR Title 10, §2695) requires insurers to acknowledge receipt of a claim within 15 CALENDAR DAYS of receiving notice. This is a frequently tested regulation. After acknowledging, they have additional timeframes to accept/deny the claim."},
 es:{q:"Bajo las Regulaciones de Prácticas de Liquidación Justa de Reclamaciones de California, una aseguradora debe confirmar la recepción de una reclamación dentro de:",o:["15 días calendario de recibir la notificación","5 días hábiles de recibir la notificación","30 días calendario","10 días hábiles"],e:"La ley de California (Título 10 del CCR, §2695) requiere que las aseguradoras confirmen la recepción de una reclamación dentro de los 15 DÍAS CALENDARIO de recibir la notificación. Esta es una regulación frecuentemente evaluada. Después de confirmar, tienen plazos adicionales para aceptar/denegar la reclamación."}},

{id:'r3',t:'regs',c:2,
 en:{q:"California insurance producer licenses must be renewed every:",o:["1 year with 12 CE hours","3 years with 36 CE hours","2 years with 24 CE hours (including 3 hours of mandatory ethics)","5 years with no CE requirement"],e:"California producer licenses renew every 2 YEARS. Licensees must complete 24 hours of Continuing Education (CE) per renewal cycle, including a MANDATORY 3 hours of ethics. CE must be completed BEFORE the license expires."},
 es:{q:"Las licencias de productor de seguros de California deben renovarse cada:",o:["1 año con 12 horas de CE","3 años con 36 horas de CE","2 años con 24 horas de CE (incluyendo 3 horas obligatorias de ética)","5 años sin requisito de CE"],e:"Las licencias de productor de California se renuevan cada 2 AÑOS. Los titulares de licencia deben completar 24 horas de Educación Continua (CE) por ciclo de renovación, incluyendo 3 horas obligatorias de ética. La CE debe completarse ANTES de que venza la licencia."}},

{id:'r4',t:'regs',c:3,
 en:{q:"The California Personal Lines license exam requires a passing score of:",o:["70%","75%","65%","60%"],e:"ALL California producer license examinations (including Personal Lines) require a passing score of 60%. Only the Life & Disability Analyst, Adjuster, and Bail examinations require 70%. The Personal Lines exam has 90 questions and 135 minutes."},
 es:{q:"El examen de licencia de Líneas Personales de California requiere una puntuación de aprobación de:",o:["70%","75%","65%","60%"],e:"TODOS los exámenes de licencia de productor de California (incluyendo Líneas Personales) requieren una puntuación de aprobación del 60%. Solo los exámenes de Analista de Vida y Discapacidad, Ajustador y Fianza requieren el 70%. El examen de Líneas Personales tiene 90 preguntas y 135 minutos."}},

{id:'r5',t:'regs',c:1,
 en:{q:"In California, how many days' written notice must an insurer give before canceling a personal lines policy mid-term (after the policy has been in force 60+ days), for reasons other than non-payment?",o:["10 days","20 days","30 days","45 days"],e:"After a policy has been in force for 60 days: (1) Mid-term cancellation for most reasons requires AT LEAST 20 DAYS written notice. (2) Non-payment requires only 10 days. (3) Non-renewal requires a minimum of 45 days' advance notice before the expiration date."},
 es:{q:"En California, ¿cuántos días de aviso escrito debe dar una aseguradora antes de cancelar una póliza de líneas personales a mitad de vigencia (después de que la póliza ha estado en vigor 60+ días), por razones distintas al impago?",o:["10 días","20 días","30 días","45 días"],e:"Después de que una póliza ha estado en vigor 60 días: (1) La cancelación a mitad de vigencia por la mayoría de razones requiere AL MENOS 20 DÍAS de aviso escrito. (2) El impago requiere solo 10 días. (3) La no renovación requiere un aviso anticipado mínimo de 45 días antes de la fecha de vencimiento."}},

{id:'r6',t:'regs',c:0,
 en:{q:"The minimum free-look period for a personal lines P&C policy in California is:",o:["10 calendar days","5 business days","30 days","60 days"],e:"California requires a minimum 10-day free-look period for personal lines P&C insurance policies. During this time, the insured can cancel for any reason and receive a full premium refund. (Life insurance and annuities have a 30-day free-look period — longer than P&C.)"},
 es:{q:"El período mínimo de revisión gratuita (free-look) para una póliza de P&C de líneas personales en California es:",o:["10 días calendario","5 días hábiles","30 días","60 días"],e:"California requiere un período mínimo de revisión gratuita de 10 días para las pólizas de seguro de P&C de líneas personales. Durante este tiempo, el asegurado puede cancelar por cualquier razón y recibir un reembolso total de la prima. (El seguro de vida y las anualidades tienen un período de revisión gratuita de 30 días — más largo que P&C.)"}},

{id:'r7',t:'regs',c:2,
 en:{q:"Proposition 103 (1988) primarily requires California auto insurers to:",o:["Offer coverage to all California residents regardless of driving history","Accept any vehicle regardless of its age or condition","Get prior approval from the CDI before implementing rate increases, and use driving record, miles, and experience as the primary rating factors","Provide free insurance to low-income California residents"],e:"Prop 103 created a PRIOR APPROVAL system — insurers must get CDI approval before increasing auto rates. It also rolled back rates to 1987 levels initially and established the three primary rating factors: (1) driving safety record, (2) annual miles driven, (3) years of experience."},
 es:{q:"La Proposición 103 (1988) principalmente requiere que las aseguradoras de auto de California:",o:["Ofrezcan cobertura a todos los residentes de California independientemente del historial de manejo","Acepten cualquier vehículo independientemente de su edad o condición","Obtengan aprobación previa del CDI antes de implementar aumentos de tarifas, y usen el historial de manejo, millas y experiencia como factores principales de calificación","Proporcionen seguro gratuito a los residentes de bajos ingresos de California"],e:"La Prop 103 creó un sistema de APROBACIÓN PREVIA — las aseguradoras deben obtener la aprobación del CDI antes de aumentar las tarifas de auto. También revirtió inicialmente las tarifas a los niveles de 1987 y estableció los tres factores principales de calificación: (1) historial de manejo seguro, (2) millas manejadas por año, (3) años de experiencia."}},

{id:'r8',t:'regs',c:3,
 en:{q:"California's Unfair Claims Settlement Practices Act prohibits which of the following?",o:["Paying a claim that turns out to have been fraudulent","Requesting additional documentation to investigate a complex claim","Setting coverage limits lower than what the client requested","Misrepresenting policy provisions to deny or settle claims for less than owed"],e:"California CCR §2695 prohibits a wide range of unfair acts including: misrepresenting policy terms, failing to acknowledge claims promptly (15 days), not conducting reasonable investigations, delaying payments without justification, and coercing settlements through threats. All involve acting in BAD FAITH."},
 es:{q:"La Ley de Prácticas de Liquidación Injusta de Reclamaciones de California prohíbe cuál de los siguientes?",o:["Pagar una reclamación que resulta haber sido fraudulenta","Solicitar documentación adicional para investigar una reclamación compleja","Establecer límites de cobertura menores a lo que el cliente solicitó","Tergiversar las disposiciones de la póliza para denegar o liquidar reclamaciones por menos de lo debido"],e:"El CCR §2695 de California prohíbe una amplia gama de actos injustos que incluyen: tergiversar los términos de la póliza, no reconocer las reclamaciones prontamente (15 días), no realizar investigaciones razonables, retrasar pagos sin justificación y coaccionar liquidaciones mediante amenazas. Todos involucran actuar de MALA FE."}},

{id:'r9',t:'regs',c:0,
 en:{q:"Under California law, rebating (giving part of the commission or other valuable consideration to induce the purchase of insurance) is:",o:["Prohibited — it is an unfair trade practice under the California Insurance Code","Allowed if the amount is less than $25","Allowed for agents with more than 5 years of experience","Required to be disclosed but otherwise legal"],e:"REBATING is prohibited in California under CIC Section 750. It includes giving commissions, gifts, merchandise, or anything of value to entice someone to buy insurance. Anti-rebating laws protect fair competition. Violating this can result in license suspension or revocation."},
 es:{q:"Bajo la ley de California, el rebating (dar parte de la comisión u otra compensación valiosa para inducir la compra de seguros) está:",o:["Prohibido — es una práctica comercial desleal bajo el Código de Seguros de California","Permitido si el monto es menos de $25","Permitido para agentes con más de 5 años de experiencia","Requerido ser divulgado pero por lo demás es legal"],e:"EL REBATING está prohibido en California bajo la Sección 750 del CIC. Incluye dar comisiones, regalos, mercancía o cualquier cosa de valor para tentar a alguien a comprar seguros. Las leyes anti-rebating protegen la competencia justa. Violar esto puede resultar en suspensión o revocación de la licencia."}},

{id:'r10',t:'regs',c:1,
 en:{q:"A broker fee in California must be:",o:["Kept secret from the CDI to protect competitive advantage","Disclosed to the client in writing before they are obligated to pay it, and the written agreement must be signed","Approved by the CDI before it can be charged","Limited to 10% of the annual premium"],e:"California law requires that broker fees be DISCLOSED IN WRITING to the client before the client is obligated, and the client must sign a written broker fee agreement. The fee must be reasonable and documented. Brokers must disclose all compensation they receive."},
 es:{q:"Una tarifa de corredor (broker fee) en California debe ser:",o:["Mantenida en secreto del CDI para proteger la ventaja competitiva","Divulgada al cliente por escrito antes de que esté obligado a pagarla, y el acuerdo escrito debe estar firmado","Aprobada por el CDI antes de poder cobrarla","Limitada al 10% de la prima anual"],e:"La ley de California requiere que las tarifas de corredor sean DIVULGADAS POR ESCRITO al cliente antes de que el cliente esté obligado, y el cliente debe firmar un acuerdo escrito de tarifa de corredor. La tarifa debe ser razonable y documentada. Los corredores deben divulgar toda la compensación que reciben."}},

{id:'r11',t:'regs',c:2,
 en:{q:"Assembly Bill 451, effective January 1, 2024, requires the CDI to:",o:["Offer discounts to insureds in wildfire-prone areas","Require all insurers to offer earthquake coverage","Offer CDI licensing examinations in Spanish, Korean, Simplified Chinese, Vietnamese, and Tagalog","Reduce the number of CE hours required for license renewal"],e:"AB 451 (Calderon, Chapter 136, 2023) requires the CDI to offer its insurance license examinations in multiple languages: Spanish, Korean, Simplified Chinese, Vietnamese (starting January 1, 2024), and Tagalog (starting July 1, 2024). This significantly expanded access for non-English-speaking exam candidates."},
 es:{q:"El Proyecto de Ley AB 451, efectivo el 1 de enero de 2024, requiere que el CDI:",o:["Ofrezca descuentos a los asegurados en áreas propensas a incendios forestales","Requiera que todas las aseguradoras ofrezcan cobertura de terremotos","Ofrezca exámenes de licencia del CDI en español, coreano, chino simplificado, vietnamita y tagalo","Reduzca el número de horas de CE requeridas para la renovación de la licencia"],e:"AB 451 (Calderon, Capítulo 136, 2023) requiere que el CDI ofrezca sus exámenes de licencia de seguros en múltiples idiomas: español, coreano, chino simplificado, vietnamita (a partir del 1 de enero de 2024) y tagalo (a partir del 1 de julio de 2024). Esto expandió significativamente el acceso para los candidatos al examen que no hablan inglés."}},

{id:'r12',t:'regs',c:3,
 en:{q:"Insurance fraud in California (submitting a false or inflated claim) can result in:",o:["A small fine paid to the CDI only","A warning letter from the insurer","Only civil penalties with no criminal liability","Criminal prosecution, fines, and possible imprisonment"],e:"Insurance fraud is a crime in California. Under the Insurance Fraud Prevention Act and Penal Code, fraud can result in: criminal prosecution (felony charges), fines, restitution, imprisonment, and civil penalties. The CDI's Fraud Division investigates insurance fraud. Agents have a duty to report suspected fraud."},
 es:{q:"El fraude de seguros en California (presentar una reclamación falsa o inflada) puede resultar en:",o:["Solo una pequeña multa pagada al CDI","Una carta de advertencia de la aseguradora","Solo sanciones civiles sin responsabilidad penal","Procesamiento penal, multas y posible encarcelamiento"],e:"El fraude de seguros es un delito en California. Bajo la Ley de Prevención de Fraude de Seguros y el Código Penal, el fraude puede resultar en: procesamiento penal (cargos de delito grave), multas, restitución, encarcelamiento y sanciones civiles. La División de Fraude del CDI investiga el fraude de seguros. Los agentes tienen el deber de reportar el fraude sospechado."}},

{id:'r13',t:'regs',c:0,
 en:{q:"A California licensed agent's fiduciary duty to clients means:",o:["Acting in the client's best interest, handling premiums as trust funds, and not commingling client funds with personal funds","Recommending only the most expensive policies to maximize commission","Disclosing all information about the client to the insurer","Guaranteeing that all claims will be paid"],e:"Agents owe a FIDUCIARY DUTY to clients: acting in their best interest, maintaining premiums as trust funds (not commingling with personal accounts), providing full disclosure, and avoiding conflicts of interest. Premium funds received from clients must be forwarded to insurers promptly."},
 es:{q:"El deber fiduciario de un agente con licencia de California hacia los clientes significa:",o:["Actuar en el mejor interés del cliente, manejar las primas como fondos de fideicomiso y no mezclar los fondos del cliente con fondos personales","Recomendar solo las pólizas más caras para maximizar la comisión","Divulgar toda la información sobre el cliente a la aseguradora","Garantizar que todas las reclamaciones serán pagadas"],e:"Los agentes tienen un DEBER FIDUCIARIO hacia los clientes: actuar en su mejor interés, mantener las primas como fondos de fideicomiso (sin mezclarlos con cuentas personales), proporcionar divulgación completa y evitar conflictos de interés. Los fondos de primas recibidos de los clientes deben enviarse a las aseguradoras con prontitud."}},

{id:'r14',t:'regs',c:1,
 en:{q:"If a California insurance producer's license expires, they:",o:["May continue selling insurance for up to 90 days while renewing","May NOT transact insurance until the license is renewed","Can continue for 30 days with a grace period automatically","Are permanently barred from renewing"],e:"A lapsed license means the producer is NOT LICENSED and may not transact insurance. There is no automatic grace period for writing new business. The producer must complete CE requirements and renew before conducting any insurance transactions. Transacting without a valid license is a violation."},
 es:{q:"Si la licencia de un productor de seguros de California vence, él/ella:",o:["Puede continuar vendiendo seguros por hasta 90 días mientras renueva","NO puede realizar transacciones de seguros hasta que se renueve la licencia","Puede continuar durante 30 días con un período de gracia automático","Está permanentemente impedido de renovar"],e:"Una licencia vencida significa que el productor NO ESTÁ LICENCIADO y no puede realizar transacciones de seguros. No hay período de gracia automático para escribir nuevos negocios. El productor debe completar los requisitos de CE y renovar antes de realizar cualquier transacción de seguros. Realizar transacciones sin una licencia válida es una violación."}},

// ===================== CONCEPTS (12) =====================
{id:'c1',t:'conc',c:1,
 en:{q:"The Principle of Indemnity means insurance should:",o:["Pay the maximum policy limit for every covered loss","Restore the insured to the same financial position as before the loss — no better, no worse","Always pay more than the actual loss to encourage policyholders","Guarantee payment regardless of the cause of loss"],e:"INDEMNITY = 'to make whole.' The insured should be restored to their pre-loss financial position — not enriched, not left worse off. This principle prevents moral hazard (intentionally causing losses for profit) and is the foundation of all P&C insurance."},
 es:{q:"El Principio de Indemnización significa que el seguro debe:",o:["Pagar el límite máximo de la póliza por cada pérdida cubierta","Restaurar al asegurado a la misma posición financiera que antes de la pérdida — ni mejor ni peor","Siempre pagar más que la pérdida real para incentivar a los asegurados","Garantizar el pago independientemente de la causa de la pérdida"],e:"INDEMNIZACIÓN = 'compensar'. El asegurado debe ser restaurado a su posición financiera anterior a la pérdida — sin enriquecimiento, sin quedar en peor situación. Este principio evita el riesgo moral (causar pérdidas intencionalmente para obtener ganancias) y es el fundamento de todo el seguro de P&C."}},

{id:'c2',t:'conc',c:2,
 en:{q:"For property insurance, insurable interest must exist:",o:["Only at the time of application","Only at the time of loss","At policy inception AND at the time of loss","Never — anyone can insure any property"],e:"PROPERTY insurance requires insurable interest both WHEN THE POLICY IS ISSUED and AT THE TIME OF LOSS. This differs from life insurance where interest only needs to exist at inception. Without insurable interest, the policy is void. Owners, lenders (mortgagees), and lessees all have insurable interest."},
 es:{q:"Para el seguro de propiedad, el interés asegurable debe existir:",o:["Solo en el momento de la solicitud","Solo en el momento de la pérdida","En el inicio de la póliza Y en el momento de la pérdida","Nunca — cualquiera puede asegurar cualquier propiedad"],e:"El seguro de PROPIEDAD requiere interés asegurable tanto CUANDO SE EMITE LA PÓLIZA como EN EL MOMENTO DE LA PÉRDIDA. Esto difiere del seguro de vida donde el interés solo necesita existir en el inicio. Sin interés asegurable, la póliza es nula. Los propietarios, prestamistas (hipotecarios) e inquilinos tienen interés asegurable."}},

{id:'c3',t:'conc',c:0,
 en:{q:"The doctrine of Subrogation allows the insurer to:",o:["Seek recovery from a responsible third party after paying the insured\'s claim","Raise the premium after any claim is paid","Cancel the policy after paying a large claim","Limit coverage for repeat claimants"],e:"SUBROGATION: after paying a claim, the insurer 'steps into the insured\'s shoes' and can sue the responsible third party to recover what was paid. This prevents double recovery (insured cannot collect from both the insurer and the at-fault party) and keeps premiums lower by recovering costs."},
 es:{q:"La doctrina de Subrogación permite a la aseguradora:",o:["Buscar recuperación de un tercero responsable después de pagar la reclamación del asegurado","Aumentar la prima después de que se pague cualquier reclamación","Cancelar la póliza después de pagar una reclamación grande","Limitar la cobertura para asegurados con reclamaciones repetidas"],e:"SUBROGACIÓN: después de pagar una reclamación, la aseguradora 'se pone en el lugar del asegurado' y puede demandar al tercero responsable para recuperar lo pagado. Esto evita la doble recuperación (el asegurado no puede cobrar tanto de la aseguradora como de la parte culpable) y mantiene las primas más bajas al recuperar costos."}},

{id:'c4',t:'conc',c:1,
 en:{q:"In insurance, a 'peril' is best defined as:",o:["A condition that increases the probability of loss occurring","The specific CAUSE of a loss — fire, theft, windstorm, earthquake","The maximum financial exposure from a potential loss","A reduction in coverage applied by the insurer"],e:"PERIL = the cause of loss (fire, theft, windstorm, earthquake, flood). HAZARD = a condition that increases the likelihood of a peril (a gas can near a furnace = physical hazard). RISK = the uncertainty of loss. Know the difference between all three terms for the exam."},
 es:{q:"En seguros, un 'peril' (riesgo) se define mejor como:",o:["Una condición que aumenta la probabilidad de que ocurra una pérdida","La CAUSA específica de una pérdida — incendio, robo, tormenta, terremoto","La exposición financiera máxima de una pérdida potencial","Una reducción en la cobertura aplicada por la aseguradora"],e:"PERIL = la causa de la pérdida (incendio, robo, tormenta, terremoto, inundación). PELIGRO (hazard) = una condición que aumenta la probabilidad de un peril (una lata de gasolina cerca de una caldera = peligro físico). RIESGO = la incertidumbre de la pérdida. Conoce la diferencia entre los tres términos para el examen."}},

{id:'c5',t:'conc',c:3,
 en:{q:"Moral hazard differs from morale hazard in that:",o:["Moral hazard involves careless attitudes; morale hazard involves intentional fraud","They are identical — just different ways to spell the same concept","Morale hazard applies to property; moral hazard applies to auto policies","Moral hazard involves INTENTIONAL dishonesty (fraud, arson for profit); morale hazard involves CARELESS INDIFFERENCE due to having insurance"],e:"MORAL HAZARD = intentional fraud to profit from insurance (staging accidents, arson). MORALE HAZARD = careless attitude because 'I have insurance anyway' (not locking doors, speeding because collision is covered). Both increase risk. Moral hazard is more serious and may void coverage."},
 es:{q:"El riesgo moral difiere del riesgo de morale en que:",o:["El riesgo moral involucra actitudes descuidadas; el riesgo de morale involucra fraude intencional","Son idénticos — solo formas diferentes de expresar el mismo concepto","El riesgo de morale aplica a propiedad; el riesgo moral aplica a pólizas de auto","El riesgo moral involucra DESHONESTIDAD INTENCIONAL (fraude, incendio con fines de lucro); el riesgo de morale involucra INDIFERENCIA DESCUIDADA por tener seguro"],e:"RIESGO MORAL = fraude intencional para obtener ganancias del seguro (accidentes simulados, incendio). RIESGO DE MORALE = actitud descuidada porque 'de todos modos tengo seguro' (no cerrar puertas con llave, exceso de velocidad porque la colisión está cubierta). Ambos aumentan el riesgo. El riesgo moral es más grave y puede invalidar la cobertura."}},

{id:'c6',t:'conc',c:0,
 en:{q:"For a contract to be legally valid, it must have all of the following EXCEPT:",o:["A written format (oral contracts can be valid)","Offer and acceptance","Consideration (exchange of something of value)","Legal purpose (lawful objective)"],e:"The four elements of a valid contract are: (1) Offer and Acceptance, (2) Consideration (premium for coverage), (3) Legal Purpose (lawful activity), and (4) Competent Parties (legal capacity to contract). A WRITTEN FORMAT is NOT required — oral contracts can be valid, though most insurance policies are written for clarity."},
 es:{q:"Para que un contrato sea legalmente válido, debe tener todos los siguientes EXCEPTO:",o:["Un formato escrito (los contratos orales pueden ser válidos)","Oferta y aceptación","Contraprestación (intercambio de algo de valor)","Propósito legal (objetivo lícito)"],e:"Los cuatro elementos de un contrato válido son: (1) Oferta y Aceptación, (2) Contraprestación (prima por cobertura), (3) Propósito Legal (actividad lícita), y (4) Partes Competentes (capacidad legal para contratar). Un FORMATO ESCRITO NO es requerido — los contratos orales pueden ser válidos, aunque la mayoría de las pólizas de seguros son escritas para mayor claridad."}},

{id:'c7',t:'conc',c:2,
 en:{q:"The Law of Large Numbers is fundamental to insurance because:",o:["Only large insurance companies can be financially stable","Large policies always have predictable losses","As the number of similar exposure units increases, actual losses converge toward predicted losses — enabling accurate premium pricing","Larger premiums always result in fewer claims"],e:"The Law of Large Numbers: as similar exposure units (people, homes, cars) are grouped together in larger numbers, actual loss experience becomes more predictable and closer to expected losses. This statistical principle allows insurers to set accurate premiums and remain financially stable."},
 es:{q:"La Ley de los Grandes Números es fundamental para el seguro porque:",o:["Solo las grandes compañías de seguros pueden ser financieramente estables","Las pólizas grandes siempre tienen pérdidas predecibles","A medida que aumenta el número de unidades de exposición similares, las pérdidas reales convergen hacia las pérdidas predichas — permitiendo precios de primas precisos","Las primas más grandes siempre resultan en menos reclamaciones"],e:"La Ley de los Grandes Números: a medida que las unidades de exposición similares (personas, casas, autos) se agrupan en números más grandes, la experiencia de pérdidas reales se vuelve más predecible y cercana a las pérdidas esperadas. Este principio estadístico permite a las aseguradoras establecer primas precisas y mantenerse financieramente estables."}},

{id:'c8',t:'conc',c:1,
 en:{q:"The coinsurance clause in a property policy penalizes the insured for:",o:["Filing too many small claims","Insuring the property for less than the required percentage of its value (typically 80%)","Choosing ACV instead of replacement cost coverage","Not reading the policy before signing"],e:"COINSURANCE: if the insured carries less than the required coverage (e.g., 80% of value), they are their own 'coinsurer' for the shortfall. Formula: (Coverage Carried ÷ Coverage Required) × Loss = Payment. Example: home worth $200K, 80% required = $160K needed. If insured only carries $120K: $120/$160 × $50,000 loss = $37,500 paid."},
 es:{q:"La cláusula de coaseguro en una póliza de propiedad penaliza al asegurado por:",o:["Presentar demasiadas reclamaciones pequeñas","Asegurar la propiedad por menos del porcentaje requerido de su valor (típicamente 80%)","Elegir ACV en lugar de cobertura de costo de reposición","No leer la póliza antes de firmar"],e:"COASEGURO: si el asegurado lleva menos de la cobertura requerida (ej: 80% del valor), es su propio 'coasegurador' por el déficit. Fórmula: (Cobertura Llevada ÷ Cobertura Requerida) × Pérdida = Pago. Ejemplo: casa por $200K, 80% requerido = $160K necesario. Si el asegurado solo lleva $120K: $120/$160 × pérdida de $50,000 = $37,500 pagados."}},

{id:'c9',t:'conc',c:3,
 en:{q:"The four elements required to prove negligence are:",o:["Intent, opportunity, motive, and action","Risk, hazard, peril, and loss","Insurance, coverage, exclusion, and condition","Duty, breach of duty, proximate cause, and actual damages"],e:"To prove negligence (and trigger liability coverage), a claimant must prove all four elements: (1) DUTY — the defendant owed a duty of care; (2) BREACH — the duty was breached; (3) PROXIMATE CAUSE — the breach caused the harm; (4) DAMAGES — actual injury or loss resulted. Miss any one element and there is no negligence."},
 es:{q:"Los cuatro elementos requeridos para probar negligencia son:",o:["Intención, oportunidad, motivo y acción","Riesgo, peligro, peril y pérdida","Seguro, cobertura, exclusión y condición","Deber, incumplimiento del deber, causa próxima y daños reales"],e:"Para probar negligencia (y activar la cobertura de responsabilidad civil), un reclamante debe probar los cuatro elementos: (1) DEBER — el demandado tenía un deber de cuidado; (2) INCUMPLIMIENTO — el deber fue incumplido; (3) CAUSA PRÓXIMA — el incumplimiento causó el daño; (4) DAÑOS — resultó una lesión o pérdida real. Faltar cualquier elemento y no hay negligencia."}},

{id:'c10',t:'conc',c:0,
 en:{q:"Stock insurance companies differ from mutual insurance companies in that:",o:["Stock companies are owned by shareholders and operated for profit; mutual companies are owned by policyholders","Mutual companies can only sell life insurance; stock companies sell all lines","Stock companies have lower premiums; mutual companies have higher premiums","Mutual companies are publicly traded; stock companies are privately held"],e:"STOCK insurer = owned by shareholders (stockholders), operated for profit, policyholders are customers (not owners). MUTUAL insurer = owned by POLICYHOLDERS, can issue dividends to policyholders, not publicly traded. RECIPROCAL insurer = subscribers exchanging risk through an attorney-in-fact. Know all three types."},
 es:{q:"Las compañías de seguros de acciones (stock) difieren de las compañías mutuas en que:",o:["Las compañías de acciones son propiedad de accionistas y operadas con fines de lucro; las compañías mutuas son propiedad de los asegurados","Las compañías mutuas solo pueden vender seguros de vida; las compañías de acciones venden todas las líneas","Las compañías de acciones tienen primas más bajas; las compañías mutuas tienen primas más altas","Las compañías mutuas cotizan en bolsa; las compañías de acciones son privadas"],e:"Aseguradora de ACCIONES (STOCK) = propiedad de accionistas, operada con fines de lucro, los asegurados son clientes (no propietarios). Aseguradora MUTUA = propiedad de LOS ASEGURADOS, puede emitir dividendos a los asegurados, no cotiza en bolsa. Aseguradora RECÍPROCA = suscriptores que intercambian riesgo a través de un apoderado. Conoce los tres tipos."}},

{id:'c11',t:'conc',c:2,
 en:{q:"'Proximate cause' in property insurance means:",o:["The most recent cause of a loss, regardless of what started the chain of events","The cause closest in time to the loss","The dominant, unbroken cause that sets in motion the chain of events leading to a loss","Any cause that contributed to the loss, however remotely"],e:"PROXIMATE CAUSE is the efficient, dominant cause that sets in motion an unbroken chain of events leading to a loss. It is NOT necessarily the most recent event or the closest in time — it is the PRIMARY cause. Insurers use proximate cause to determine if a loss is covered under the policy's covered perils."},
 es:{q:"'Causa Próxima' en el seguro de propiedad significa:",o:["La causa más reciente de una pérdida, independientemente de lo que inició la cadena de eventos","La causa más cercana en el tiempo a la pérdida","La causa dominante y continua que pone en movimiento la cadena de eventos que lleva a una pérdida","Cualquier causa que contribuyó a la pérdida, por remota que sea"],e:"La CAUSA PRÓXIMA es la causa eficiente y dominante que pone en movimiento una cadena ininterrumpida de eventos que lleva a una pérdida. NO es necesariamente el evento más reciente o el más cercano en el tiempo — es la causa PRIMARIA. Las aseguradoras usan la causa próxima para determinar si una pérdida está cubierta bajo los perils cubiertos de la póliza."}},

{id:'c12',t:'conc',c:1,
 en:{q:"What is the difference between an 'admitted' and a 'non-admitted' (surplus lines) insurer in California?",o:["Admitted insurers are larger; non-admitted insurers are smaller","Admitted insurers are licensed by the CDI and covered by the California Insurance Guarantee Association (CIGA); non-admitted are not licensed in CA and not covered by CIGA","Non-admitted insurers offer lower premiums because they are exempt from all regulations","Admitted insurers can only sell auto insurance; non-admitted sell all other lines"],e:"ADMITTED = licensed by CDI, subject to CDI regulation, rates/forms approved, covered by CIGA (guaranty fund) if insolvent. NON-ADMITTED (Surplus Lines) = not licensed in CA, may cover unusual/hard-to-place risks, NOT covered by CIGA if insolvency, must be placed through a surplus lines broker."},
 es:{q:"¿Cuál es la diferencia entre una aseguradora 'admitida' y una 'no admitida' (líneas excedentes) en California?",o:["Las aseguradoras admitidas son más grandes; las no admitidas son más pequeñas","Las aseguradoras admitidas tienen licencia del CDI y están cubiertas por la Asociación de Garantía de Seguros de California (CIGA); las no admitidas no tienen licencia en CA y no están cubiertas por CIGA","Las aseguradoras no admitidas ofrecen primas más bajas porque están exentas de todas las regulaciones","Las aseguradoras admitidas solo pueden vender seguro de auto; las no admitidas venden todas las demás líneas"],e:"ADMITIDA = con licencia del CDI, sujeta a la regulación del CDI, tarifas/formas aprobadas, cubierta por CIGA (fondo de garantía) si es insolvente. NO ADMITIDA (Líneas Excedentes) = sin licencia en CA, puede cubrir riesgos inusuales/difíciles de asegurar, NO cubierta por CIGA en caso de insolvencia, debe contratarse a través de un corredor de líneas excedentes."}},

// ===================== WILDFIRE & FAIR PLAN (10) =====================
{id:'w1',t:'fire',c:0,
 en:{q:"The California FAIR Plan is best described as:",o:["The insurer of last resort — a state-mandated pool providing basic fire and property insurance to those who cannot obtain coverage in the voluntary market","A government subsidy program that provides free insurance to wildfire victims","A federal program that reimburses homeowners after wildfires","A private insurer that specializes in high-risk fire zones"],e:"The California FAIR (Fair Access to Insurance Requirements) Plan is the insurer of LAST RESORT for property insurance. It provides BASIC fire and limited property coverage to property owners who have been denied coverage in the standard market — common in high-risk wildfire zones. Coverage is limited compared to a standard HO-3."},
 es:{q:"El Plan FAIR de California se describe mejor como:",o:["El asegurador de último recurso — un fondo mandado por el estado que proporciona seguro básico contra incendios y propiedad a quienes no pueden obtener cobertura en el mercado voluntario","Un programa gubernamental de subsidios que proporciona seguro gratuito a las víctimas de incendios forestales","Un programa federal que reembolsa a los propietarios después de los incendios forestales","Una aseguradora privada que se especializa en zonas de alto riesgo de incendios"],e:"El Plan FAIR (Acceso Justo a los Requisitos de Seguros) de California es el asegurador de ÚLTIMO RECURSO para el seguro de propiedad. Proporciona cobertura básica contra incendios y propiedad limitada a los propietarios que han sido rechazados en el mercado estándar — común en zonas de alto riesgo de incendios forestales. La cobertura es limitada comparada con una HO-3 estándar."}},

{id:'w2',t:'fire',c:2,
 en:{q:"The California Earthquake Authority (CEA) provides:",o:["Government-funded earthquake relief grants to homeowners","Low-interest loans for home retrofitting in seismic zones","Residential earthquake insurance purchased through participating private insurers","Free earthquake inspections for homes in fault zones"],e:"The California Earthquake Authority (CEA) is a publicly managed, largely privately funded organization that provides EARTHQUAKE INSURANCE through participating private insurers. Homeowners buy CEA policies THROUGH their regular insurer. It was created after the 1994 Northridge earthquake when private insurers began withdrawing from the market."},
 es:{q:"La Autoridad de Terremotos de California (CEA) proporciona:",o:["Subsidios gubernamentales de ayuda por terremotos a propietarios","Préstamos de bajo interés para retrofitting de viviendas en zonas sísmicas","Seguro residencial de terremotos comprado a través de aseguradoras privadas participantes","Inspecciones gratuitas de terremotos para hogares en zonas de fallas"],e:"La Autoridad de Terremotos de California (CEA) es una organización de gestión pública y financiamiento principalmente privado que proporciona SEGURO DE TERREMOTOS a través de aseguradoras privadas participantes. Los propietarios compran las pólizas de la CEA A TRAVÉS de su aseguradora regular. Fue creada después del terremoto de Northridge de 1994 cuando las aseguradoras privadas comenzaron a retirarse del mercado."}},

{id:'w3',t:'fire',c:1,
 en:{q:"Under California's fire mitigation law, insurers must provide premium discounts to homeowners who:",o:["Live more than 10 miles from any forested area","Have taken verified steps to harden their home against wildfire (such as ember-resistant vents, fire-resistant roofing, and defensible space)","Have not filed any claims in the previous 5 years","Have installed a sprinkler system inside the home"],e:"California Insurance Code requires insurers to offer premium discounts for FIRE MITIGATION measures. Qualifying measures include: Class A fire-resistant roofing, ember-resistant vents, enclosed eaves, multi-pane windows, non-combustible decking, and maintaining defensible space. This incentivizes wildfire preparedness."},
 es:{q:"Bajo la ley de mitigación de incendios de California, las aseguradoras deben proporcionar descuentos en la prima a los propietarios que:",o:["Viven a más de 10 millas de cualquier área forestada","Han tomado medidas verificadas para endurecer su hogar contra los incendios forestales (como ventilaciones resistentes a las brasas, techos resistentes al fuego y espacio defensivo)","No han presentado reclamaciones en los 5 años anteriores","Han instalado un sistema de rociadores dentro del hogar"],e:"El Código de Seguros de California requiere que las aseguradoras ofrezcan descuentos en la prima por medidas de MITIGACIÓN DE INCENDIOS. Las medidas calificantes incluyen: techos resistentes al fuego Clase A, ventilaciones resistentes a las brasas, aleros cerrados, ventanas de múltiples paneles, cubiertas no combustibles y mantenimiento del espacio defensible. Esto incentiva la preparación ante incendios forestales."}},

{id:'w4',t:'fire',c:3,
 en:{q:"California law restricts insurance companies from non-renewing homeowners policies in certain situations. Which of the following triggers a mandatory moratorium on non-renewals?",o:["When a home has been on the market for more than 12 months","When the insured has filed more than 3 claims in 5 years","When the insured\'s credit score drops below a certain threshold","When the Governor declares a state of emergency for a wildfire — a moratorium prevents non-renewals in the affected area"],e:"Under California Insurance Code §675.1, when the Governor declares a State of Emergency due to wildfire, a NON-RENEWAL MORATORIUM automatically applies to homes in affected areas. Insurers cannot non-renew policies in the disaster area during this period. The moratorium lasts for one year after the declaration."},
 es:{q:"La ley de California restringe a las compañías de seguros de no renovar pólizas de propietarios en ciertas situaciones. ¿Cuál de las siguientes activa una moratoria obligatoria en las no renovaciones?",o:["Cuando una casa ha estado en el mercado por más de 12 meses","Cuando el asegurado ha presentado más de 3 reclamaciones en 5 años","Cuando el puntaje de crédito del asegurado cae por debajo de cierto umbral","Cuando el Gobernador declara un estado de emergencia por un incendio forestal — una moratoria evita las no renovaciones en el área afectada"],e:"Bajo el Código de Seguros de California §675.1, cuando el Gobernador declara un Estado de Emergencia por incendio forestal, se aplica automáticamente una MORATORIA DE NO RENOVACIÓN a los hogares en las áreas afectadas. Las aseguradoras no pueden no renovar pólizas en el área de desastre durante este período. La moratoria dura un año después de la declaración."}},

{id:'w5',t:'fire',c:0,
 en:{q:"A homeowner\'s property is located in a High Fire Hazard Severity Zone (HFHSZ). Their insurer wants to non-renew them (outside of a moratorium period). The insurer must:",o:["Provide at least 75 days written notice of non-renewal","Provide 30 days notice","Cancel the policy immediately with no notice required","Offer a FAIR Plan replacement policy automatically"],e:"For non-renewals in High Fire Hazard Severity Zones (HFHSZ), California Insurance Code requires insurers to provide at LEAST 75 DAYS written notice before non-renewal — longer than the standard 45-day notice required for other non-renewals. This extra time allows homeowners to find replacement coverage."},
 es:{q:"La propiedad de un propietario está ubicada en una Zona de Alta Severidad de Peligro de Incendio (HFHSZ). Su aseguradora quiere no renovarles (fuera de un período de moratoria). La aseguradora debe:",o:["Proporcionar al menos 75 días de aviso escrito de no renovación","Proporcionar 30 días de aviso","Cancelar la póliza inmediatamente sin aviso requerido","Ofrecer automáticamente una póliza del Plan FAIR como reemplazo"],e:"Para las no renovaciones en Zonas de Alta Severidad de Peligro de Incendio (HFHSZ), el Código de Seguros de California requiere que las aseguradoras proporcionen AL MENOS 75 DÍAS de aviso escrito antes de la no renovación — más que el aviso estándar de 45 días requerido para otras no renovaciones. Este tiempo adicional permite a los propietarios encontrar cobertura de reemplazo."}},

{id:'w6',t:'fire',c:2,
 en:{q:"The National Flood Insurance Program (NFIP) was created because:",o:["Private insurers were overcharging for flood coverage","California state law requires all homes to have flood insurance","Private insurers generally excluded flood — the NFIP provides flood coverage backed by the federal government","Flood coverage was too expensive for the government to provide through standard programs"],e:"The NFIP was created by the federal government (FEMA) because private insurers excluded flood due to its catastrophic, non-diversifiable nature. The NFIP provides flood insurance to communities that adopt floodplain management regulations. Coverage is available through Write-Your-Own (WYO) companies and directly from FEMA."},
 es:{q:"El Programa Nacional de Seguro contra Inundaciones (NFIP) fue creado porque:",o:["Las aseguradoras privadas cobraban demasiado por la cobertura de inundaciones","La ley estatal de California requiere que todos los hogares tengan seguro de inundaciones","Las aseguradoras privadas generalmente excluían las inundaciones — el NFIP proporciona cobertura de inundaciones respaldada por el gobierno federal","La cobertura de inundaciones era demasiado costosa para que el gobierno la proporcionara a través de programas estándar"],e:"El NFIP fue creado por el gobierno federal (FEMA) porque las aseguradoras privadas excluían las inundaciones debido a su naturaleza catastrófica y no diversificable. El NFIP proporciona seguro de inundaciones a comunidades que adoptan regulaciones de gestión de llanuras aluviales. La cobertura está disponible a través de compañías Write-Your-Own (WYO) y directamente de FEMA."}},

{id:'w7',t:'fire',c:1,
 en:{q:"A 'defensible space' requirement in California for wildfire prevention means:",o:["Homeowners must install fire sprinklers in all rooms","Homeowners in certain fire risk areas must maintain cleared vegetation zones of 100 feet around their structure","All new California homes must be built with concrete walls","Homeowners must have a fire evacuation plan approved by the fire department"],e:"California law (Public Resources Code §4291) requires homeowners in designated areas to maintain DEFENSIBLE SPACE of 100 feet around their structures (or to the property line, whichever is less): Zone 1 (0-30 ft) = lean, clean and green; Zone 2 (30-100 ft) = reduce fuel. Insurers may require compliance as a condition of coverage."},
 es:{q:"Un requisito de 'espacio defensivo' en California para la prevención de incendios forestales significa:",o:["Los propietarios deben instalar rociadores de incendios en todas las habitaciones","Los propietarios en ciertas áreas de riesgo de incendio deben mantener zonas de vegetación despejada de 100 pies alrededor de su estructura","Todas las casas nuevas en California deben construirse con paredes de concreto","Los propietarios deben tener un plan de evacuación por incendio aprobado por el departamento de bomberos"],e:"La ley de California (Código de Recursos Públicos §4291) requiere que los propietarios en áreas designadas mantengan un ESPACIO DEFENSIVO de 100 pies alrededor de sus estructuras (o hasta el límite de la propiedad, lo que sea menor): Zona 1 (0-30 pies) = limpio, despejado y verde; Zona 2 (30-100 pies) = reducir combustible. Las aseguradoras pueden requerir el cumplimiento como condición de cobertura."}},

{id:'w8',t:'fire',c:3,
 en:{q:"If a California homeowner is non-renewed by their insurer and cannot find coverage in the standard market, they should:",o:["Go without insurance — it is not legally required","Contact the CDI to force the insurer to reinstate their policy","Purchase a surplus lines policy without investigating other options","Contact the California FAIR Plan as a last resort for basic property coverage, and separately purchase a Difference in Conditions (DIC) policy for broader coverage"],e:"The FAIR Plan provides BASIC fire coverage — not the comprehensive coverage of an HO-3. To get broader protection, homeowners often purchase a Difference in Conditions (DIC) policy alongside the FAIR Plan. A DIC policy covers perils that the FAIR Plan excludes, such as liability, theft, and water damage."},
 es:{q:"Si un propietario de California no recibe renovación de su aseguradora y no puede encontrar cobertura en el mercado estándar, debe:",o:["Quedarse sin seguro — no es legalmente requerido","Contactar al CDI para obligar a la aseguradora a reinstalar su póliza","Comprar una póliza de líneas excedentes sin investigar otras opciones","Contactar al Plan FAIR de California como último recurso para cobertura básica de propiedad, y comprar por separado una póliza de Diferencia en Condiciones (DIC) para cobertura más amplia"],e:"El Plan FAIR proporciona cobertura básica contra incendios — no la cobertura integral de una HO-3. Para obtener protección más amplia, los propietarios a menudo compran una póliza de Diferencia en Condiciones (DIC) junto con el Plan FAIR. Una póliza DIC cubre los perils que el Plan FAIR excluye, como responsabilidad civil, robo y daños por agua."}},

{id:'w9',t:'fire',c:0,
 en:{q:"Which of the following statements about earthquake insurance in California is correct?",o:["Earthquake coverage must be purchased separately from a standard homeowners policy, either through the CEA or a private insurer","Earthquake coverage is automatically included in all California HO-3 policies","The California FAIR Plan includes earthquake coverage as part of its standard offering","Mortgage lenders in California cannot require earthquake insurance"],e:"EARTHQUAKE IS EXCLUDED from all standard HO policies in California. The CEA (California Earthquake Authority) is the primary source, but private insurers also offer earthquake coverage. CEA policies typically have higher deductibles (10-25% of coverage) than standard homeowners policies and may have coverage sublimits."},
 es:{q:"¿Cuál de las siguientes afirmaciones sobre el seguro de terremotos en California es correcta?",o:["La cobertura de terremotos debe comprarse por separado de una póliza estándar de propietarios, ya sea a través de la CEA o una aseguradora privada","La cobertura de terremotos está incluida automáticamente en todas las pólizas HO-3 de California","El Plan FAIR de California incluye cobertura de terremotos como parte de su oferta estándar","Los prestamistas hipotecarios en California no pueden requerir seguro de terremotos"],e:"LOS TERREMOTOS ESTÁN EXCLUIDOS de todas las pólizas HO estándar en California. La CEA (Autoridad de Terremotos de California) es la fuente principal, pero las aseguradoras privadas también ofrecen cobertura de terremotos. Las pólizas de la CEA típicamente tienen deducibles más altos (10-25% de la cobertura) que las pólizas estándar de propietarios y pueden tener sublímites de cobertura."}},

{id:'w10',t:'fire',c:2,
 en:{q:"California's Sustainable Insurance Strategy (2023) and related reforms were primarily designed to:",o:["Eliminate the California FAIR Plan","Require all homeowners to carry earthquake insurance","Encourage private insurers to return to high-risk fire areas by allowing more accurate risk-based pricing, while maintaining consumer protections","Reduce insurance rates across all lines by 25%"],e:"California's 2023 Sustainable Insurance Strategy (Commissioner Lara\'s reforms) aims to stabilize the homeowners insurance market by: allowing insurers to use forward-looking catastrophe models (instead of only historical data) for rate setting, permitting reinsurance costs in rate calculations, and requiring insurers writing in lower-risk areas to also write in high-risk areas."},
 es:{q:"La Estrategia de Seguro Sostenible de California (2023) y las reformas relacionadas fueron diseñadas principalmente para:",o:["Eliminar el Plan FAIR de California","Requerir que todos los propietarios lleven seguro de terremotos","Alentar a las aseguradoras privadas a regresar a las áreas de alto riesgo de incendios al permitir precios basados en riesgo más precisos, mientras se mantienen las protecciones al consumidor","Reducir las tarifas de seguros en todas las líneas en un 25%"],e:"La Estrategia de Seguro Sostenible de California de 2023 (reformas del Comisionado Lara) tiene como objetivo estabilizar el mercado de seguros de propietarios al: permitir a las aseguradoras usar modelos catastrófico prospectivos (en lugar de solo datos históricos) para fijar tarifas, permitir los costos de reaseguro en los cálculos de tarifas y requerir que las aseguradoras que escriben en áreas de menor riesgo también escriban en áreas de alto riesgo."}},

// ===================== INLAND MARINE & SPECIAL (10) =====================
{id:'i1',t:'inland',c:1,
 en:{q:"Inland Marine insurance is best described as coverage for:",o:["Boats and watercraft on inland lakes and rivers","Property that moves from place to place or is in transit — jewelry, fine art, cameras, musical instruments, and contractor's equipment","Only property transported by rail or truck","Commercial shipping containers crossing state lines"],e:"Inland Marine covers property that MOVES — items not permanently fixed at one location. Key examples: scheduled personal property (jewelry, art), contractor's equipment, cameras, musical instruments, electronic data processing equipment, and goods in transit. It is broader than standard HO Coverage C with higher limits and open-peril coverage."},
 es:{q:"El seguro de Marina Interior se describe mejor como cobertura para:",o:["Botes y embarcaciones en lagos y ríos interiores","Propiedad que se mueve de un lugar a otro o está en tránsito — joyas, bellas artes, cámaras, instrumentos musicales y equipo de contratistas","Solo propiedad transportada por ferrocarril o camión","Contenedores de envío comercial que cruzan líneas estatales"],e:"La Marina Interior cubre propiedad que SE MUEVE — artículos no fijados permanentemente en un solo lugar. Ejemplos clave: propiedad personal programada (joyas, arte), equipo de contratistas, cámaras, instrumentos musicales, equipo de procesamiento de datos electrónicos y bienes en tránsito. Es más amplia que la Cobertura C de HO estándar con límites más altos y cobertura de perils abiertos."}},

{id:'i2',t:'inland',c:0,
 en:{q:"Under a standard HO-3 policy, what is the special limit for jewelry?",o:["$1,500 for jewelry, watches, and furs","$5,000 for jewelry","$10,000 for all personal property combined","No limit — jewelry is fully covered up to Coverage C"],e:"Standard HO policies have SUBLIMITS for certain high-value items. Typical sublimits: Jewelry/watches/furs = $1,500; Cash/currency/coins = $200; Firearms = $2,500; Silverware = $2,500; Securities/deeds = $1,500. To get full coverage for valuable jewelry, add a Scheduled Personal Property endorsement."},
 es:{q:"Bajo una póliza HO-3 estándar, ¿cuál es el límite especial para las joyas?",o:["$1,500 para joyas, relojes y pieles","$5,000 para joyas","$10,000 para toda la propiedad personal combinada","Sin límite — las joyas están completamente cubiertas hasta la Cobertura C"],e:"Las pólizas HO estándar tienen SUBLÍMITES para ciertos artículos de alto valor. Sublímites típicos: Joyas/relojes/pieles = $1,500; Efectivo/moneda/monedas = $200; Armas de fuego = $2,500; Platería = $2,500; Valores/escrituras = $1,500. Para obtener cobertura completa de joyas valiosas, añadir un endoso de Propiedad Personal Programada."}},

{id:'i3',t:'inland',c:2,
